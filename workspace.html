<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barya Business AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            barya: {
              bg: '#0a0a0a',
              card: '#111111',
              accent: '#00d4ff',
              soft: '#1a1a1a'
            }
          },
          boxShadow: {
            neon: '0 0 0 1px rgba(0, 212, 255, 0.3), 0 0 30px rgba(0, 212, 255, 0.12)'
          }
        }
      }
    };
  </script>
  <style>
    :root { color-scheme: dark; }
    body {
      background:
        radial-gradient(circle at 18% 10%, rgba(0, 212, 255, 0.08), transparent 34%),
        radial-gradient(circle at 82% 0%, rgba(37, 99, 235, 0.07), transparent 32%),
        #0a0a0a;
      font-feature-settings: "ss01", "cv01";
    }
    .section-panel { display: none; }
    .section-panel.active { display: block; }
    .active-nav { background: rgba(0, 212, 255, 0.14); color: #00d4ff; border-color: rgba(0, 212, 255, 0.25); }
    .glass-card {
      background: linear-gradient(135deg, rgba(17, 17, 17, 0.86), rgba(13, 16, 25, 0.76));
      border: 1px solid rgba(82, 82, 91, 0.55);
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px);
    }
    .premium-hover { transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease, background-color 200ms ease; }
    .premium-hover:hover { transform: translateY(-1px); border-color: rgba(0, 212, 255, 0.34); box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.22), 0 14px 26px rgba(0, 0, 0, 0.36); }
    .soft-input { transition: border-color 180ms ease, box-shadow 180ms ease, background-color 180ms ease; }
    .soft-input:focus { border-color: rgba(0, 212, 255, 0.6); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.12); }
    #mainNav button { transition: border-color 180ms ease, background-color 180ms ease, transform 180ms ease; }
    #mainNav button:hover { transform: translateX(2px); }
    button, a, input, select, textarea { transition: border-color 180ms ease, background-color 180ms ease, color 180ms ease, box-shadow 180ms ease; }
    .ring-progress {
      width: 132px;
      height: 132px;
      border-radius: 999px;
      background: conic-gradient(#00d4ff var(--pct), #202020 0);
      display: grid;
      place-items: center;
    }
    .ring-progress > div {
      width: 98px;
      height: 98px;
      border-radius: 999px;
      background: #111111;
      display: grid;
      place-items: center;
      border: 1px solid #2b2b2b;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #2c2c2c; border-radius: 10px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #131313; }
    @media (max-width: 1023px) {
      #sidebar { width: min(84vw, 290px); }
    }
  </style>
</head>
<body class="text-zinc-100 min-h-screen antialiased">
  <div class="min-h-screen flex">
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-[270px] bg-[#0d0d0d]/95 backdrop-blur-xl border-r border-zinc-800 px-4 py-5 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-lg font-semibold text-barya-accent">Barya Workspace</h1>
          <p class="text-xs text-zinc-400">Business AI Operating System</p>
        </div>
        <button id="closeSidebar" class="lg:hidden p-2 rounded border border-zinc-700 text-zinc-300">✕</button>
      </div>
      <nav class="space-y-2" id="mainNav"></nav>
    </aside>

    <div class="flex-1 lg:ml-0 w-full">
      <header class="sticky top-0 z-30 backdrop-blur-xl bg-[#0a0a0a]/88 border-b border-zinc-800 px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <button id="openSidebar" class="lg:hidden p-2 rounded border border-zinc-700">☰</button>
          <input id="workspaceTitle" class="soft-input bg-transparent text-xl sm:text-2xl font-semibold outline-none border-b border-transparent focus:border-barya-accent max-w-[56vw] truncate" />
        </div>
        <div class="flex items-center gap-3">
          <span class="hidden md:inline-flex text-[11px] border border-cyan-500/30 bg-cyan-500/10 px-2 py-1 rounded-full text-cyan-200">⌘/Ctrl+K Search</span>
          <span class="hidden sm:inline-flex text-xs bg-barya-soft border border-zinc-700 px-2 py-1 rounded-full">Local-First</span>
          <div class="text-right">
            <p class="text-sm font-medium">Shruti Barya</p>
            <p class="text-xs text-zinc-400">Founder</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 text-black font-bold grid place-items-center">SB</div>
        </div>
      </header>

      <main class="p-4 sm:p-6 space-y-6">
        <section id="section-dashboard" class="section-panel active space-y-6"></section>
        <section id="section-workspace" class="section-panel space-y-6"></section>
        <section id="section-tasks" class="section-panel space-y-6"></section>
        <section id="section-ai" class="section-panel space-y-6"></section>
        <section id="section-memory" class="section-panel space-y-6"></section>
        <section id="section-planning" class="section-panel space-y-6"></section>
        <section id="section-settings" class="section-panel space-y-6"></section>
        <section id="section-knowledge-graph" class="section-panel space-y-6"></section>
      </main>
    </div>
  </div>

  <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

  <dialog id="memoryModal" class="w-[min(92vw,700px)] bg-[#111] border border-zinc-700 rounded-xl p-0 text-zinc-100">
    <div class="p-5 border-b border-zinc-800 flex justify-between items-center">
      <h3 class="text-lg font-semibold">Insight</h3>
      <button id="closeMemoryModal" class="text-zinc-400 hover:text-zinc-100">✕</button>
    </div>
    <div class="p-5" id="memoryModalBody"></div>
  </dialog>

  <script>
    const STORAGE_KEY = 'baryaWorkspaceV2';
    const navItems = [
      { id: 'dashboard', icon: '📊', label: 'Dashboard' },
      { id: 'workspace', icon: '📑', label: 'Workspace' },
      { id: 'tasks', icon: '✅', label: 'Tasks' },
      { id: 'ai', icon: '🤖', label: 'Barya AI' },
      { id: 'memory', icon: '🧠', label: 'Memory' },
      { id: 'planning', icon: '🗺️', label: 'Business Planning' },
      { id: 'settings', icon: '⚙️', label: 'Settings' },
      { id: 'knowledge-graph', icon: '🔗', label: 'Knowledge Graph' }
    ];

    const defaultState = {
      activeSection: 'dashboard',
      title: 'Untitled Startup',
      dashboard: {
        metrics: { income: 25000, expenses: 12000, netSavings: 13000, runway: 9 },
        projectionSettings: { variationSeed: 0.037 },
        expenseCategories: [
          { id: crypto.randomUUID(), name: 'Payroll', amount: 6200 },
          { id: crypto.randomUUID(), name: 'Marketing', amount: 2500 },
          { id: crypto.randomUUID(), name: 'Software', amount: 1400 },
          { id: crypto.randomUUID(), name: 'Operations', amount: 1900 }
        ],
        transactions: [
          { id: crypto.randomUUID(), type: 'income', category: 'Revenue', amount: 25000, notes: 'Monthly recurring revenue', ts: new Date().toISOString() },
          { id: crypto.randomUUID(), type: 'expense', category: 'Payroll', amount: 6200, notes: 'Salaries + contractor payouts', ts: new Date().toISOString() },
          { id: crypto.randomUUID(), type: 'expense', category: 'Marketing', amount: 2500, notes: 'Paid acquisition + content', ts: new Date().toISOString() }
        ],
        recommendations: [],
        healthScore: 72
      },
      ai: {
        history: [
          {
            role: 'assistant',
            message: 'Welcome! Ask me about growth, runway, product, or hiring priorities.',
            structured: {
              answer: 'I can help you make practical founder decisions quickly.',
              why: 'You need clear decisions, not generic advice.',
              steps: ['Pick one challenge', 'Share current numbers', 'Define desired outcome'],
              tip: 'Specific context improves response quality.',
              next: 'Try asking: How do I improve runway in 60 days?'
            },
            ts: new Date().toISOString()
          }
        ]
      },
      memory: {
        insights: [
          { id: crypto.randomUUID(), title: 'ICP clarity', content: 'Top segment is B2B SaaS founders at pre-seed.', tag: 'Strategy', ts: new Date().toISOString() }
        ],
        actions: [
          { id: crypto.randomUUID(), text: 'Call 3 churned customers', category: 'Customer', ts: new Date().toISOString() }
        ],
        search: ''
      },
      workspace: {
        pages: [
          {
            id: crypto.randomUUID(),
            title: 'Welcome Workspace Page',
            updatedAt: new Date().toISOString(),
            blocks: [
              { id: crypto.randomUUID(), type: 'h1', text: 'Welcome to your flexible workspace' },
              { id: crypto.randomUUID(), type: 'paragraph', text: 'Create structured notes, to-dos, and plans. Everything is stored locally.' },
              { id: crypto.randomUUID(), type: 'todo', text: 'Create your first custom page', checked: false }
            ]
          }
        ],
        activePageId: null,
        databases: [],
        activeDatabaseId: null
      },
      tasks: {
        items: [],
        sprints: [],
        leftTab: 'all',
        view: 'list',
        search: '',
        priorityFilter: 'All',
        statusFilter: 'All',
        sprintFilter: 'all',
        selectedTaskId: null
      },
      planning: {
        guides: [
          { title: 'Market Validation', tasks: ['Interview 10 users', 'Test pricing', 'Confirm top pain'], done: [false, false, false] },
          { title: 'Go-To-Market', tasks: ['Define channel mix', 'Launch weekly content', 'Set CAC target'], done: [false, false, false] },
          { title: 'Financial Discipline', tasks: ['Set burn cap', 'Track runway weekly', 'Review budget monthly'], done: [false, false, false] },
          { title: 'Team Execution', tasks: ['Define roles', 'Set weekly goals', 'Run retro every Friday'], done: [false, false, false] }
        ],
        templates: {
          onePager: 'Vision, customer, problem, solution, moat.',
          fundraise: 'Round goal, use of funds, milestones.',
          ops: 'Quarter goals, KPI owners, weekly cadence.'
        },
        strategy: {
          mode: 'deep',
          idea: '',
          followUp: '',
          loading: false,
          activeSessionId: null,
          sessions: []
        }
      },
      settings: {
        founder: { name: 'Shruti Barya', role: 'Founder', email: 'shruti@barya.ai' },
        business: { name: 'Untitled Startup', stage: 'Pre-Seed', industry: 'B2B SaaS' },
        preferences: { currency: 'USD', language: 'English', darkMode: true }
      },
      knowledgeGraph: {
        search: '',
        filter: 'all',
        focusRef: '',
        mentions: []
      }
    };

    let state = loadState();
    let cashflowChart;
    let expenseChart;
    let persistTimer = null;
    let latestPersistedSnapshot = '';
    let renderQueued = false;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(defaultState);
      try {
        const parsed = JSON.parse(raw);
        return deepMerge(structuredClone(defaultState), parsed);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function deepMerge(target, source) {
      for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
          deepMerge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
      return target;
    }

    function persistStateNow() {
      const snapshot = JSON.stringify(state);
      if (snapshot === latestPersistedSnapshot) return;
      latestPersistedSnapshot = snapshot;
      localStorage.setItem(STORAGE_KEY, snapshot);
    }

    function schedulePersist(delay = 120) {
      if (persistTimer) clearTimeout(persistTimer);
      persistTimer = setTimeout(() => {
        persistTimer = null;
        persistStateNow();
      }, delay);
    }

    function queueRenderActiveSection() {
      if (renderQueued) return;
      renderQueued = true;
      requestAnimationFrame(() => {
        renderQueued = false;
        renderActiveSection();
      });
    }

    function saveState() {
      updateRecommendations();
      schedulePersist(0);
      queueRenderActiveSection();
    }

    function init() {
      ensureKnowledgeGraphState();
      renderNav();
      setupBaseEvents();
      setupGlobalShortcuts();
      updateRecommendations();
      renderActiveSection();
      document.getElementById('workspaceTitle').value = state.title;
      latestPersistedSnapshot = JSON.stringify(state);
      applyThemePreference();
    }

    function renderNav() {
      const nav = document.getElementById('mainNav');
      nav.innerHTML = navItems.map(item => `
        <button data-section="${item.id}" class="w-full border border-zinc-800 rounded-xl px-3 py-2.5 flex items-center gap-2 text-left hover:border-cyan-500/40 ${state.activeSection === item.id ? 'active-nav' : ''}">
          <span>${item.icon}</span><span class="text-sm font-medium">${item.label}</span>
        </button>
      `).join('');

      nav.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          state.activeSection = btn.dataset.section;
          renderNav();
          renderActiveSection();
          closeSidebar();
          saveStateRaw();
        };
      });
    }

    function saveStateRaw(){ schedulePersist(80); }

    function renderActiveSection() {
      document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
      document.getElementById(`section-${state.activeSection}`).classList.add('active');
      if (state.activeSection === 'dashboard') renderDashboard();
      if (state.activeSection === 'workspace') renderWorkspace();
      if (state.activeSection === 'tasks') renderTasks();
      if (state.activeSection === 'ai') renderAI();
      if (state.activeSection === 'memory') renderMemory();
      if (state.activeSection === 'planning') renderPlanning();
      if (state.activeSection === 'settings') renderSettings();
      if (state.activeSection === 'knowledge-graph') renderKnowledgeGraph();
      enhanceSurfacePolish();
    }

    function enhanceSurfacePolish() {
      const panel = document.getElementById(`section-${state.activeSection}`);
      if (!panel) return;
      panel.querySelectorAll('div, section, article, aside, label').forEach(node => {
        const c = node.className || '';
        if (typeof c !== 'string') return;
        if (!/rounded-(lg|xl|2xl)/.test(c) || !/border/.test(c)) return;
        node.classList.add('glass-card');
        node.classList.add('premium-hover');
      });
      panel.querySelectorAll('input, textarea, select').forEach(input => input.classList.add('soft-input'));
    }

    function setupBaseEvents() {
      const titleInput = document.getElementById('workspaceTitle');
      titleInput.addEventListener('input', (e) => {
        state.title = e.target.value || 'Untitled Startup';
        state.settings.business.name = state.title;
        saveStateRaw();
      });
      document.getElementById('openSidebar').onclick = openSidebar;
      document.getElementById('closeSidebar').onclick = closeSidebar;
      document.getElementById('overlay').onclick = closeSidebar;
      document.getElementById('closeMemoryModal').onclick = () => document.getElementById('memoryModal').close();
      window.addEventListener('resize', debounce(() => {
        if (state.activeSection === 'dashboard') renderDashboardCharts();
      }, 150));
      window.addEventListener('beforeunload', () => persistStateNow());
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') persistStateNow();
      });
    }

    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('overlay').classList.add('hidden');
    }

    function applyThemePreference() {
      const isDark = state.settings?.preferences?.darkMode !== false;
      document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      document.body.classList.toggle('dark-mode-enabled', isDark);
    }

    function setupGlobalShortcuts() {
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          focusSectionSearch();
          return;
        }
        if (e.key === 'Escape') {
          closeSidebar();
          const modal = document.getElementById('memoryModal');
          if (modal?.open) modal.close();
        }
      });
    }

    function focusSectionSearch() {
      const searchBySection = {
        dashboard: ['txCategory'],
        workspace: ['workspacePageTitle'],
        tasks: ['taskSearch'],
        ai: ['chatInput'],
        memory: ['memorySearch'],
        planning: ['strategyIdeaInput', 'researchFollowInput'],
        settings: ['workspaceTitle'],
        'knowledge-graph': ['kgSearch']
      };
      const targets = searchBySection[state.activeSection] || [];
      for (const id of targets) {
        const input = document.getElementById(id);
        if (input) {
          input.focus();
          if ('select' in input) input.select();
          return;
        }
      }
      document.getElementById('workspaceTitle')?.focus();
    }

    function debounce(fn, wait = 120) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);
      };
    }

    function money(v){ return `${state.settings.preferences.currency} ${Number(v || 0).toLocaleString()}`; }

    function ensureKnowledgeGraphState() {
      if (!state.knowledgeGraph || typeof state.knowledgeGraph !== 'object') state.knowledgeGraph = {};
      if (typeof state.knowledgeGraph.search !== 'string') state.knowledgeGraph.search = '';
      if (!state.knowledgeGraph.filter) state.knowledgeGraph.filter = 'all';
      if (typeof state.knowledgeGraph.focusRef !== 'string') state.knowledgeGraph.focusRef = '';
      if (!Array.isArray(state.knowledgeGraph.mentions)) state.knowledgeGraph.mentions = [];
    }

    function wikiLinkTitles(text) {
      const titles = [];
      const pattern = /\[\[([^\]]+)\]\]/g;
      let match;
      while ((match = pattern.exec(String(text || '')))) {
        const t = match[1].trim();
        if (t && !titles.includes(t)) titles.push(t);
      }
      return titles;
    }

    function findRefByTitle(title) {
      const q = String(title || '').trim().toLowerCase();
      if (!q) return '';
      const page = (state.workspace?.pages || []).find(p => String(p.title || '').trim().toLowerCase() === q);
      if (page) return `page:${page.id}`;
      const note = (state.memory?.insights || []).find(n => String(n.title || '').trim().toLowerCase() === q);
      if (note) return `note:${note.id}`;
      const task = (state.tasks?.items || []).find(t => String(t.title || '').trim().toLowerCase() === q);
      if (task) return `task:${task.id}`;
      const research = (state.planning?.strategy?.sessions || []).find(r => String(r.query || '').trim().toLowerCase() === q);
      if (research) return `research:${research.id}`;
      return '';
    }

    function refMeta(ref) {
      const [kind, id] = String(ref || '').split(':');
      if (kind === 'page') {
        const page = (state.workspace?.pages || []).find(p => p.id === id);
        return page ? { title: page.title, type: page.objectType || 'Page', section: 'workspace', id } : null;
      }
      if (kind === 'note') {
        const note = (state.memory?.insights || []).find(n => n.id === id);
        return note ? { title: note.title, type: note.isDaily ? 'Daily Note' : 'Note', section: 'memory', id } : null;
      }
      if (kind === 'task') {
        const task = (state.tasks?.items || []).find(t => t.id === id);
        return task ? { title: task.title, type: 'Task', section: 'tasks', id } : null;
      }
      if (kind === 'research') {
        const session = (state.planning?.strategy?.sessions || []).find(s => s.id === id);
        return session ? { title: `Research: ${session.query.slice(0, 54)}`, type: 'Research', section: 'planning', id } : null;
      }
      if (kind === 'mention') {
        const m = (state.knowledgeGraph?.mentions || []).find(x => x.id === id);
        return m ? { title: m.title, type: 'Mention', section: 'ai', id } : null;
      }
      return null;
    }

    function addGraphMention(title, context = 'ai') {
      ensureKnowledgeGraphState();
      const normalized = String(title || '').trim();
      if (!normalized || normalized.length < 3) return;
      const existing = state.knowledgeGraph.mentions.find(m => m.title.toLowerCase() === normalized.toLowerCase());
      if (existing) {
        existing.lastSeenAt = new Date().toISOString();
        existing.count = Number(existing.count || 1) + 1;
        existing.context = context;
      } else {
        state.knowledgeGraph.mentions.push({ id: crypto.randomUUID(), title: normalized, context, count: 1, ts: new Date().toISOString(), lastSeenAt: new Date().toISOString() });
      }
    }

    function registerMentionsFromText(text, context = 'ai') {
      const wiki = wikiLinkTitles(text);
      wiki.forEach(title => addGraphMention(title, context));
      const proper = String(text || '').match(/\b([A-Z][a-z]{2,}(?:\s+[A-Z][a-z]{2,}){0,3})\b/g) || [];
      proper.slice(0, 8).forEach(token => { if (!findRefByTitle(token)) addGraphMention(token, context); });
    }

    function openReference(ref) {
      const [kind, id] = String(ref || '').split(':');
      if (!kind || !id) return;
      if (kind === 'page') {
        state.activeSection = 'workspace';
        if (state.workspace) state.workspace.activePageId = id;
      }
      if (kind === 'note') {
        state.activeSection = 'memory';
        if (state.memory) state.memory.activeNoteId = id;
      }
      if (kind === 'task') {
        state.activeSection = 'tasks';
        if (state.tasks) state.tasks.selectedTaskId = id;
      }
      if (kind === 'research') {
        state.activeSection = 'planning';
        if (state.planning?.strategy) state.planning.strategy.activeSessionId = id;
      }
      if (kind === 'mention') {
        state.activeSection = 'ai';
      }
      renderNav();
      saveState();
    }

    function showRelated(ref) {
      ensureKnowledgeGraphState();
      state.knowledgeGraph.focusRef = ref;
      state.activeSection = 'knowledge-graph';
      renderNav();
      saveState();
    }

    function buildKnowledgeGraph() {
      ensureKnowledgeGraphState();
      ensureWorkspaceState();
      ensureTasksState();
      const nodes = [];
      const edges = [];
      const nodeByRef = new Map();
      const addNode = (ref, label, type, section) => {
        if (!ref || nodeByRef.has(ref)) return;
        const node = { ref, label: label || 'Untitled', type, section, connected: 0 };
        nodeByRef.set(ref, node);
        nodes.push(node);
      };
      const addEdge = (from, to, relation = 'link') => {
        if (!from || !to || from === to || !nodeByRef.has(from) || !nodeByRef.has(to)) return;
        const key = [from, to].sort().join('::');
        if (edges.find(e => e.key === key)) return;
        edges.push({ key, from, to, relation });
      };

      (state.workspace?.pages || []).forEach(p => addNode(`page:${p.id}`, p.title, p.objectType || 'Page', 'workspace'));
      (state.memory?.insights || []).forEach(n => addNode(`note:${n.id}`, n.title, n.isDaily ? 'Daily Note' : 'Note', 'memory'));
      (state.tasks?.items || []).forEach(t => addNode(`task:${t.id}`, t.title, 'Task', 'tasks'));
      (state.planning?.strategy?.sessions || []).forEach(s => addNode(`research:${s.id}`, `Research: ${s.query.slice(0, 50)}`, 'Research', 'planning'));
      (state.knowledgeGraph?.mentions || []).forEach(m => addNode(`mention:${m.id}`, m.title, 'Mention', 'ai'));

      (state.workspace?.pages || []).forEach(p => {
        const from = `page:${p.id}`;
        (p.blocks || []).forEach(block => {
          wikiLinkTitles(`${block.text || ''} ${block.content || ''}`).forEach(title => {
            const to = findRefByTitle(title);
            if (to) addEdge(from, to, '[[link]]');
          });
          (block.targets || []).forEach(targetId => addEdge(from, `page:${targetId}`, block.relationKey || 'relation'));
        });
        Object.values(p.relations || {}).forEach(list => (list || []).forEach(id => addEdge(from, `page:${id}`, 'relation')));
      });

      (state.memory?.insights || []).forEach(note => {
        const from = `note:${note.id}`;
        wikiLinkTitles(note.content || '').forEach(title => {
          const to = findRefByTitle(title);
          if (to) addEdge(from, to, '[[link]]');
        });
        const text = `${note.title} ${note.content || ''}`.toLowerCase();
        (state.tasks?.items || []).forEach(task => { if (text.includes((task.title || '').toLowerCase()) && task.title) addEdge(from, `task:${task.id}`, 'auto'); });
      });

      (state.tasks?.items || []).forEach(task => {
        const from = `task:${task.id}`;
        if (task.linkRef) addEdge(from, task.linkRef, 'linkRef');
        wikiLinkTitles(`${task.title} ${task.description}`).forEach(title => { const to = findRefByTitle(title); if (to) addEdge(from, to, '[[link]]'); });
      });

      (state.planning?.strategy?.sessions || []).forEach(session => {
        const from = `research:${session.id}`;
        wikiLinkTitles(`${session.query} ${session.followUp || ''} ${session.deep?.summary || ''}`).forEach(title => {
          const to = findRefByTitle(title);
          if (to) addEdge(from, to, 'research');
        });
      });

      (state.ai?.history || []).forEach(msg => {
        if (!msg?.message) return;
        const linked = wikiLinkTitles(msg.message);
        linked.forEach(title => {
          const target = findRefByTitle(title);
          if (target) {
            const mention = (state.knowledgeGraph.mentions || []).find(m => m.title.toLowerCase() === title.toLowerCase());
            if (mention) addEdge(`mention:${mention.id}`, target, 'mention');
          }
        });
      });

      edges.forEach(edge => {
        const a = nodeByRef.get(edge.from);
        const b = nodeByRef.get(edge.to);
        if (a) a.connected += 1;
        if (b) b.connected += 1;
      });

      return { nodes, edges, nodeByRef };
    }

    function normalizeDashboardState() {
      const d = state.dashboard;
      let projectionSettingsChanged = false;
      if (!d.metrics) d.metrics = structuredClone(defaultState.dashboard.metrics);
      d.metrics.income = Number(d.metrics.income || 0);
      d.metrics.expenses = Number(d.metrics.expenses || 0);
      d.metrics.netSavings = Number(d.metrics.netSavings || d.metrics.income - d.metrics.expenses);
      d.metrics.runway = Number(d.metrics.runway || 0);
      if (!Array.isArray(d.expenseCategories)) d.expenseCategories = [];
      d.expenseCategories = d.expenseCategories.map(cat => ({
        id: cat.id || crypto.randomUUID(),
        name: (cat.name || 'Category').trim(),
        amount: Number(cat.amount || 0)
      })).filter(cat => cat.name);
      if (!Array.isArray(d.transactions)) d.transactions = [];
      d.transactions = d.transactions.map(tx => ({
        id: tx.id || crypto.randomUUID(),
        type: tx.type === 'income' ? 'income' : 'expense',
        category: tx.category || (tx.type === 'income' ? 'Revenue' : 'General'),
        amount: Number(tx.amount || 0),
        notes: tx.notes || '',
        ts: tx.ts || new Date().toISOString()
      }));
      if (!Array.isArray(d.recommendations)) d.recommendations = [];
      d.healthScore = Number.isFinite(Number(d.healthScore)) ? Number(d.healthScore) : 0;
      if (!d.projectionSettings) {
        d.projectionSettings = structuredClone(defaultState.dashboard.projectionSettings);
        projectionSettingsChanged = true;
      }
      const previousSeed = d.projectionSettings.variationSeed;
      d.projectionSettings.variationSeed = Number.isFinite(Number(d.projectionSettings.variationSeed))
        ? Number(d.projectionSettings.variationSeed)
        : defaultState.dashboard.projectionSettings.variationSeed;
      if (d.projectionSettings.variationSeed !== previousSeed) projectionSettingsChanged = true;
      if (projectionSettingsChanged) saveStateRaw();
    }

    function computeFinancialHealth() {
      const { income, expenses, runway } = state.dashboard.metrics;
      const profitabilityRaw = income <= 0 ? (expenses === 0 ? 100 : 0) : ((income - expenses) / income) * 100;
      const profitability = Math.max(0, Math.min(100, Math.round(profitabilityRaw)));
      const runwayScore = Math.max(0, Math.min(100, Math.round((runway / 18) * 100)));
      const burnRatio = income <= 0 ? 100 : Math.min(100, (expenses / income) * 100);
      const burnRateScore = Math.max(0, Math.min(100, Math.round(100 - burnRatio)));
      const healthScore = Math.round(runwayScore * 0.4 + profitability * 0.35 + burnRateScore * 0.25);
      state.dashboard.healthScore = healthScore;
      return { healthScore, runwayScore, profitability, burnRateScore };
    }

    function getTopExpenseCategories() {
      return [...state.dashboard.expenseCategories]
        .sort((a, b) => b.amount - a.amount)
        .slice(0, 3);
    }

    function getFutureMonthLabels(months = 6) {
      const labels = [];
      const now = new Date();
      for (let i = 1; i <= months; i += 1) {
        const dt = new Date(now.getFullYear(), now.getMonth() + i, 1);
        labels.push(dt.toLocaleString('en-IN', { month: 'long', year: 'numeric' }));
      }
      return labels;
    }

    function getForecast(months = 6) {
      const { income, expenses, netSavings, runway } = state.dashboard.metrics;
      const monthlyNetBase = Number(netSavings || income - expenses);
      const txs = [...state.dashboard.transactions]
        .filter(tx => Number.isFinite(Number(tx.amount)) && tx.ts)
        .sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());

      const monthlyBuckets = new Map();
      txs.forEach((tx) => {
        const dt = new Date(tx.ts);
        if (Number.isNaN(dt.getTime())) return;
        const key = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        const signedAmount = Number(tx.amount) * (tx.type === 'income' ? 1 : -1);
        monthlyBuckets.set(key, (monthlyBuckets.get(key) || 0) + signedAmount);
      });

      const lastThreeMonths = [];
      const now = new Date();
      for (let i = 2; i >= 0; i -= 1) {
        const dt = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const key = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        lastThreeMonths.push(monthlyBuckets.has(key) ? monthlyBuckets.get(key) : monthlyNetBase);
      }

      const monthOverMonthDeltas = [];
      for (let i = 1; i < lastThreeMonths.length; i += 1) {
        monthOverMonthDeltas.push(lastThreeMonths[i] - lastThreeMonths[i - 1]);
      }
      const trendDelta = monthOverMonthDeltas.length
        ? monthOverMonthDeltas.reduce((sum, d) => sum + d, 0) / monthOverMonthDeltas.length
        : 0;

      const seed = Number(state.dashboard.projectionSettings?.variationSeed || 0.037);
      const projection = Array.from({ length: months }, (_, i) => {
        const monthIndex = i + 1;
        const trendAdjusted = monthlyNetBase + (trendDelta * monthIndex);
        const variancePct = Math.sin((monthIndex * 1.91) + (seed * 100)) * 0.1;
        return Math.round(trendAdjusted * (1 + variancePct));
      });

      return {
        labels: getFutureMonthLabels(months),
        values: projection,
        currentNet: Math.round(monthlyNetBase),
        trendDelta: Math.round(trendDelta),
        projectedRunwayMonths: Math.max(0, Math.round(Number(runway || 0)))
      };
    }

    function updateRecommendations() {
      normalizeDashboardState();
      const { income, expenses, runway, netSavings } = state.dashboard.metrics;
      const topExpenses = getTopExpenseCategories();
      const { healthScore, profitability } = computeFinancialHealth();
      const rec = [];
      rec.push(`You have ${runway.toFixed(1)} months runway — ${runway < 6 ? 'start building a runway buffer now.' : 'keep extending it with strict burn control.'}`);
      if (expenses > income) rec.push('Monthly burn exceeds income. Reduce expenses by 10-15% or unlock a new revenue stream in the next sprint.');
      if (profitability < 15) rec.push('Low profitability detected. Re-price weak-margin offerings and cut low-ROI spend.');
      if (topExpenses[0] && topExpenses[0].amount > expenses * 0.35) rec.push(`${topExpenses[0].name} is your largest cost center. Audit this category for efficiency gains this week.`);
      if (healthScore < 55) rec.push('Financial health is fragile. Pause discretionary spend and shift focus to cash-collecting activities.');
      if (netSavings > 0 && runway >= 9 && healthScore >= 70) rec.push('Strong position: build a 2-quarter growth reserve and test one scalable acquisition channel.');
      state.dashboard.recommendations = rec.slice(0, 5);
    }

          notes,
          ts: new Date().toISOString()

        if (type === 'expense') {
          state.dashboard.metrics.expenses += amount;
          const categoryEntry = state.dashboard.expenseCategories.find(c => c.name.toLowerCase() === category.toLowerCase());
          if (categoryEntry) categoryEntry.amount += amount;
          else state.dashboard.expenseCategories.push({ id: crypto.randomUUID(), name: category, amount });

        state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;

    function normalizeWorkspaceBlock(block) {
      const legacyMap = { paragraph: 'text', h1: 'heading', h2: 'heading', h3: 'heading' };
      const normalizedType = legacyMap[block.type] || block.type || 'text';
      const levelFromLegacy = block.type === 'h1' ? 1 : block.type === 'h2' ? 2 : block.type === 'h3' ? 3 : 2;
      const normalized = {
        id: block.id || crypto.randomUUID(),
        type: normalizedType,
        text: String(block.text || ''),
        checked: !!block.checked,
        level: Number(block.level || levelFromLegacy || 2),
        relationKey: block.relationKey || WORKSPACE_RELATION_KEYS[0],
        targets: Array.isArray(block.targets) ? block.targets : [],
        open: block.open !== false,
        content: String(block.content || ''),
        columns: Array.isArray(block.columns) && block.columns.length ? block.columns.map(c => String(c || 'Column')) : ['Name', 'Status', 'Notes'],
        rows: Array.isArray(block.rows) ? block.rows.map(row => Array.isArray(row) ? row.map(cell => String(cell || '')) : []) : []
      };
      if (!['text', 'heading', 'todo', 'bullet', 'numbered', 'database', 'relation', 'toggle'].includes(normalized.type)) normalized.type = 'text';
      return normalized;
    }

    function createWorkspaceBlock(type = 'text') {
      return normalizeWorkspaceBlock({ id: crypto.randomUUID(), type });
    }

    function ensureWorkspaceState() {
      if (!state.workspace || typeof state.workspace !== 'object') state.workspace = structuredClone(defaultState.workspace);
      if (!Array.isArray(state.workspace.pages)) state.workspace.pages = [];
      state.workspace.pages.forEach(page => {
        if (!page.id) page.id = crypto.randomUUID();
        page.title = String(page.title || 'Untitled Page');
        page.objectType = WORKSPACE_OBJECT_TYPES.includes(page.objectType) ? page.objectType : 'Page';
        page.updatedAt = page.updatedAt || new Date().toISOString();
        if (!Array.isArray(page.blocks)) page.blocks = [createWorkspaceBlock('text')];
        page.blocks = page.blocks.map(normalizeWorkspaceBlock);
        if (!page.relations || typeof page.relations !== 'object') page.relations = {};
        WORKSPACE_RELATION_KEYS.forEach(key => {
          if (!Array.isArray(page.relations[key])) page.relations[key] = [];
          page.relations[key] = page.relations[key].filter(Boolean);
        });
      });
      if (!state.workspace.activePageId && state.workspace.pages[0]) state.workspace.activePageId = state.workspace.pages[0].id;
      if (!Array.isArray(state.workspace.databases)) state.workspace.databases = [];
      if (!state.workspace.activeDatabaseId && state.workspace.databases[0]) state.workspace.activeDatabaseId = state.workspace.databases[0].id;
    }

    function getActiveWorkspacePage() {
      ensureWorkspaceState();
      return state.workspace.pages.find(p => p.id === state.workspace.activePageId) || null;
    }

    function blockTypeLabel(type) {
      return ({ text: 'Text', heading: 'Heading', todo: 'To-do', bullet: 'Bullet', numbered: 'Numbered', database: 'Database', relation: 'Relation', toggle: 'Toggle' })[type] || 'Text';
    }

    function pagePreview(page) {
      const first = (page.blocks || []).find(b => (b.text || '').trim());
      return first ? first.text.slice(0, 90) : 'Empty page';
    }

    function workspacePageMap() {
      return new Map((state.workspace.pages || []).map(p => [p.id, p]));
    }

    function resolveMentionedPageIds(text, currentPageId = '') {
      const ids = [];
      const pages = state.workspace.pages || [];
      const pattern = /\[\[([^\]]+)\]\]/g;
      let match;
      while ((match = pattern.exec(String(text || '')))) {
        const name = match[1].trim().toLowerCase();
        const found = pages.find(page => page.title.trim().toLowerCase() === name);
        if (found && found.id !== currentPageId && !ids.includes(found.id)) ids.push(found.id);
      }
      return ids;
    }

    function computeWorkspaceConnections() {
      ensureWorkspaceState();
      const backlinks = new Map((state.workspace.pages || []).map(p => [p.id, []]));
      const related = new Map((state.workspace.pages || []).map(p => [p.id, new Set()]));

      (state.workspace.pages || []).forEach(page => {
        (page.blocks || []).forEach(block => {
          if (['text', 'heading', 'todo', 'bullet', 'numbered', 'toggle'].includes(block.type)) {
            resolveMentionedPageIds(`${block.text || ''} ${block.content || ''}`, page.id).forEach(targetId => {
              backlinks.get(targetId)?.push({ fromId: page.id, via: 'smart-link' });
              related.get(page.id)?.add(targetId);
              related.get(targetId)?.add(page.id);
            });
          }
          if (block.type === 'relation') {
            (block.targets || []).forEach(targetId => {
              if (!targetId || targetId === page.id) return;
              backlinks.get(targetId)?.push({ fromId: page.id, via: block.relationKey || 'Relation block' });
              related.get(page.id)?.add(targetId);
              related.get(targetId)?.add(page.id);
            });
          }
        });
        WORKSPACE_RELATION_KEYS.forEach(key => {
          (page.relations[key] || []).forEach(targetId => {
            if (!targetId || targetId === page.id) return;
            backlinks.get(targetId)?.push({ fromId: page.id, via: key });
            related.get(page.id)?.add(targetId);
            related.get(targetId)?.add(page.id);
          });
        });
      });

      return {
        backlinks,
        related: new Map(Array.from(related.entries()).map(([k, set]) => [k, Array.from(set)]))
      };
    }

    function createWorkspacePage(title='Untitled Page', blocks=null, objectType='Page', relations=null) {
      const page = {
        id: crypto.randomUUID(),
        title,
        objectType: WORKSPACE_OBJECT_TYPES.includes(objectType) ? objectType : 'Page',
        updatedAt: new Date().toISOString(),
        relations: Object.fromEntries(WORKSPACE_RELATION_KEYS.map(key => [key, Array.isArray(relations?.[key]) ? relations[key] : []])),
        blocks: (blocks || [createWorkspaceBlock('text')]).map(b => normalizeWorkspaceBlock({ ...b, id: crypto.randomUUID() }))
      };
      state.workspace.pages.unshift(page);
      state.workspace.activePageId = page.id;
      saveState();
    }

    function updatePageUpdatedAt(page) {
      page.updatedAt = new Date().toISOString();
    }

      el.innerHTML = `

        saveState();

        const key = btn.dataset.relationAdd;
        const select = el.querySelector(`[data-relation-select="${CSS.escape(key)}"]`);
        const id = select?.value;
        if (!id) return;
        if (!activePage.relations[key].includes(id)) activePage.relations[key].push(id);
        updatePageUpdatedAt(activePage);
        saveState();
      });

      document.getElementById('workspaceAddBlock').onclick = () => {
        activePage.blocks.push(createWorkspaceBlock('text'));
        updatePageUpdatedAt(activePage);
        saveState();
      };

      let dragId = null;
      el.querySelectorAll('.workspace-block').forEach(blockEl => {
        blockEl.addEventListener('dragstart', () => {
          dragId = blockEl.dataset.blockId;
          blockEl.classList.add('opacity-60');
        });
        blockEl.addEventListener('dragend', () => {
          dragId = null;
          blockEl.classList.remove('opacity-60');
        });
        blockEl.addEventListener('dragover', (evt) => evt.preventDefault());
        blockEl.addEventListener('drop', () => {
          const targetId = blockEl.dataset.blockId;
          if (!dragId || dragId === targetId) return;
          const fromIndex = activePage.blocks.findIndex(b => b.id === dragId);
          const toIndex = activePage.blocks.findIndex(b => b.id === targetId);
          if (fromIndex < 0 || toIndex < 0) return;
          const [moved] = activePage.blocks.splice(fromIndex, 1);
          activePage.blocks.splice(toIndex, 0, moved);
          updatePageUpdatedAt(activePage);
          saveState();
        });
      });

      el.querySelectorAll('[data-delete-block]').forEach(btn => btn.onclick = () => {
        activePage.blocks = activePage.blocks.filter(b => b.id !== btn.dataset.deleteBlock);
        updatePageUpdatedAt(activePage);
        saveState();

        state.workspace.pages = [];
        state.workspace.activePageId = null;
        saveState();
      };
    }

    function renderWorkspaceBlockBody(block, idx, currentPageId, filteredMenu, cmdOpenClass) {
      const headingClass = block.level === 1 ? 'text-2xl font-bold' : block.level === 2 ? 'text-xl font-semibold' : 'text-lg font-semibold';
      const mentionIds = resolveMentionedPageIds(`${block.text || ''} ${block.content || ''}`, currentPageId);
      const mentionPills = mentionIds.map(id => {
        const page = (state.workspace.pages || []).find(p => p.id === id);
        return `<span class="text-[11px] px-2 py-1 rounded-full border border-cyan-500/30 bg-cyan-500/10">[[${escapeHTML(page?.title || 'Unknown')}]]</span>`;
      }).join('');

      const slashMenu = `
        <div class="${cmdOpenClass} mt-2 rounded-lg border border-cyan-500/40 bg-[#06080d] p-2 space-y-1" data-command-menu="${block.id}">
          ${(filteredMenu.length ? filteredMenu : workspaceBlockMenu).map(item => `<button data-command-type="${item.type}" data-command-for="${block.id}" class="w-full text-left px-2 py-1 rounded hover:bg-cyan-500/15 text-sm">/${item.type} · ${item.label}</button>`).join('')}
        </div>
      `;

      if (block.type === 'todo') {
        return `<label class="flex items-center gap-2"><input type="checkbox" data-block-check="${block.id}" ${block.checked ? 'checked' : ''} class="accent-cyan-400" /><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="flex-1 bg-zinc-950 border border-zinc-700 rounded px-2 py-2" placeholder="To-do" /></label>${mentionPills ? `<div class="flex gap-1 flex-wrap mt-2">${mentionPills}</div>`:''}${slashMenu}`;
      }
      if (block.type === 'heading') {
        return `<div class="space-y-2"><div class="flex gap-2"><select data-block-level="${block.id}" class="bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-xs">${[1,2,3].map(level=>`<option value="${level}" ${block.level===level?'selected':''}>H${level}</option>`).join('')}</select><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="${headingClass} flex-1 bg-zinc-950 border border-zinc-700 rounded px-2 py-2" placeholder="Heading" /></div>${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div>`;
      }
      if (block.type === 'bullet' || block.type === 'numbered') {
        const marker = block.type === 'bullet' ? '•' : `${idx + 1}.`;
        return `<div class="flex items-start gap-2"><span class="text-zinc-500 mt-2">${marker}</span><div class="flex-1 space-y-2"><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="w-full bg-zinc-950 border border-zinc-700 rounded px-2 py-2" placeholder="List item" />${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div></div>`;
      }
      if (block.type === 'toggle') {
        return `<div class="space-y-2"><button data-toggle-open="${block.id}" class="text-sm px-2 py-1 rounded border border-zinc-700 bg-zinc-950">${block.open ? '▼' : '▶'} Toggle</button><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="w-full bg-zinc-950 border border-zinc-700 rounded px-2 py-2" placeholder="Toggle title" />${block.open ? `<textarea data-block-content="${block.id}" class="w-full h-20 bg-zinc-950 border border-zinc-700 rounded px-2 py-2" placeholder="Toggle content">${escapeHTML(block.content || '')}</textarea>` : ''}${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div>`;
      }
      if (block.type === 'relation') {
        return `<div class="space-y-2"><div class="flex gap-2"><select data-block-relation-key="${block.id}" class="bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-sm">${WORKSPACE_RELATION_KEYS.map(key => `<option value="${key}" ${block.relationKey===key?'selected':''}>${key}</option>`).join('')}</select><select data-block-relation-target="${block.id}" class="flex-1 bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-sm"><option value="">Select object…</option>${(state.workspace.pages || []).filter(p => p.id !== currentPageId).map(p => `<option value="${p.id}">${escapeHTML(p.title)} · ${escapeHTML(p.objectType||'Page')}</option>`).join('')}</select><button data-block-relation-add="${block.id}" class="px-3 py-1 rounded bg-cyan-500/10 border border-cyan-500/40 text-cyan-200">Add</button></div><div class="flex flex-wrap gap-1">${(block.targets || []).map(id => `<span class="text-xs px-2 py-1 rounded-full border border-cyan-500/30 bg-cyan-500/10">${escapeHTML((state.workspace.pages || []).find(p => p.id === id)?.title || 'Missing')}</span>`).join('') || '<span class="text-xs text-zinc-600">No linked objects</span>'}</div>${slashMenu}</div>`;
      }
      if (block.type === 'database') {
        const cols = block.columns.length || 1;
        return `<div class="space-y-2"><div class="overflow-auto"><table class="min-w-full text-xs border border-zinc-800"><thead><tr>${block.columns.map((col, cIdx) => `<th class="p-1 border border-zinc-800"><input data-block-db-col="${block.id}:${cIdx}" value="${escapeAttr(col)}" class="w-full bg-zinc-950 border border-zinc-700 rounded px-1 py-1" /></th>`).join('')}<th class="p-1 border border-zinc-800"><button data-block-db-add-col="${block.id}" class="text-cyan-300">+ Col</button></th></tr></thead><tbody>${(block.rows || []).map((row, rIdx) => `<tr>${Array.from({length: cols}).map((_, cIdx) => `<td class="border border-zinc-800 p-1"><input data-block-db-cell="${block.id}:${rIdx}:${cIdx}" value="${escapeAttr(row[cIdx] || '')}" class="w-full bg-zinc-950 border border-zinc-700 rounded px-1 py-1"/></td>`).join('')}<td class="border border-zinc-800 p-1 text-center"><button data-block-db-del-row="${block.id}:${rIdx}" class="text-red-400">✕</button></td></tr>`).join('')}</tbody></table></div><div class="flex gap-2"><button data-block-db-add-row="${block.id}" class="px-2 py-1 rounded border border-zinc-700 bg-zinc-950 text-xs">+ Row</button></div>${slashMenu}</div>`;
      }
      return `<div class="space-y-2"><textarea data-block-text="${block.id}" class="w-full min-h-[74px] bg-zinc-950 border border-zinc-700 rounded px-2 py-2" placeholder="Write something...">${escapeHTML(block.text)}</textarea>${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div>`;
    }

    function bindWorkspaceBlockEvents(el, activePage) {
      const findBlock = (id) => activePage.blocks.find(b => b.id === id);
      const touchPage = () => { updatePageUpdatedAt(activePage); saveStateRaw(); };

      el.querySelectorAll('[data-block-text]').forEach(input => input.oninput = () => {
        const block = findBlock(input.dataset.blockText);
        if (!block) return;
        block.text = input.value;
        const trimmed = block.text.trimStart();
        block.commandOpen = trimmed.startsWith('/');
        block.commandQuery = block.commandOpen ? trimmed.replace(/^\//, '').trim() : '';
        touchPage();
        if (block.commandOpen) renderWorkspace();
      });
      el.querySelectorAll('[data-block-content]').forEach(input => input.oninput = () => {
        const block = findBlock(input.dataset.blockContent);
        if (!block) return;
        block.content = input.value;
        touchPage();
      });
      el.querySelectorAll('[data-block-check]').forEach(input => input.onchange = () => {
        const block = findBlock(input.dataset.blockCheck);
        if (!block) return;
        block.checked = input.checked;
        touchPage();
      });
      el.querySelectorAll('[data-block-level]').forEach(select => select.onchange = () => {
        const block = findBlock(select.dataset.blockLevel);
        if (!block) return;
        block.level = Number(select.value || 2);
        touchPage();
        renderWorkspace();
      });
      el.querySelectorAll('[data-toggle-open]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.toggleOpen);
        if (!block) return;
        block.open = !block.open;
        touchPage();
        renderWorkspace();
      });

      el.querySelectorAll('[data-command-type]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.commandFor);
        if (!block) return;
        const converted = normalizeWorkspaceBlock({ ...block, type: btn.dataset.commandType, commandOpen: false, commandQuery: '' });
        Object.assign(block, converted);
        touchPage();
        saveState();
      });

      el.querySelectorAll('[data-block-relation-key]').forEach(select => select.onchange = () => {
        const block = findBlock(select.dataset.blockRelationKey);
        if (!block) return;
        block.relationKey = select.value;
        touchPage();
      });
      el.querySelectorAll('[data-block-relation-add]').forEach(btn => btn.onclick = () => {
        const id = btn.dataset.blockRelationAdd;
        const block = findBlock(id);
        const select = el.querySelector(`[data-block-relation-target="${id}"]`);
        if (!block || !select?.value) return;
        if (!block.targets.includes(select.value)) block.targets.push(select.value);
        touchPage();
        saveState();
      });

      el.querySelectorAll('[data-block-db-add-row]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.blockDbAddRow);
        if (!block) return;
        block.rows.push(Array.from({ length: block.columns.length }, () => ''));
        touchPage();
        saveState();
      });
      el.querySelectorAll('[data-block-db-del-row]').forEach(btn => btn.onclick = () => {
        const [id, rowIdxRaw] = btn.dataset.blockDbDelRow.split(':');
        const block = findBlock(id);
        const rowIdx = Number(rowIdxRaw);
        if (!block || Number.isNaN(rowIdx)) return;
        block.rows.splice(rowIdx, 1);
        touchPage();
        saveState();
      });
      el.querySelectorAll('[data-block-db-add-col]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.blockDbAddCol);
        if (!block) return;
        block.columns.push(`Column ${block.columns.length + 1}`);
        block.rows.forEach(row => row.push(''));
        touchPage();
        saveState();
      });
      el.querySelectorAll('[data-block-db-col]').forEach(input => input.oninput = () => {
        const [id, colRaw] = input.dataset.blockDbCol.split(':');
        const colIdx = Number(colRaw);
        const block = findBlock(id);
        if (!block || Number.isNaN(colIdx)) return;
        block.columns[colIdx] = input.value || `Column ${colIdx + 1}`;
        touchPage();
      });
      el.querySelectorAll('[data-block-db-cell]').forEach(input => input.oninput = () => {
        const [id, rowRaw, colRaw] = input.dataset.blockDbCell.split(':');
        const rowIdx = Number(rowRaw);
        const colIdx = Number(colRaw);
        const block = findBlock(id);
        if (!block || Number.isNaN(rowIdx) || Number.isNaN(colIdx)) return;
        if (!Array.isArray(block.rows[rowIdx])) block.rows[rowIdx] = [];
        block.rows[rowIdx][colIdx] = input.value;
        touchPage();
      });
    }

    function ensureTasksState() {
      if (!state.tasks || typeof state.tasks !== 'object') state.tasks = structuredClone(defaultState.tasks);
      if (!Array.isArray(state.tasks.items)) state.tasks.items = [];
      if (!Array.isArray(state.tasks.sprints)) state.tasks.sprints = [];
      if (!state.tasks.leftTab) state.tasks.leftTab = 'all';
      if (!state.tasks.view) state.tasks.view = 'list';
      if (typeof state.tasks.search !== 'string') state.tasks.search = '';
      if (!state.tasks.priorityFilter) state.tasks.priorityFilter = 'All';
      if (!state.tasks.statusFilter) state.tasks.statusFilter = 'All';
      if (!state.tasks.sprintFilter) state.tasks.sprintFilter = 'all';
      state.tasks.items.forEach(task => {
        if (!task.id) task.id = crypto.randomUUID();
        task.title = String(task.title || 'Untitled Task');
        task.description = String(task.description || '');
        task.dueDate = task.dueDate || '';
        if (!['High', 'Medium', 'Low'].includes(task.priority)) task.priority = 'Medium';
        if (!['To Do', 'In Progress', 'Done'].includes(task.status)) task.status = 'To Do';
        if (!Array.isArray(task.tags)) task.tags = String(task.tags || '').split(',').map(t => t.trim()).filter(Boolean);
        if (!task.createdAt) task.createdAt = new Date().toISOString();
        if (!task.updatedAt) task.updatedAt = task.createdAt;
        if (task.sprintId === undefined) task.sprintId = '';
        if (task.linkRef === undefined) task.linkRef = '';
      });
      state.tasks.sprints.forEach(s => {
        if (!s.id) s.id = crypto.randomUUID();
        s.name = String(s.name || 'Untitled Sprint');
        s.startDate = s.startDate || '';
        s.endDate = s.endDate || '';
        if (!s.createdAt) s.createdAt = new Date().toISOString();
      });
    }

    function taskDateInRange(date, start, end) {
      if (!date) return false;
      const d = new Date(date);
      if (Number.isNaN(d.getTime())) return false;
      const s = new Date(start);
      const e = new Date(end);
      if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return false;
      return d >= s && d <= e;
    }

    function taskMatchesLeftTab(task, tab) {
      const todayIso = new Date().toISOString().slice(0, 10);
      const now = new Date();
      const weekEnd = new Date(now);
      weekEnd.setDate(now.getDate() + 7);
      if (tab === 'today') return task.dueDate === todayIso;
      if (tab === 'week') return !!task.dueDate && new Date(task.dueDate) <= weekEnd && new Date(task.dueDate) >= new Date(todayIso);
      if (tab === 'sprints') return !!task.sprintId;
      if (tab === 'completed') return task.status === 'Done';
      return true;
    }

    function linkedTaskLabel(task) {
      if (!task.linkRef) return 'Not linked';
      const [kind, id] = String(task.linkRef).split(':');
      if (kind === 'note') {
        const note = (state.memory?.insights || []).find(n => n.id === id);
        return `🧠 ${note?.title || 'Missing note'}`;
      }
      if (kind === 'page') {
        const page = (state.workspace?.pages || []).find(p => p.id === id);
        return `📄 ${page?.title || 'Missing page'}`;
      }
      return String(task.linkRef);
    }

    function renderTasks() {
      ensureTasksState();
      const el = document.getElementById('section-tasks');
      const t = state.tasks;
      const priorities = ['All', 'High', 'Medium', 'Low'];
      const statuses = ['All', 'To Do', 'In Progress', 'Done'];
      const leftTabs = [
        { id: 'all', label: 'All Tasks' },
        { id: 'today', label: 'Today' },
        { id: 'week', label: 'This Week' },
        { id: 'sprints', label: 'Sprints' },
        { id: 'completed', label: 'Completed' }
      ];
      const sprintMap = new Map(t.sprints.map(s => [s.id, s]));
      const normalizedSearch = t.search.toLowerCase().trim();
      const filtered = t.items.filter(task => {
        const searchText = `${task.title} ${task.description} ${(task.tags || []).join(' ')} ${linkedTaskLabel(task)}`.toLowerCase();
        const bySearch = !normalizedSearch || searchText.includes(normalizedSearch);
        const byPriority = t.priorityFilter === 'All' || task.priority === t.priorityFilter;
        const byStatus = t.statusFilter === 'All' || task.status === t.statusFilter;
        const bySprint = t.sprintFilter === 'all' || task.sprintId === t.sprintFilter;
        const byLeft = taskMatchesLeftTab(task, t.leftTab);
        return bySearch && byPriority && byStatus && bySprint && byLeft;
      });
      const sorted = [...filtered].sort((a, b) => {
        if (a.status !== b.status) return ['To Do', 'In Progress', 'Done'].indexOf(a.status) - ['To Do', 'In Progress', 'Done'].indexOf(b.status);
        if (!!a.dueDate !== !!b.dueDate) return a.dueDate ? -1 : 1;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        return b.updatedAt.localeCompare(a.updatedAt);
      });
      const selectedTask = t.items.find(task => task.id === t.selectedTaskId) || null;

      const sprintCards = t.sprints.map(sprint => {
        const tasks = t.items.filter(task => task.sprintId === sprint.id);
        const done = tasks.filter(task => task.status === 'Done').length;
        const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
        return `
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3">
            <div class="flex items-start justify-between gap-2">
              <div>
                <p class="font-medium">${escapeHTML(sprint.name)}</p>
                <p class="text-xs text-zinc-500">${escapeHTML(sprint.startDate || 'No start')} → ${escapeHTML(sprint.endDate || 'No end')}</p>
              </div>
              <button data-delete-sprint="${sprint.id}" class="text-xs text-red-400">Delete</button>
            </div>
            <div class="mt-3 h-2 rounded-full bg-zinc-800 overflow-hidden"><div class="h-full bg-[#00d4ff]" style="width:${pct}%"></div></div>
            <p class="text-xs text-zinc-400 mt-2">${done}/${tasks.length} completed (${pct}%)</p>
          </div>
        `;
      }).join('') || '<p class="text-sm text-zinc-500">No sprints yet.</p>';

      const taskCard = (task) => {
        const sprint = sprintMap.get(task.sprintId);
        const prColor = task.priority === 'High' ? 'text-rose-300 border-rose-500/40 bg-rose-500/10' : task.priority === 'Medium' ? 'text-amber-300 border-amber-500/40 bg-amber-500/10' : 'text-emerald-300 border-emerald-500/40 bg-emerald-500/10';
        return `
          <article draggable="${t.view === 'kanban'}" data-task-id="${task.id}" class="task-card bg-zinc-900 border border-zinc-800 rounded-xl p-3 space-y-2 ${t.selectedTaskId === task.id ? 'ring-1 ring-cyan-500/50' : ''}">
            <div class="flex items-start justify-between gap-2">
              <button data-select-task="${task.id}" class="text-left flex-1">
                <p class="font-medium">${escapeHTML(task.title)}</p>
                <p class="text-xs text-zinc-400">${escapeHTML(task.description || 'No description')}</p>
              </button>
              <span class="text-[11px] px-2 py-0.5 rounded border ${prColor}">${task.priority}</span>
            </div>
            <div class="flex flex-wrap gap-1">
              ${(task.tags || []).map(tag => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-cyan-500/15 text-cyan-200 border border-cyan-500/25">${escapeHTML(tag)}</span>`).join('') || '<span class="text-[10px] text-zinc-500">No tags</span>'}
            </div>
            <div class="text-xs text-zinc-500 flex flex-wrap gap-3">
              <span>Due: ${escapeHTML(task.dueDate || '—')}</span>
              <span>Sprint: ${escapeHTML(sprint?.name || 'Backlog')}</span>
              <button data-jump-link="${task.id}" class="text-cyan-300 hover:text-cyan-200">${escapeHTML(linkedTaskLabel(task))}</button>
            </div>
            <div class="flex gap-2">
              <button data-show-related="task:${task.id}" class="text-xs px-2 py-1 rounded bg-cyan-500/15 text-cyan-200 border border-cyan-500/30">Show Related</button>
              <button data-edit-task="${task.id}" class="text-xs px-2 py-1 rounded bg-zinc-800 border border-zinc-700">Edit</button>
              <button data-delete-task="${task.id}" class="text-xs px-2 py-1 rounded bg-red-500/15 text-red-300 border border-red-500/30">Delete</button>
            </div>
          </article>
        `;
      };

      el.innerHTML = `
        <section class="bg-gradient-to-br from-[#0b0f14] to-[#090b10] border border-cyan-500/20 rounded-2xl shadow-neon overflow-hidden">
          <div class="grid xl:grid-cols-[220px_1fr] min-h-[76vh]">
            <aside class="border-r border-zinc-800 bg-[#0b0e13] p-4 space-y-3">
              <h2 class="text-lg font-semibold text-[#00d4ff]">Task & Sprint Manager</h2>
              ${leftTabs.map(tab => `<button data-task-tab="${tab.id}" class="w-full text-left px-3 py-2 rounded-lg border ${t.leftTab === tab.id ? 'bg-cyan-500/15 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-800 hover:border-cyan-500/30'}">${tab.label}</button>`).join('')}
              <div class="pt-3 border-t border-zinc-800 space-y-2">
                <button id="exportTasks" class="w-full px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-sm">Export Tasks & Sprints</button>
                <label class="block w-full px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-sm text-center cursor-pointer">Import Tasks & Sprints<input id="importTasks" type="file" accept="application/json" class="hidden"></label>
                <button id="clearTasks" class="w-full px-3 py-2 rounded bg-red-500/20 border border-red-500/30 text-red-300 text-sm">Clear All Tasks</button>
              </div>
            </aside>

            <div class="p-4 sm:p-5 space-y-4">
              <div class="flex flex-wrap items-center gap-2 justify-between">
                <div class="flex flex-wrap items-center gap-2">
                  <button id="newTaskBtn" class="px-3 py-2 rounded-lg bg-cyan-500/20 text-cyan-200 border border-cyan-500/40">+ New Task</button>
                  <button id="newSprintBtn" class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700">+ New Sprint</button>
                </div>
                <div class="flex items-center gap-2">
                  <button data-view="list" class="px-3 py-2 text-sm rounded-lg border ${t.view === 'list' ? 'bg-cyan-500/15 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-700'}">List</button>
                  <button data-view="kanban" class="px-3 py-2 text-sm rounded-lg border ${t.view === 'kanban' ? 'bg-cyan-500/15 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-700'}">Kanban</button>
                </div>
              </div>

              <div class="grid lg:grid-cols-4 gap-2">
                <input id="taskSearch" value="${escapeAttr(t.search)}" placeholder="Search tasks..." class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm lg:col-span-2" />
                <select id="taskPriorityFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm">${priorities.map(p => `<option ${t.priorityFilter===p?'selected':''}>${p}</option>`).join('')}</select>
                <select id="taskStatusFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm">${statuses.map(s => `<option ${t.statusFilter===s?'selected':''}>${s}</option>`).join('')}</select>
                <select id="taskSprintFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm lg:col-span-2"><option value="all" ${t.sprintFilter==='all'?'selected':''}>All Sprints</option><option value="" ${t.sprintFilter===''?'selected':''}>No Sprint</option>${t.sprints.map(s => `<option value="${s.id}" ${t.sprintFilter===s.id?'selected':''}>${escapeHTML(s.name)}</option>`).join('')}</select>
              </div>

              <div class="grid xl:grid-cols-[1fr_340px] gap-4">
                <section>
                  ${t.view === 'list' ? `
                    <div class="space-y-2">${sorted.map(taskCard).join('') || '<p class="text-sm text-zinc-500">No tasks match your filters.</p>'}</div>
                  ` : `
                    <div class="grid md:grid-cols-3 gap-3">
                      ${['To Do','In Progress','Done'].map(status => `
                        <div data-drop-status="${status}" class="bg-[#0e1218] border border-zinc-800 rounded-xl p-3 min-h-[300px]">
                          <div class="flex items-center justify-between mb-2">
                            <h3 class="font-medium">${status}</h3>
                            <span class="text-xs text-zinc-500">${sorted.filter(task => task.status === status).length}</span>
                          </div>
                          <div class="space-y-2">${sorted.filter(task => task.status === status).map(taskCard).join('') || '<p class="text-xs text-zinc-500">Drop tasks here</p>'}</div>
                        </div>
                      `).join('')}
                    </div>
                  `}
                </section>

                <aside class="space-y-4">

    function ensureAIState() {
      if (!state.ai || typeof state.ai !== 'object') state.ai = {};
      if (!Array.isArray(state.ai.history)) state.ai.history = [];
      if (!state.ai.history.length) {
        state.ai.history.push({
          role: 'assistant',
          message: 'Ready to think like your strategic co-founder. What decision are we making today?',
          structured: {
            answer: 'I can help with strategy, growth, hiring, product, pricing, and execution.',
            why: 'Founders win with fast, high-quality decisions under constraints.',
            steps: ['Share your current goal.', 'Add constraints (time, team, cash).', 'Tell me your target outcome in 30 days.'],
            tip: 'The tighter your constraints, the sharper my plan.',
            next: 'Ask: “I have 4 months runway and rising churn—what should I do first?”'
          },
          ts: new Date().toISOString()
        });
      }
      if (typeof state.ai.thinkStepByStep !== 'boolean') state.ai.thinkStepByStep = false;
      if (!Array.isArray(state.ai.promptSuggestions)) state.ai.promptSuggestions = [];
    }

    function latestFounderContext(limit = 8) {
      const recent = state.ai.history.slice(-limit);
      const userTopics = recent
        .filter(msg => msg.role === 'user')
        .flatMap(msg => (msg.message.toLowerCase().match(/[a-z]{4,}/g) || []))
        .filter(word => !['with', 'that', 'this', 'from', 'your', 'what', 'have', 'need', 'want', 'please', 'help', 'about', 'should', 'could'].includes(word));
      const scores = {};
      userTopics.forEach(word => { scores[word] = (scores[word] || 0) + 1; });
      const topKeywords = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([word]) => word);
      return {
        lastUserMessage: [...recent].reverse().find(msg => msg.role === 'user')?.message || '',
        topKeywords
      };
    }

    function parseMultiPartQuestion(input) {
      return input
        .split(/\n|(?:\s+\d+[\).\-\:]\s+)|(?:\s+\-\s+)|(?:\s+\?\s+)/g)
        .map(part => part.trim())
        .filter(Boolean)
        .slice(0, 4);
    }

      ];
    }

    function aiStructuredResponse(q) {
      ensureAIState();
      const lower = q.toLowerCase();
      const templates = aiTemplateLibrary();
      const base = templates.find(template => template.match.test(lower)) || templates.at(-1);
      const context = latestFounderContext();
      const multiParts = parseMultiPartQuestion(q);
      const hasMultiPart = multiParts.length > 1;
      const reasoning = state.ai.thinkStepByStep
        ? [
            `Understand context: recent focus = ${context.topKeywords.join(', ') || 'general strategy'}.`,
            'Identify the core founder constraint and decision deadline.',
            'Prioritize actions by highest near-term business impact.',
            'Convert strategy into immediate execution steps.'
          ]
        : [];

      let answer = base.answer;
      if (context.topKeywords.length) {
        answer += ` Considering your recent focus on ${context.topKeywords.join(', ')}, this should be prioritized now.`;
      }
      if (hasMultiPart) {
        answer = `You asked ${multiParts.length} connected questions; here is one integrated plan: ${answer}`;
      }

      const stepPrefix = hasMultiPart ? [`Break down the ${multiParts.length} parts and assign one owner per part.`] : [];
      const steps = [...stepPrefix, ...base.steps].slice(0, 5);
      return {
        answer,
        why: base.why,
        steps,
        tip: base.tip,
        next: base.next,
        reasoning,
        multiParts
      };
    }

    function computePromptSuggestions() {
      const context = latestFounderContext(10);
      const baseSuggestions = [
        'Build me a 30-day execution sprint with weekly milestones.',
        'Audit my founder calendar and remove low-leverage tasks.',
        'Create a cash preservation plan for the next 60 days.',
        'Draft a high-signal weekly investor update from my metrics.',
        'Design a retention rescue plan for users dropping in week 1.'
      ];
      const keywordSuggestions = context.topKeywords.map(keyword => `Give me a tactical plan to improve ${keyword} in the next 2 weeks.`);
      const lastMessageSuggestion = context.lastUserMessage
        ? [`Continue from my previous question and convert it into an action checklist: "${context.lastUserMessage.slice(0, 70)}..."`]
        : [];
      state.ai.promptSuggestions = [...keywordSuggestions, ...lastMessageSuggestion, ...baseSuggestions].slice(0, 6);
    }
