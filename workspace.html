<!DOCTYPE html>
<html lang="en" class="h-full bg-[#050505]">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barya Business AI Assistant · Workspace</title>
  <meta name="description" content="Production-ready SaaS dashboard interface for Barya Business AI Assistant." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            glow: '0 0 0 1px rgba(0,245,255,.4), 0 0 24px rgba(0,245,255,.25)',
            card: '0 20px 45px rgba(0,0,0,.45)'
          },
          keyframes: {
            pulseSoft: {
              '0%,100%': { opacity: '0.65', transform: 'scale(1)' },
              '50%': { opacity: '1', transform: 'scale(1.03)' }
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            pulseSoft: 'pulseSoft 1.9s ease-in-out infinite',
            slideUp: 'slideUp .45s ease forwards'
          }
        }
      }
    }
  </script>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(circle at 20% -10%, rgba(0,191,255,.13), transparent 28%), #050505;
    }
    .glass {
      background: rgba(20, 20, 20, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(0,245,255,.14), rgba(0,245,255,.04));
      border-color: rgba(0,245,255,.55);
      color: #dbfcff;
      box-shadow: inset 0 0 0 1px rgba(0,245,255,.15);
    }
    .step.done .dot { background:#00f5ff; border-color:#00f5ff; }
    .step.running .dot { border-color:#00f5ff; }
    .step.pending .dot { border-color: rgba(255,255,255,.35); }
    .spinner {
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #00f5ff;
      border-radius: 9999px;
      width: 14px;
      height: 14px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg);} }
  </style>
</head>
<body class="h-full text-slate-100 antialiased">
  <div class="min-h-screen">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-[280px] -translate-x-full lg:translate-x-0 transition-transform duration-300 bg-[#111111] border-r border-white/10">
      <div class="h-full flex flex-col">
        <div class="px-6 py-6 border-b border-white/10">
          <h1 class="text-2xl font-semibold tracking-tight">Barya</h1>
          <p class="text-xs uppercase tracking-[0.22em] text-slate-400 mt-1">Business AI</p>
        </div>

        <nav class="px-4 py-5 space-y-2 flex-1">
          <button class="nav-item w-full flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-left text-slate-200 transition hover:bg-white/5">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i><span>Dashboard</span>
          </button>
          <button class="nav-item w-full active flex items-center gap-3 rounded-xl border border-cyan-300/40 px-4 py-3 text-left transition">
            <i data-lucide="target" class="w-4 h-4"></i><span>Strategy</span>
          </button>
          <button class="nav-item w-full flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-left text-slate-200 transition hover:bg-white/5">
            <i data-lucide="dollar-sign" class="w-4 h-4"></i><span>Finance</span>
          </button>
          <button class="nav-item w-full flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-left text-slate-200 transition hover:bg-white/5">
            <i data-lucide="book-open" class="w-4 h-4"></i><span>Knowledge Base</span>
          </button>
          <button class="nav-item w-full flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-left text-slate-200 transition hover:bg-white/5">
            <i data-lucide="folder-open" class="w-4 h-4"></i><span>Projects</span>
          </button>
          <button class="nav-item w-full flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-left text-slate-200 transition hover:bg-white/5">
            <i data-lucide="settings" class="w-4 h-4"></i><span>Settings</span>
          </button>
        </nav>

        <div class="p-4 border-t border-white/10">
          <div class="glass rounded-xl px-4 py-3">
            <p class="text-xs text-emerald-300 font-medium">Local-First</p>
            <p class="text-xs text-slate-300 mt-1">All strategy drafts stay on this device.</p>
          </div>
        </div>
      </div>
    </aside>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-30 hidden lg:hidden"></div>

    <header class="fixed top-0 left-0 lg:left-[280px] right-0 z-20 bg-[#0c0c0c]/95 backdrop-blur border-b border-white/10">
      <div class="h-16 px-4 sm:px-6 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <button id="sidebarToggle" class="lg:hidden p-2 rounded-lg border border-white/15 hover:bg-white/5" aria-label="Open menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>

          <button id="projectTitle" class="text-lg font-semibold truncate hover:text-cyan-300 transition">Untitled Startup</button>
          <input id="projectInput" class="hidden bg-white/5 border border-white/20 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-300/60" />
        </div>

        <div class="flex items-center gap-3">
          <div class="hidden sm:flex items-center gap-2 rounded-full border border-emerald-400/35 bg-emerald-400/10 px-3 py-1 text-xs text-emerald-200 animate-pulseSoft">
            <span class="w-2 h-2 rounded-full bg-emerald-300"></span>
            <span>Local-First • On Device</span>
          </div>
          <button class="p-2 rounded-lg border border-white/15 hover:bg-white/5" aria-label="Notifications">
            <i data-lucide="bell" class="w-5 h-5"></i>
          </button>
          <div class="flex items-center gap-2 rounded-full border border-white/15 px-2 py-1.5 bg-white/5">
            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-cyan-300 to-sky-500"></div>
            <span class="text-sm pr-1">Shruti</span>
          </div>
        </div>
      </div>
    </header>

    <main class="lg:pl-[280px] pt-20 pb-10 px-4 sm:px-6">
      <section class="max-w-6xl mx-auto space-y-6">
        <div id="inputSection" class="glass rounded-2xl p-6 sm:p-8 shadow-card transition-all duration-300">
          <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
            <h2 class="text-xl sm:text-2xl font-semibold tracking-tight">Strategy Generator</h2>
            <button id="reloadIdeaBtn" class="text-xs px-3 py-2 rounded-lg border border-white/20 hover:bg-white/5 transition">Reload Saved Idea</button>
          </div>

          <label for="startupIdea" class="text-sm text-slate-300">Describe your startup idea</label>
          <textarea id="startupIdea" rows="8" class="mt-2 w-full rounded-xl bg-[#0b0b0b] border border-white/15 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-cyan-300 focus:shadow-glow transition" placeholder="Example: AI-native procurement copilot for mid-market manufacturing companies..."></textarea>

          <div class="mt-5 grid sm:grid-cols-2 gap-3">
            <button id="deepAnalysisBtn" class="rounded-xl bg-cyan-400 text-black font-semibold px-5 py-3 hover:bg-cyan-300 transition">Deep Analysis (AI)</button>
            <button id="quickBlueprintBtn" class="rounded-xl border border-white/20 bg-white/5 px-5 py-3 font-medium hover:bg-white/10 transition">Quick Blueprint</button>
          </div>
        </div>

        <section id="progressSection" class="hidden glass rounded-2xl p-6 shadow-card">
          <h3 class="text-lg font-semibold">Running strategic synthesis...</h3>
          <p class="text-sm text-slate-400 mt-1">Please wait while Barya builds your execution-first plan.</p>
          <div class="mt-6 space-y-4" id="stepper"></div>
        </section>

        <section id="resultsSection" class="hidden space-y-4">
          <div class="flex items-center justify-between">
            <h3 class="text-xl font-semibold">Strategy Outputs</h3>
            <span id="strategyMode" class="text-xs uppercase tracking-[0.2em] text-cyan-300"></span>
          </div>
          <div id="resultsGrid" class="grid lg:grid-cols-2 gap-4"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const projectTitle = document.getElementById('projectTitle');
    const projectInput = document.getElementById('projectInput');

    const startupIdea = document.getElementById('startupIdea');
    const reloadIdeaBtn = document.getElementById('reloadIdeaBtn');
    const deepAnalysisBtn = document.getElementById('deepAnalysisBtn');
    const quickBlueprintBtn = document.getElementById('quickBlueprintBtn');

    const inputSection = document.getElementById('inputSection');
    const progressSection = document.getElementById('progressSection');
    const stepper = document.getElementById('stepper');
    const resultsSection = document.getElementById('resultsSection');
    const resultsGrid = document.getElementById('resultsGrid');
    const strategyMode = document.getElementById('strategyMode');

    const STEP_LABELS = [
      'Mapping Market Gaps...',
      'Competitive Analysis...',
      'Building GTM Roadmap...',
      'Generating Actionable Strategy...'
    ];

    const RESULT_CARDS = [
      { icon: 'swords', title: 'Competitive Edge', points: ['Position against legacy tools with faster onboarding + domain-specific copilots.', 'Create proprietary data moat by capturing supplier and buyer workflows.', 'Lead with implementation velocity as your defensible advantage.'] },
      { icon: 'megaphone', title: 'Marketing Hacks', points: ['Deploy founder-led weekly teardown videos targeting your ICP pain points.', 'Run high-intent LinkedIn retargeting to demo sign-up funnels.', 'Launch one tactical template per week as a demand magnet.'] },
      { icon: 'cpu', title: 'Tech Stack Suggestion', points: ['Frontend: Next.js + Tailwind + component system with dark-mode defaults.', 'Backend: FastAPI/Node services with event queue for async analysis jobs.', 'AI Layer: Hybrid RAG with local-first encrypted vector storage.'] },
      { icon: 'map', title: 'Go-to-Market Roadmap', points: ['Days 0-30: Nail one vertical, 15 discovery calls, and pilot-ready prototype.', 'Days 31-60: Convert 3 pilots into paid beta with weekly ROI reviews.', 'Days 61-90: Build channel loop through niche consultants and partners.'] },
      { icon: 'line-chart', title: 'Revenue Model Ideas', points: ['Per-seat SaaS + usage-based AI credits for heavy analysis workflows.', 'Premium strategic advisory tier for quarterly execution workshops.', 'Enterprise compliance add-on for data residency + private deployments.'] },
      { icon: 'shield-alert', title: 'Risk & Mitigation', points: ['Risk: Long sales cycle. Mitigation: start with fast pilot contracts.', 'Risk: Model hallucinations. Mitigation: source-attribution + human review gates.', 'Risk: Copycat entrants. Mitigation: own niche workflows and proprietary data.'] }
    ];

    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }

    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }

    sidebarToggle.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);

    function beginRename() {
      projectInput.value = projectTitle.textContent.trim();
      projectTitle.classList.add('hidden');
      projectInput.classList.remove('hidden');
      projectInput.focus();
      projectInput.select();
    }

    function finishRename() {
      const val = projectInput.value.trim() || 'Untitled Startup';
      projectTitle.textContent = val;
      localStorage.setItem('barya.projectTitle', val);
      projectInput.classList.add('hidden');
      projectTitle.classList.remove('hidden');
    }

    projectTitle.addEventListener('click', beginRename);
    projectInput.addEventListener('blur', finishRename);
    projectInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        finishRename();
      }
      if (e.key === 'Escape') {
        projectInput.classList.add('hidden');
        projectTitle.classList.remove('hidden');
      }
    });

    function saveIdea() {
      localStorage.setItem('barya.savedIdea', startupIdea.value.trim());
    }

    startupIdea.addEventListener('input', saveIdea);

    reloadIdeaBtn.addEventListener('click', () => {
      const saved = localStorage.getItem('barya.savedIdea');
      if (saved) startupIdea.value = saved;
    });

    function renderStepper(currentIndex) {
      stepper.innerHTML = STEP_LABELS.map((label, idx) => {
        const state = idx < currentIndex ? 'done' : idx === currentIndex ? 'running' : 'pending';
        return `
          <div class="step ${state} flex items-center justify-between rounded-xl border border-white/10 bg-black/25 px-4 py-3">
            <div class="flex items-center gap-3">
              <span class="dot w-4 h-4 rounded-full border-2"></span>
              <p class="text-sm">${label}</p>
            </div>
            <div class="text-xs text-slate-400">
              ${state === 'done' ? '<span class="text-cyan-300">Done</span>' : state === 'running' ? '<span class="inline-flex items-center gap-2"><span class="spinner"></span>Running</span>' : 'Queued'}
            </div>
          </div>
        `;
      }).join('');
    }

    function cardTemplate(card) {
      const pointList = card.points.map(point => `<li class="leading-relaxed">${point}</li>`).join('');
      return `
        <article class="glass rounded-2xl p-5 shadow-card animate-slideUp transition hover:-translate-y-1">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-9 h-9 rounded-lg bg-cyan-300/15 border border-cyan-300/35 flex items-center justify-center">
              <i data-lucide="${card.icon}" class="w-4 h-4 text-cyan-300"></i>
            </div>
            <h4 class="font-semibold text-lg">${card.title}</h4>
          </div>
          <ul class="text-sm text-slate-200/90 space-y-2 list-disc pl-5">${pointList}</ul>
          <div class="mt-5 flex flex-wrap gap-2">
            <button class="action-btn rounded-lg border border-white/20 px-3 py-2 text-xs hover:bg-white/10 transition" data-action="save" data-title="${card.title}">Save to Workspace</button>
            <button class="action-btn rounded-lg border border-white/20 px-3 py-2 text-xs hover:bg-white/10 transition" data-action="pdf" data-title="${card.title}">Export as PDF</button>
            <button class="action-btn rounded-lg border border-white/20 px-3 py-2 text-xs hover:bg-white/10 transition" data-action="copy" data-title="${card.title}">Copy to Clipboard</button>
          </div>
        </article>
      `;
    }

    function renderResults(mode) {
      strategyMode.textContent = mode;
      resultsGrid.innerHTML = RESULT_CARDS.map(cardTemplate).join('');
      lucide.createIcons();
      bindCardActions();
    }

    function bindCardActions() {
      document.querySelectorAll('.action-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const title = btn.dataset.title;
          const action = btn.dataset.action;
          const payload = RESULT_CARDS.find(card => card.title === title);
          if (!payload) return;

          if (action === 'save') {
            const saved = JSON.parse(localStorage.getItem('barya.savedCards') || '[]');
            saved.push({ ...payload, savedAt: new Date().toISOString() });
            localStorage.setItem('barya.savedCards', JSON.stringify(saved));
            btn.textContent = 'Saved';
          }

          if (action === 'copy') {
            const text = `${payload.title}\n- ${payload.points.join('\n- ')}`;
            try {
              await navigator.clipboard.writeText(text);
              btn.textContent = 'Copied';
            } catch {
              btn.textContent = 'Clipboard blocked';
            }
          }

          if (action === 'pdf') {
            const text = `${payload.title}\n\n${payload.points.map((p, i) => `${i + 1}. ${p}`).join('\n')}`;
            const blob = new Blob([text], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${payload.title.replace(/\s+/g, '-').toLowerCase()}.pdf`;
            link.click();
            URL.revokeObjectURL(link.href);
          }

          setTimeout(() => {
            if (action !== 'save') btn.textContent = action === 'copy' ? 'Copy to Clipboard' : 'Export as PDF';
          }, 1200);
        });
      });
    }

    async function runGeneration(modeLabel) {
      if (!startupIdea.value.trim()) {
        startupIdea.focus();
        startupIdea.classList.add('ring-2', 'ring-red-400/60');
        setTimeout(() => startupIdea.classList.remove('ring-2', 'ring-red-400/60'), 1200);
        return;
      }

      saveIdea();
      inputSection.classList.add('opacity-30', 'pointer-events-none');
      progressSection.classList.remove('hidden');
      resultsSection.classList.add('hidden');

      for (let i = 0; i < STEP_LABELS.length; i += 1) {
        renderStepper(i);
        await new Promise(resolve => setTimeout(resolve, i === 1 ? 2200 : 1400));
      }

      renderStepper(STEP_LABELS.length);
      await new Promise(resolve => setTimeout(resolve, 800));

      progressSection.classList.add('hidden');
      inputSection.classList.remove('opacity-30', 'pointer-events-none');
      resultsSection.classList.remove('hidden');
      renderResults(modeLabel);
    }

    deepAnalysisBtn.addEventListener('click', () => runGeneration('Deep Analysis'));
    quickBlueprintBtn.addEventListener('click', () => runGeneration('Quick Blueprint'));

    (function boot() {
      const savedTitle = localStorage.getItem('barya.projectTitle');
      if (savedTitle) projectTitle.textContent = savedTitle;
      const savedIdea = localStorage.getItem('barya.savedIdea');
      if (savedIdea) startupIdea.value = savedIdea;
    })();
  </script>
</body>
</html>
