              <p>${escapeHTML(structured.answer)}</p>
              <p class="text-[11px] uppercase tracking-wide text-cyan-300 pt-1">Why It Matters</p>
              <p>${escapeHTML(structured.why)}</p>
              <p class="text-[11px] uppercase tracking-wide text-cyan-300 pt-1">Action Steps</p>
              <ol class="list-decimal pl-5 space-y-1">${(structured.steps || []).map(step => `<li>${escapeHTML(step)}</li>`).join('')}</ol>
              <p class="text-[11px] uppercase tracking-wide text-cyan-300 pt-1">Founder Tip</p>
              <p>${escapeHTML(structured.tip)}</p>
              <p class="text-[11px] uppercase tracking-wide text-cyan-300 pt-1">Next Move</p>
              <p>${escapeHTML(structured.next)}</p>
              ${(state.ai.thinkStepByStep && structured.reasoning?.length)
                ? `<details class="pt-2"><summary class="cursor-pointer text-xs text-cyan-200">Reasoning Path</summary><ul class="list-disc pl-5 mt-2 text-sm text-zinc-300">${structured.reasoning.map(step => `<li>${escapeHTML(step)}</li>`).join('')}</ul></details>`
                : ''}
            </div>
          `;
        }
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
      }

      state.ai.history.forEach(appendMessage);

      function sendQuestion(question) {
        const q = question.trim();
        if (!q) return;
        const nowISO = new Date().toISOString();
        const userMsg = { role: 'user', message: q, ts: nowISO };
        registerMentionsFromText(q, 'ai-user');
        const structured = aiStructuredResponse(q);
        const aiMsg = { role: 'assistant', message: structured.answer, structured, ts: nowISO };
        registerMentionsFromText(`${structured.answer} ${(structured.steps || []).join(' ')}`, 'ai-assistant');
        state.ai.history.push(userMsg, aiMsg);
        saveStateRaw();
        renderAI();
      }

      document.getElementById('chatForm').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('chatInput');
        sendQuestion(input.value);
      };
      document.getElementById('aiShowRelated').onclick = () => {
        const latestUser = [...state.ai.history].reverse().find(msg => msg.role === 'user');
        const hinted = latestUser ? (wikiLinkTitles(latestUser.message)[0] || '') : '';
        const ref = findRefByTitle(hinted) || (buildKnowledgeGraph().nodes.find(node => node.section === 'ai')?.ref || '');
        if (ref) showRelated(ref);
      };
      document.getElementById('thinkToggle').onchange = (e) => {
        state.ai.thinkStepByStep = !!e.target.checked;
        saveStateRaw();
        renderAI();
      };
      document.getElementById('clearChat').onclick = () => {
        if (!confirm('Clear entire Barya AI chat history? This action cannot be undone.')) return;
        state.ai.history = [];
        ensureAIState();
        saveStateRaw();
        renderAI();
      };
      el.querySelectorAll('[data-quick]').forEach(btn => btn.onclick = () => sendQuestion(btn.dataset.quick));
      el.querySelectorAll('[data-suggestion]').forEach(btn => btn.onclick = () => sendQuestion(state.ai.promptSuggestions[Number(btn.dataset.suggestion)] || ''));
      document.getElementById('exportChat').onclick = () => downloadJSON('chat-history.json', state.ai.history);
      document.getElementById('importChat').onchange = (e) => importJSONFile(e.target.files[0], (data) => {
        if (!Array.isArray(data)) return;
        state.ai.history = data
          .filter(item => item && (item.role === 'user' || item.role === 'assistant'))
          .map(item => ({
            role: item.role,
            message: String(item.message || ''),
            structured: item.structured || (item.role === 'assistant' ? aiStructuredResponse(String(item.message || '')) : undefined),
            ts: item.ts || new Date().toISOString()
          }));
        ensureAIState();
        saveStateRaw();
        renderAI();
      });
    }

    function renderMemory() {
      const el = document.getElementById('section-memory');
      const memory = state.memory || (state.memory = {});
      if (!Array.isArray(memory.insights)) memory.insights = [];
      if (!Array.isArray(memory.actions)) memory.actions = [];
      if (typeof memory.search !== 'string') memory.search = '';
      if (!memory.viewMode) memory.viewMode = 'list';
      if (!memory.leftTab) memory.leftTab = 'all';
      if (!memory.activeNoteId && memory.insights[0]) memory.activeNoteId = memory.insights[0].id;

      const normalizeTags = (input) => String(input || '')
        .split(',')
        .map(tag => tag.trim())
        .filter(Boolean)
        .filter((tag, idx, arr) => arr.findIndex(t => t.toLowerCase() === tag.toLowerCase()) === idx);
      memory.insights.forEach(note => {
        if (!note.id) note.id = crypto.randomUUID();
        if (!note.title) note.title = 'Untitled Note';
        if (typeof note.content !== 'string') note.content = String(note.content || '');
        if (!note.ts) note.ts = new Date().toISOString();
        if (!Array.isArray(note.tags)) note.tags = normalizeTags(note.tag || 'General');
        if (!note.tags.length) note.tags = ['General'];
        note.tag = note.tags.join(', ');
        if (typeof note.isDaily !== 'boolean') note.isDaily = /^\d{4}-\d{2}-\d{2}/.test(note.title);
      });

      const noteByTitle = new Map(memory.insights.map(note => [note.title.toLowerCase(), note]));
      const extractLinks = (content) => {
        const links = [];
        const regex = /\[\[([^\]]+)\]\]/g;
        let match;
        while ((match = regex.exec(content || '')) !== null) {
          const title = match[1].trim();
          if (title) links.push(title);
        }
        return [...new Set(links)];
      };

      memory.insights.forEach(note => {
        note.links = extractLinks(note.content)
          .map(title => noteByTitle.get(title.toLowerCase()))
          .filter(Boolean)
          .map(n => n.id);
      });

      const backlinksMap = {};
      memory.insights.forEach(note => {
        note.links.forEach(targetId => {
          if (!backlinksMap[targetId]) backlinksMap[targetId] = [];
          backlinksMap[targetId].push(note.id);
        });
      });

      let activeNote = memory.insights.find(n => n.id === memory.activeNoteId) || null;
      if (!activeNote && memory.insights.length) {
        activeNote = memory.insights[0];
        memory.activeNoteId = activeNote.id;
      }

      const q = memory.search.toLowerCase();
      const filteredNotes = memory.insights.filter(note => {
        const tags = (note.tags || []).join(' ');
        return `${note.title} ${note.content} ${tags}`.toLowerCase().includes(q);
      });
      const dailyNotes = filteredNotes.filter(note => note.isDaily);
      const allNotes = filteredNotes;
      const visibleNotes = memory.leftTab === 'daily' ? dailyNotes : allNotes;

      const dailyISO = new Date().toISOString().slice(0, 10);
      const graphNodes = filteredNotes.map((note, idx, arr) => {
        const cx = 300 + 220 * Math.cos((Math.PI * 2 * idx) / Math.max(1, arr.length));
        const cy = 210 + 160 * Math.sin((Math.PI * 2 * idx) / Math.max(1, arr.length));
        return { id: note.id, title: note.title, x: cx, y: cy, r: note.id === memory.activeNoteId ? 16 : 11 };
      });
      const nodeMap = new Map(graphNodes.map(n => [n.id, n]));

      el.innerHTML = `
        <section class="bg-gradient-to-br from-[#0e1118] via-[#0a0e14] to-[#080b10] border border-cyan-500/20 rounded-2xl shadow-neon overflow-hidden transition-all duration-300">
          <div class="grid xl:grid-cols-[250px_1fr] min-h-[72vh]">
            <aside class="border-r border-zinc-800/80 bg-[#0b0f16] p-4 space-y-4">
              <div>
                <p class="text-xs uppercase tracking-[0.22em] text-cyan-300/80 mb-2">Memory Vault</p>
                <h2 class="text-xl font-semibold text-barya-accent">Advanced Memory</h2>
                <p class="text-xs text-zinc-400 mt-1">Founder's second brain, local-first.</p>
              </div>

              <div class="space-y-2">
                <button data-memory-tab="daily" class="w-full text-left px-3 py-2 rounded-lg border transition ${memory.leftTab === 'daily' ? 'border-cyan-400/60 bg-cyan-400/10 text-cyan-200' : 'border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30'}">Daily Notes</button>
                <button data-memory-tab="all" class="w-full text-left px-3 py-2 rounded-lg border transition ${memory.leftTab === 'all' ? 'border-cyan-400/60 bg-cyan-400/10 text-cyan-200' : 'border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30'}">All Notes</button>
                <button id="memorySidebarGraph" class="w-full text-left px-3 py-2 rounded-lg border border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30">Graph</button>
              </div>

              <div class="space-y-2">
                <button id="newDailyNote" class="w-full px-3 py-2 rounded-lg bg-cyan-500/20 text-cyan-200 border border-cyan-500/40 hover:bg-cyan-500/30 transition">New Daily Note</button>
                <button id="newMemoryNote" class="w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/40 transition">New Note</button>
              </div>

              <div class="pt-2 border-t border-zinc-800 space-y-2">
                <button id="exportMemory" class="w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/30 text-sm">Export Full Memory (JSON)</button>
                <label class="block w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/30 text-sm text-center cursor-pointer">Import Memory<input id="importMemory" type="file" accept="application/json" class="hidden"></label>
                <button id="clearMemory" class="w-full px-3 py-2 rounded-lg bg-red-500/15 text-red-300 border border-red-500/30 hover:bg-red-500/25 text-sm">Clear All Memory</button>
              </div>
            </aside>

            <div class="p-4 sm:p-5 space-y-4">
              <div class="flex flex-wrap items-center gap-2 justify-between">
                <div class="flex items-center gap-2">
                  <input id="memorySearch" placeholder="Search title, content, tags..." value="${escapeAttr(memory.search)}" class="w-[min(420px,78vw)] bg-zinc-900/90 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:border-cyan-400 outline-none" />
                  <button id="memoryToggleView" class="px-3 py-2 rounded-lg border ${memory.viewMode === 'graph' ? 'bg-cyan-500/20 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-700'} text-sm">${memory.viewMode === 'graph' ? 'Switch to List' : 'Show Graph View'}</button>
                </div>
                <p class="text-xs text-zinc-400">${visibleNotes.length} visible · ${memory.insights.length} total notes</p>
              </div>

              <div class="grid xl:grid-cols-[300px_1fr] gap-4">
                <section class="bg-[#0f141e] border border-zinc-800 rounded-xl p-3 max-h-[62vh] overflow-auto scrollbar-thin">
                  <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">${memory.leftTab === 'daily' ? 'Daily Notes' : 'All Notes'}</p>
                  <div class="space-y-2">
                    ${visibleNotes.map(note => `
                      <button data-open-note="${note.id}" class="w-full text-left rounded-lg border p-2 transition ${note.id === memory.activeNoteId ? 'border-cyan-500/60 bg-cyan-500/10' : 'border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30'}">
                        <div class="flex items-center justify-between gap-2">
                          <p class="font-medium truncate">${escapeHTML(note.title)}</p>
                          ${note.isDaily ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-cyan-500/20 text-cyan-200">Daily</span>' : ''}
                        </div>
                        <p class="text-xs text-zinc-500 truncate mt-1">${escapeHTML((note.tags || []).join(', ') || 'General')}</p>
                      </button>
                    `).join('') || emptyStateMarkup('📝', 'No notes yet', 'Create your first note to build long-term founder memory.')}
                  </div>
                </section>

                <section class="bg-[#0f141e] border border-zinc-800 rounded-xl p-4">
                  ${memory.viewMode === 'graph' ? `
                    <div class="space-y-3">
                      <h3 class="text-lg font-semibold text-cyan-200">Memory Graph</h3>
                      <p class="text-xs text-zinc-400">Click a node to open note. Links come from <span class="text-cyan-300">[[Note Title]]</span>.</p>
                      <canvas id="memoryGraphCanvas" width="620" height="420" class="w-full bg-[#0b111a] border border-zinc-800 rounded-lg"></canvas>
                    </div>
                  ` : activeNote ? `
                    <div class="space-y-3">
                      <div class="grid sm:grid-cols-2 gap-2">
                        <input id="noteTitle" value="${escapeAttr(activeNote.title)}" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 font-semibold" />
                        <input id="noteTags" value="${escapeAttr((activeNote.tags || []).join(', '))}" placeholder="Tags: strategy, growth" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
                        <button id="memoryShowRelated" class="px-3 py-2 rounded-lg bg-cyan-500/15 border border-cyan-500/35 text-cyan-200 text-sm">Show Related</button>
                      </div>
                      <textarea id="noteContent" rows="13" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-3 font-mono text-sm leading-6 focus:border-cyan-400 outline-none" placeholder="Use [[Note Title]] to link notes...">${escapeHTML(activeNote.content)}</textarea>
                      <div class="flex flex-wrap items-center gap-2 justify-between">
                        <p class="text-xs text-zinc-500">Auto-saved · Updated ${new Date(activeNote.ts).toLocaleString()}</p>
                        <button id="deleteActiveNote" class="px-3 py-2 rounded-lg bg-red-500/15 text-red-300 border border-red-500/30">Delete Note</button>
                      </div>

                      <div class="grid md:grid-cols-2 gap-3 pt-2 border-t border-zinc-800">
                        <div>
                          <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">Outgoing Links</p>
                          <div class="space-y-1 max-h-32 overflow-auto scrollbar-thin pr-1">
                            ${(activeNote.links || []).map(linkedId => {
                              const linked = memory.insights.find(n => n.id === linkedId);
                              return linked ? `<button data-open-note="${linked.id}" class="block text-left text-sm text-cyan-300 hover:text-cyan-200">→ ${escapeHTML(linked.title)}</button>` : '';
                            }).join('') || '<p class="text-sm text-zinc-500">No links yet.</p>'}
                          </div>
                        </div>
                        <div>
                          <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">Backlinks</p>
                          <div class="space-y-1 max-h-32 overflow-auto scrollbar-thin pr-1">
                            ${(backlinksMap[activeNote.id] || []).map(backId => {
                              const back = memory.insights.find(n => n.id === backId);
                              return back ? `<button data-open-note="${back.id}" class="block text-left text-sm text-emerald-300 hover:text-emerald-200">← ${escapeHTML(back.title)}</button>` : '';
                            }).join('') || '<p class="text-sm text-zinc-500">No backlinks yet.</p>'}
                          </div>
                        </div>
                      </div>
                    </div>
                  ` : '<p class="text-zinc-500">Create your first note to start building your memory graph.</p>'}
                </section>
              </div>

              <section class="bg-[#0f141e] border border-zinc-800 rounded-xl p-4">
                <h3 class="font-semibold mb-3">Recent Actions</h3>
                <form id="actionForm" class="grid md:grid-cols-[1fr_140px_170px_auto] gap-2 mb-3">
                  <input id="actionText" placeholder="Action (e.g. Follow up with investor)" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                  <select id="actionCategory" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2">
                    <option>Product</option><option>Customer</option><option>Finance</option><option>Ops</option>
                  </select>
                  <select id="actionLink" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2">
                    <option value="">Link to note/page</option>
                    ${memory.insights.slice(0, 30).map(note => `<option value="note:${note.id}">🧠 ${escapeHTML(note.title)}</option>`).join('')}
                    ${(state.workspace?.pages || []).slice(0, 20).map(page => `<option value="page:${page.id}">📄 ${escapeHTML(page.title)}</option>`).join('')}
                  </select>
                  <button class="px-3 py-2 rounded bg-cyan-500/20 border border-cyan-500/30 text-cyan-300">Add Action</button>
                </form>
                <ul class="space-y-2 max-h-[28vh] overflow-auto scrollbar-thin pr-1">
                  ${memory.actions.map(action => {
                    const linked = (action.linkRef || '').split(':');
                    const kind = linked[0];
                    const id = linked[1];
                    const linkedLabel = kind === 'note'
                      ? (memory.insights.find(n => n.id === id)?.title || 'Missing note')
                      : kind === 'page'
                        ? ((state.workspace?.pages || []).find(p => p.id === id)?.title || 'Missing page')
                        : '';
                    return `
                      <li class="bg-zinc-900 border border-zinc-800 rounded p-2 text-sm flex justify-between gap-3">
                        <div>
                          <p>${escapeHTML(action.text)} <span class="text-zinc-500">(${escapeHTML(action.category)})</span></p>
                          ${linkedLabel ? `<button data-jump="${escapeAttr(action.linkRef)}" class="text-xs text-cyan-300 hover:text-cyan-200">Linked: ${escapeHTML(linkedLabel)}</button>` : '<p class="text-xs text-zinc-500">Not linked</p>'}
                        </div>
                        <button data-del-action="${action.id}" class="text-red-400 text-xs">Delete</button>
                      </li>
                    `;
                  }).join('') || `<li>${emptyStateMarkup('🚀', 'No actions yet', 'Capture your next action item and keep execution momentum.')}</li>`}
                </ul>
              </section>
            </div>
          </div>
        </section>
      `;

      const openNote = (noteId) => {
        memory.activeNoteId = noteId;
        memory.viewMode = 'list';
        saveState();
      };

      el.querySelectorAll('[data-memory-tab]').forEach(btn => {
        btn.onclick = () => {
          memory.leftTab = btn.dataset.memoryTab;
          saveState();
        };
      });

      document.getElementById('memorySidebarGraph').onclick = () => {
        memory.viewMode = 'graph';
        saveState();
      };

      document.getElementById('memoryToggleView').onclick = () => {
        memory.viewMode = memory.viewMode === 'graph' ? 'list' : 'graph';
        saveState();
      };

      document.getElementById('memorySearch').oninput = (e) => {
        memory.search = e.target.value;
        saveState();
      };

      document.getElementById('newMemoryNote').onclick = () => {
        const note = {
          id: crypto.randomUUID(),
          title: `Note ${memory.insights.length + 1}`,
          content: '',
          tags: ['General'],
          tag: 'General',
          ts: new Date().toISOString(),
          isDaily: false,
          links: []
        };
        memory.insights.unshift(note);
        memory.activeNoteId = note.id;
        memory.leftTab = 'all';
        memory.viewMode = 'list';
        saveState();
      };

      document.getElementById('newDailyNote').onclick = () => {
        const existing = memory.insights.find(n => n.isDaily && n.title === dailyISO);
        if (existing) {
          memory.activeNoteId = existing.id;
          memory.leftTab = 'daily';
          memory.viewMode = 'list';
          saveState();
          return;
        }
        const note = {
          id: crypto.randomUUID(),
          title: dailyISO,
          content: `# Daily Note ${dailyISO}\n\n## Priorities\n- \n\n## Wins\n- `,
          tags: ['Daily', 'Journal'],
          tag: 'Daily, Journal',
          ts: new Date().toISOString(),
          isDaily: true,
          links: []
        };
        memory.insights.unshift(note);
        memory.activeNoteId = note.id;
        memory.leftTab = 'daily';
        memory.viewMode = 'list';
        saveState();
      };

      el.querySelectorAll('[data-open-note]').forEach(btn => {
        btn.onclick = () => openNote(btn.dataset.openNote);
      });

      if (activeNote && memory.viewMode !== 'graph') {
        const showRelatedBtn = document.getElementById('memoryShowRelated');
        if (showRelatedBtn) showRelatedBtn.onclick = () => showRelated(`note:${activeNote.id}`);
        document.getElementById('noteTitle').oninput = (e) => {
          activeNote.title = e.target.value.trim() || 'Untitled Note';
          activeNote.isDaily = /^\d{4}-\d{2}-\d{2}/.test(activeNote.title);
          activeNote.ts = new Date().toISOString();
          saveState();
        };
        document.getElementById('noteTags').oninput = (e) => {
          activeNote.tags = normalizeTags(e.target.value);
          if (!activeNote.tags.length) activeNote.tags = ['General'];
          activeNote.tag = activeNote.tags.join(', ');
          activeNote.ts = new Date().toISOString();
          saveState();
        };
        document.getElementById('noteContent').oninput = (e) => {
          activeNote.content = e.target.value;
          activeNote.ts = new Date().toISOString();
          saveState();
        };
        document.getElementById('deleteActiveNote').onclick = () => {
          memory.insights = memory.insights.filter(note => note.id !== activeNote.id);
          if (memory.activeNoteId === activeNote.id) memory.activeNoteId = memory.insights[0]?.id || null;
          memory.actions = memory.actions.filter(action => action.linkRef !== `note:${activeNote.id}`);
          saveState();
        };
      }

      if (memory.viewMode === 'graph') {
        const canvas = document.getElementById('memoryGraphCanvas');
        const ctx = canvas?.getContext('2d');
        if (ctx) {
          const draw = (hoverId = null) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0b111a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 1.3;
            filteredNotes.forEach(note => {
              const from = nodeMap.get(note.id);
              (note.links || []).forEach(targetId => {
                const to = nodeMap.get(targetId);
                if (!from || !to) return;
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.35)';
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
              });
            });

            graphNodes.forEach(node => {
              const isActive = node.id === memory.activeNoteId;
              const isHover = node.id === hoverId;
              ctx.beginPath();
              ctx.arc(node.x, node.y, isHover ? node.r + 3 : node.r, 0, Math.PI * 2);
              ctx.fillStyle = isActive ? '#00d4ff' : '#1e293b';
              ctx.fill();
              ctx.lineWidth = isActive ? 2 : 1;
              ctx.strokeStyle = isActive ? 'rgba(0, 212, 255, 0.8)' : 'rgba(148, 163, 184, 0.35)';
              ctx.stroke();

              ctx.fillStyle = isActive ? '#001018' : '#dbeafe';
              ctx.font = '12px sans-serif';
              ctx.fillText(node.title.slice(0, 18), node.x + 14, node.y + 4);
            });
          };

          const getNodeAt = (evt) => {
            const rect = canvas.getBoundingClientRect();
            const x = (evt.clientX - rect.left) * (canvas.width / rect.width);
            const y = (evt.clientY - rect.top) * (canvas.height / rect.height);
            return graphNodes.find(node => Math.hypot(node.x - x, node.y - y) <= node.r + 4) || null;
          };

          draw();
          canvas.onmousemove = (evt) => {
            const hit = getNodeAt(evt);
            canvas.style.cursor = hit ? 'pointer' : 'default';
            draw(hit?.id || null);
          };
          canvas.onclick = (evt) => {
            const hit = getNodeAt(evt);
            if (!hit) return;
            memory.activeNoteId = hit.id;
            memory.viewMode = 'list';
            saveState();
          };
        }
      }

      document.getElementById('actionForm').onsubmit = (e) => {
        e.preventDefault();
        const text = document.getElementById('actionText').value.trim();
        if (!text) return;
        const category = document.getElementById('actionCategory').value;
        const linkRef = document.getElementById('actionLink').value;
        memory.actions.unshift({
          id: crypto.randomUUID(),
          text,
          category,
          linkRef,
          ts: new Date().toISOString()
        });
        saveState();
      };

      el.querySelectorAll('[data-jump]').forEach(btn => {
        btn.onclick = () => {
          const [kind, id] = (btn.dataset.jump || '').split(':');
          if (kind === 'note' && id) {
            openNote(id);
          } else if (kind === 'page' && id) {
            state.activeSection = 'workspace';

      function strategyTemplates(query = '') {
        const q = query.toLowerCase();
        if (/(saas|b2b|software|platform)/i.test(q)) {
          return {
            market: ['B2B SaaS spend continues double-digit growth in automation and vertical tools.', 'Fastest expansion in workflow AI copilots and industry-specific solutions.', 'Enterprise buyers prioritize ROI visibility and compliance readiness.'],
            competitors: ['Incumbents: broad suites with slower onboarding and high implementation costs.', 'Startups: niche-first products with faster iteration but weaker distribution.', 'Open-source alternatives increase switching pressure for technical buyers.'],
            painPoints: ['Onboarding complexity delays first value.', 'Tool sprawl increases operational cost and context switching.', 'Founders struggle to prove ROI quickly to finance stakeholders.'],
            opportunities: ['Ship fast setup + guided activation as a wedge.', 'Bundle insights dashboard that translates product value into dollar impact.', 'Target underserved sub-segments where incumbents are too generic.']
          };
        }
        if (/(ecommerce|d2c|retail|store)/i.test(q)) {
          return {
            market: ['D2C growth remains resilient in premium and repeat-purchase categories.', 'Customer acquisition costs are volatile across paid channels.', 'Retail media partnerships are becoming a key growth lever.'],
            competitors: ['Marketplace-native sellers optimize for price and logistics.', 'Premium brands win on trust, content, and retention programs.', 'Aggregator brands have scale but weaker personalization.'],
            painPoints: ['High CAC compresses margins.', 'Low repeat purchase due to weak lifecycle journeys.', 'Inventory forecasting errors drive stockouts or excess.'],
            opportunities: ['Focus on high-LTV cohorts with personalized replenishment flows.', 'Create content-led acquisition loops to reduce dependency on paid ads.', 'Add post-purchase value propositions to increase retention.']
          };
        }
        return {
          market: ['Growing demand for focused products that remove specific workflow friction.', 'Capital-efficient startups are preferred due to uncertain funding cycles.', 'AI-enhanced offerings are expected even in non-technical categories.'],
          competitors: ['General tools offer breadth but low specialization.', 'Emerging startups compete on speed and user-centric workflows.', 'Manual alternatives still dominate where software onboarding is painful.'],
          painPoints: ['Users face fragmented tools and unclear outcomes.', 'Decision-makers need clear ROI before adoption.', 'Existing offerings often require too much setup and training.'],
          opportunities: ['Own one urgent use case end-to-end before expanding.', 'Design measurable outcomes into onboarding.', 'Use founder-led distribution to validate demand quickly.']
        };
      }

      function buildResearchSession(query, followUpText = '') {
        const template = strategyTemplates(query);
        const insight = followUpText ? `Follow-up lens: ${followUpText}.` : 'Initial research pass.';
        return {
          id: crypto.randomUUID(),
          ts: new Date().toISOString(),
          query,
          followUp: followUpText,
          deep: {
            summary: `${insight} Recommended founder move: prioritize one monetizable wedge, validate with interviews, and launch a 14-day test cycle.`,
            priorities: [
              'Validate willingness-to-pay with 5 targeted discovery calls.',
              'Ship one measurable value moment inside onboarding this week.',
              'Define a channel cadence with weekly conversion review.'
            ]
          },
          cards: {
            market: template.market,
            competitors: template.competitors,
            painPoints: template.painPoints,
            opportunities: template.opportunities,
            sources: [
              'PitchBook 2026 Sector Brief (simulated local summary)',
              'CB Insights Market Map Q1 2026 (simulated local summary)',
              'G2 Category Reviews trendline (simulated local summary)',
              'Founder interview synthesis from session memory (simulated)'
            ]
          }
        };
      }

      el.querySelectorAll('[data-guide]').forEach(cb => cb.onchange = () => {

          description: `From Business Planning → ${guide.title}`,
          dueDate: '',

          linkRef: '',
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()

      document.getElementById('strategyIdeaInput').oninput = (e) => {

        saveStateRaw();

      const runResearch = (baseQuery, follow = '') => {
        const query = String(baseQuery || '').trim();
        if (!query) return;
        strategy.loading = true;
        saveStateRaw();
        renderPlanning();
        setTimeout(() => {

          registerMentionsFromText(`${session.query} ${session.deep.summary} ${(session.cards.opportunities || []).join(' ')}`, 'research');
          strategy.sessions.unshift(session);
          strategy.activeSessionId = session.id;
          strategy.loading = false;
          strategy.mode = strategy.mode || 'research';
          saveStrategyState();
        }, 850);

      if (generateBtn) {
        generateBtn.onclick = () => runResearch(strategy.idea);

        downloadJSON(`research-report-${new Date().toISOString().slice(0,10)}.json`, session);
      };

      document.getElementById('exportResearchText').onclick = () => {
        const session = strategy.sessions.find(s => s.id === strategy.activeSessionId) || strategy.sessions[0];
        if (!session) return alert('No research session to export.');

          `Research Report`,
          `Date: ${new Date(session.ts).toLocaleString()}`,
          `Query: ${session.query}`,
          ``,

          `Market Size & Trends`,

    function renderKnowledgeGraph() {
      ensureKnowledgeGraphState();
      const el = document.getElementById('section-knowledge-graph');
      const kg = state.knowledgeGraph;
      const graph = buildKnowledgeGraph();
      const filters = ['all', 'Page', 'Note', 'Daily Note', 'Task', 'Research', 'Mention'];
      const q = kg.search.toLowerCase().trim();
      const visibleNodes = graph.nodes.filter(node => {
        const byQuery = !q || `${node.label} ${node.type}`.toLowerCase().includes(q);
        const byFilter = kg.filter === 'all' || node.type === kg.filter;
        return byQuery && byFilter;
      });
      const visibleSet = new Set(visibleNodes.map(n => n.ref));
      const visibleEdges = graph.edges.filter(edge => visibleSet.has(edge.from) && visibleSet.has(edge.to));

      el.innerHTML = `
        <section class="bg-gradient-to-br from-[#070d16] via-[#0a111b] to-[#060b12] border border-cyan-500/30 rounded-2xl shadow-neon p-4 sm:p-5 space-y-4">

            </div>
            <button id="exportKnowledgeGraph" class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/40">Export Full Graph (JSON)</button>
          </div>

            <input id="kgSearch" value="${escapeAttr(kg.search)}" placeholder="Search nodes..." class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm" />
            <select id="kgFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm">
              ${filters.map(f => `<option value="${f}" ${kg.filter===f?'selected':''}>${f === 'all' ? 'All Types' : f}</option>`).join('')}
            </select>
          </div>

          <div class="grid xl:grid-cols-[1fr_290px] gap-4">
            <div class="bg-[#08101a] border border-zinc-800 rounded-xl p-2">
              <canvas id="kgCanvas" width="1080" height="620" class="w-full h-[56vh] sm:h-[62vh] max-h-[720px] bg-[#050a12] rounded-lg"></canvas>
              <p class="text-xs text-zinc-400 px-2 pt-2">Drag nodes, scroll to zoom, drag empty space to pan, click to open item.</p>
            </div>
            <aside class="bg-[#0b111a] border border-zinc-800 rounded-xl p-3 space-y-2 max-h-[62vh] overflow-auto scrollbar-thin">
              <p class="text-xs uppercase tracking-wide text-cyan-300">Nodes (${visibleNodes.length})</p>
              ${visibleNodes.slice(0, 200).map(node => `<div class="w-full rounded-lg border ${kg.focusRef===node.ref ? 'border-cyan-500/50 bg-cyan-500/10' : 'border-zinc-800 bg-zinc-900/60'} p-2"><button data-kg-open="${node.ref}" class="w-full text-left hover:text-cyan-100"><p class="text-sm font-medium truncate">${escapeHTML(node.label)}</p><p class="text-[11px] text-zinc-500">${node.type} · Connected Items: ${node.connected}</p></button><button data-show-related="${node.ref}" class="mt-1 text-[11px] text-cyan-300">Show Related</button></div>`).join('') || emptyStateMarkup('🕸️', 'No graph nodes for this filter', 'Try clearing filters or add linked items from Notes, Tasks, and Workspace.')}
            </aside>
          </div>
        </section>
      `;

      document.getElementById('kgSearch').oninput = (e) => { kg.search = e.target.value; saveStateRaw(); renderKnowledgeGraph(); };
      document.getElementById('kgFilter').onchange = (e) => { kg.filter = e.target.value; saveStateRaw(); renderKnowledgeGraph(); };
      document.getElementById('exportKnowledgeGraph').onclick = () => downloadJSON('knowledge-graph.json', { exportedAt: new Date().toISOString(), nodes: graph.nodes, edges: graph.edges });
      el.querySelectorAll('[data-kg-open]').forEach(btn => btn.onclick = () => openReference(btn.dataset.kgOpen));
      el.querySelectorAll('[data-show-related]').forEach(btn => btn.onclick = (evt) => { evt.stopPropagation(); showRelated(btn.dataset.showRelated); });

      const canvas = document.getElementById('kgCanvas');
      if (!canvas || !visibleNodes.length) return;
      const ctx = canvas.getContext('2d');
      const palette = { 'Page': '#00d4ff', 'Note': '#7c9cff', 'Daily Note': '#6ee7b7', 'Task': '#f59e0b', 'Research': '#c084fc', 'Mention': '#f472b6' };
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const layout = visibleNodes.map((node, idx) => ({ ...node, x: (width / 2) + Math.cos((idx / Math.max(1, visibleNodes.length)) * Math.PI * 2) * Math.min(width, height) * 0.22, y: (height / 2) + Math.sin((idx / Math.max(1, visibleNodes.length)) * Math.PI * 2) * Math.min(width, height) * 0.22, vx: 0, vy: 0 }));
      const map = new Map(layout.map(n => [n.ref, n]));
      const edgeLayout = visibleEdges.map(e => ({ ...e, a: map.get(e.from), b: map.get(e.to) })).filter(e => e.a && e.b);

      for (let i = 0; i < 130; i++) {
        layout.forEach(a => {
          layout.forEach(b => {
            if (a === b) return;
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.max(30, Math.hypot(dx, dy));
            const repel = 800 / (dist * dist);
            a.vx += (dx / dist) * repel;
            a.vy += (dy / dist) * repel;
          });
        });
        edgeLayout.forEach(edge => {
          const dx = edge.b.x - edge.a.x;
          const dy = edge.b.y - edge.a.y;
          const dist = Math.max(1, Math.hypot(dx, dy));
          const target = 140;
          const pull = (dist - target) * 0.0009;
          edge.a.vx += dx * pull;
          edge.a.vy += dy * pull;
          edge.b.vx -= dx * pull;
          edge.b.vy -= dy * pull;
        });
        layout.forEach(n => {
          n.vx *= 0.9;
          n.vy *= 0.9;
          n.x = Math.max(20, Math.min(width - 20, n.x + n.vx));
          n.y = Math.max(20, Math.min(height - 20, n.y + n.vy));
        });
      }

      let scale = 1;
      let offsetX = 0;
      let offsetY = 0;
      let dragNode = null;
      let panning = false;
      let moved = false;
      let last = { x: 0, y: 0 };

      const toGraph = (evt) => {
        const rect = canvas.getBoundingClientRect();
        return { x: (evt.clientX - rect.left - offsetX) / scale, y: (evt.clientY - rect.top - offsetY) / scale };
      };

      function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        edgeLayout.forEach(edge => {
          ctx.strokeStyle = 'rgba(0,212,255,0.28)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(edge.a.x, edge.a.y);
          ctx.lineTo(edge.b.x, edge.b.y);
          ctx.stroke();
        });

        layout.forEach(node => {
          const radius = 8 + Math.min(14, node.connected * 0.8);
          const isFocus = kg.focusRef && (node.ref === kg.focusRef || edgeLayout.some(e => (e.from===kg.focusRef && e.to===node.ref) || (e.to===kg.focusRef && e.from===node.ref)));
          ctx.fillStyle = palette[node.type] || '#00d4ff';
          ctx.globalAlpha = kg.focusRef ? (isFocus ? 1 : 0.2) : 1;
          ctx.beginPath();
          ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = 1;
          ctx.strokeStyle = isFocus ? '#ffffff' : 'rgba(255,255,255,0.2)';
          ctx.stroke();

          ctx.globalAlpha = 0.92;
          ctx.fillStyle = '#e5e7eb';
          ctx.font = '12px Inter, sans-serif';
          ctx.fillText(node.label.slice(0, 30), node.x + radius + 4, node.y + 4);
        });

        ctx.restore();
      }

      const hitNode = (evt) => {
        const p = toGraph(evt);
        return [...layout].reverse().find(node => Math.hypot(node.x - p.x, node.y - p.y) <= 14 + Math.min(14, node.connected * 0.8));
      };

      draw();
      canvas.onwheel = (evt) => {
        evt.preventDefault();
        const delta = evt.deltaY < 0 ? 1.08 : 0.92;
        scale = Math.max(0.45, Math.min(2.4, scale * delta));
        draw();
      };
      canvas.onmousedown = (evt) => {
        const hit = hitNode(evt);
        last = { x: evt.clientX, y: evt.clientY };
        moved = false;
        if (hit) dragNode = hit;
        else panning = true;
      };
      canvas.onmousemove = (evt) => {
        if (!dragNode && !panning) return;
        const dx = evt.clientX - last.x;
        const dy = evt.clientY - last.y;
        last = { x: evt.clientX, y: evt.clientY };
        moved = moved || Math.abs(dx) > 2 || Math.abs(dy) > 2;
        if (dragNode) {
          dragNode.x += dx / scale;
          dragNode.y += dy / scale;
        } else if (panning) {
          offsetX += dx;
          offsetY += dy;
        }
        draw();
      };
      canvas.onmouseup = (evt) => {
        const hit = hitNode(evt);
        dragNode = null;
        panning = false;
        if (hit && !moved) openReference(hit.ref);
      };
      canvas.onmouseleave = () => { dragNode = null; panning = false; };
    }

    function renderSettings() {
      const s = state.settings;
      const el = document.getElementById('section-settings');
      el.innerHTML = `
        <div class="grid lg:grid-cols-3 gap-4">
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-2">
            <h3 class="font-semibold mb-2">Founder Profile</h3>
            ${inputField('Founder Name','founder.name',s.founder.name)}
            ${inputField('Role','founder.role',s.founder.role)}
            ${inputField('Email','founder.email',s.founder.email,'email')}
          </div>
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-2">
            <h3 class="font-semibold mb-2">Business Profile</h3>
            ${inputField('Business Name','business.name',s.business.name)}
            ${inputField('Stage','business.stage',s.business.stage)}
            ${inputField('Industry','business.industry',s.business.industry)}
          </div>
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-2">
            <h3 class="font-semibold mb-2">Preferences</h3>
            <label class="block text-sm">Currency<select data-setting="preferences.currency" class="w-full mt-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-2"><option ${s.preferences.currency==='USD'?'selected':''}>USD</option><option ${s.preferences.currency==='INR'?'selected':''}>INR</option><option ${s.preferences.currency==='EUR'?'selected':''}>EUR</option></select></label>
            <label class="block text-sm">Language<select data-setting="preferences.language" class="w-full mt-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-2"><option ${s.preferences.language==='English'?'selected':''}>English</option><option ${s.preferences.language==='Hindi'?'selected':''}>Hindi</option><option ${s.preferences.language==='Spanish'?'selected':''}>Spanish</option></select></label>
            <label class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded px-3 py-2 mt-2"><span>Dark Mode</span><input type="checkbox" data-setting="preferences.darkMode" ${s.preferences.darkMode ? 'checked' : ''} class="accent-cyan-400" /></label>
          </div>
        </div>

        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 flex flex-wrap gap-2">
          <button id="exportAll" class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700">Export All Data</button>
          <label class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700 cursor-pointer">Import All Data<input id="importAll" type="file" accept="application/json" class="hidden"></label>
          <button id="clearAll" class="px-3 py-2 rounded bg-red-500/20 border border-red-500/30 text-red-300">Clear All Data</button>
        </div>

        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-3">
          <h3 class="font-semibold text-cyan-200">Keyboard Shortcuts</h3>
          <div class="grid sm:grid-cols-2 gap-2 text-sm text-zinc-300">
            <p class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2"><span>Quick Search</span><kbd class="text-xs text-cyan-200 border border-cyan-500/40 rounded px-1.5 py-0.5">Ctrl/⌘ + K</kbd></p>
            <p class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2"><span>Close Sidebar/Modal</span><kbd class="text-xs text-cyan-200 border border-cyan-500/40 rounded px-1.5 py-0.5">Esc</kbd></p>
          </div>
          <p class="text-xs text-zinc-500">Tip: shortcuts adapt to the active section and focus the most relevant input.</p>
          <footer class="pt-2 border-t border-zinc-800 text-center text-sm text-zinc-400">Made with ❤️ for Indian Founders</footer>
        </div>
      `;

      el.querySelectorAll('[data-setting]').forEach(input => {
        input.oninput = () => {
          const path = input.dataset.setting.split('.');
          let ref = state.settings;
          for (let i = 0; i < path.length - 1; i++) ref = ref[path[i]];
          ref[path.at(-1)] = input.type === 'checkbox' ? input.checked : input.value;
          if (input.dataset.setting === 'business.name') {
            state.title = input.value;
            document.getElementById('workspaceTitle').value = input.value;
          }
          applyThemePreference();
          saveState();
        };
      });
      document.getElementById('exportAll').onclick = () => downloadJSON('barya-all-data.json', state);
      document.getElementById('importAll').onchange = (e) => importJSONFile(e.target.files[0], (data) => { state = deepMerge(structuredClone(defaultState), data); applyThemePreference(); saveState(); renderNav(); document.getElementById('workspaceTitle').value = state.title; });
      document.getElementById('clearAll').onclick = () => {
        if (!confirm('Clear all local data and reset workspace?')) return;
        localStorage.removeItem(STORAGE_KEY);
        state = structuredClone(defaultState);
        applyThemePreference();
        saveState();
        renderNav();
        document.getElementById('workspaceTitle').value = state.title;
      };
    }

    function inputField(label, settingPath, value, type='text') {
      return `<label class="block text-sm">${label}<input type="${type}" data-setting="${settingPath}" value="${escapeAttr(value)}" class="w-full mt-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-2" /></label>`;
    }

    function emptyStateMarkup(icon = '✨', title = 'Nothing here yet', subtitle = 'Start by adding your first item.', extraClass = '') {
      return `<div class="rounded-xl border border-dashed border-cyan-500/25 bg-cyan-500/5 p-4 text-center ${extraClass}">
        <p class="text-xl mb-1">${icon}</p>
        <p class="text-sm font-medium text-cyan-100">${escapeHTML(title)}</p>
        <p class="text-xs text-zinc-400 mt-1">${escapeHTML(subtitle)}</p>
      </div>`;
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function importJSONFile(file, cb) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          cb(data);
        } catch {
          alert('Invalid JSON file.');
        }
      };
      reader.readAsText(file);
    }

    function escapeHTML(str='') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(str='') { return escapeHTML(str).replaceAll('`',''); }

    init();
  </script>
</body>
