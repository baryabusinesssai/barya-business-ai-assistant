          structured: {
            answer: 'I can help you make founder-level decisions with clarity, depth, and execution focus. Share your goal, current constraints, and timeline, and I will give you a practical plan that balances short-term survival with long-term growth. We can work on strategy, product, hiring, pricing, sales, and operations in one connected view.',
            why: 'For a founder, weak decisions are expensive because they consume cash, team energy, and market trust at the same time. Deep, structured thinking matters because it helps you avoid random execution, reduce avoidable mistakes, and move faster on what truly drives revenue, retention, and runway.',
            steps: [
              'Define your exact decision in one sentence, such as “Should I hire now or extend runway first?” Include numbers where possible so advice is actionable.',
              'Share your real constraints clearly: available cash, team size, timeline, and current bottleneck. The better your context, the better the recommendation quality.',
              'Clarify your desired business outcome for the next 30 to 90 days (for example: increase activation by 20%, reduce churn by 3 points, or close 10 qualified deals).',
              'Ask for trade-offs and alternatives, not only one answer. I will show you pros, risks, and when each option is the right move.',
              'Execute one focused sprint from the plan, then return with results so we can refine based on signal, not assumptions.'
            ],
            tip: 'Strong founders do not chase perfect plans; they run fast feedback loops with clear priorities and disciplined follow-through.',
            next: 'Ask: “I have 4 months runway and rising churn—what should I do first?”'
          },
          ts: new Date().toISOString()
        });
      }
      if (!Array.isArray(state.ai.promptSuggestions)) state.ai.promptSuggestions = [];
      if (!state.ai.composer || typeof state.ai.composer !== 'object') state.ai.composer = {};
      if (typeof state.ai.composer.text !== 'string') state.ai.composer.text = '';
      if (!state.ai.composer.attachment || typeof state.ai.composer.attachment !== 'object') state.ai.composer.attachment = null;
      if (typeof state.ai.composer.deepThinking !== 'boolean') state.ai.composer.deepThinking = false;
    }

    function getAIPersonalizationContext() {
      const founder = state.settings?.founder || {};
      const business = state.settings?.business || {};
      const prefs = state.settings?.preferences || {};
      const name = String(founder.name || '').trim();
      const role = String(founder.role || '').trim();
      const stage = String(business.stage || '').trim();
      const languageCode = normalizeLanguageCode(prefs.language || 'en');
      const dateFormat = String(prefs.dateFormat || 'MM/DD/YYYY').trim();
      const currencyCode = String(prefs.currency || '').trim();
      const languageName = LANGUAGE_NAMES[languageCode] || 'English';
      const style = [];
      if (languageName) style.push(`${languageName} communication`);
      if (dateFormat) style.push(`${dateFormat} date format`);
      if (currencyCode) style.push(`${currencyCode} currency context`);
      const founderIdentity = [name, role].filter(Boolean).join(', ');
      const founderPrefix = founderIdentity ? `For ${founderIdentity}` : 'For your founder profile';
      const stageLine = stage ? `, currently at the ${stage} stage` : '';
      return {
        name,
        role,
        stage,
        styleLabel: style.join(' · ') || 'founder-friendly communication',
        profileLine: `${founderPrefix}${stageLine}`
      };
    }

    function latestFounderContext(limit = 8) {
      const recent = state.ai.history.slice(-limit);
      const userTopics = recent
        .filter(msg => msg.role === 'user')
        .flatMap(msg => (msg.message.toLowerCase().match(/[a-z]{4,}/g) || []))
        .filter(word => !['with', 'that', 'this', 'from', 'your', 'what', 'have', 'need', 'want', 'please', 'help', 'about', 'should', 'could'].includes(word));
      const scores = {};
      userTopics.forEach(word => { scores[word] = (scores[word] || 0) + 1; });
      const topKeywords = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([word]) => word);
      return {
        lastUserMessage: [...recent].reverse().find(msg => msg.role === 'user')?.message || '',
        topKeywords
      };
    }

    function parseMultiPartQuestion(input) {
      return input
        .split(/\n|(?:\s+\d+[\).\-\:]\s+)|(?:\s+\-\s+)|(?:\s+\?\s+)/g)
        .map(part => part.trim())
        .filter(Boolean)
        .slice(0, 4);
    }

    function aiTemplateLibrary() {
      const cash = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
      const runway = Number(state.dashboard.metrics.runway || 0);
      return [
        { key: 'runway', match: /(runway|burn|cashflow|cash flow|cost|expense|revenue)/i, opening: `Your current runway is roughly ${runway} months, with estimated monthly net cashflow near ${money(cash)}. The smartest founder move now is not “just cutting costs,” but redesigning your operating rhythm so every dollar is tied to either customer value or near-term cash recovery.`, why: 'Runway determines the quality of every other decision. With limited cash, hiring, pricing, and product bets all carry higher consequence, so disciplined financial strategy creates freedom to learn and execute instead of reacting under pressure.', actionTracks: ['cash visibility and burn control', 'cash acceleration from current customers', 'focus discipline on one growth engine'], risks: ['Cutting too deep in customer-facing functions can reduce retention and worsen revenue.', 'Aggressive discounting can improve short-term cash but hurt long-term pricing power.'], next: 'Send me your top five expenses and current MRR trend, and I’ll turn this into a 30-day runway defense plan with exact priorities.' },
        { key: 'churn', match: /(churn|retention|cancel|renewal|activation|onboarding)/i, opening: 'Treat churn as a strategy problem, not just a support metric. In most early-stage companies, churn means users are not consistently reaching a meaningful outcome quickly enough, or your promise and delivery are misaligned.', why: 'Retention compounds growth: lower churn reduces acquisition pressure, improves unit economics, and gives the team confidence because product effort starts translating into durable customer value.', actionTracks: ['identify churn pattern by segment and timing', 'repair onboarding around first-value speed', 'build targeted save flows for high-risk accounts'], risks: ['Adding features before fixing activation often increases complexity without improving retention.', 'Broad retention campaigns usually underperform compared to segment-specific interventions.'], next: 'Share your first 7-day activation rate and top cancellation reasons; I can design a practical two-week retention sprint.' },
        { key: 'g2m', match: /(gtm|go to market|sales|pipeline|lead|acquisition|distribution)/i, opening: 'The best GTM plan is not “more channels”; it is one repeatable channel-model pair you can measure, learn from, and scale. Early growth improves when messaging, audience, and conversion path are tightly connected.', why: 'Founders lose months when distribution is broad but shallow. A focused GTM system improves learning speed, reduces CAC waste, and creates confidence in forecasting.', actionTracks: ['tighten ICP and message-market fit', 'improve one conversion path end-to-end', 'set weekly pipeline and conversion review discipline'], risks: ['Expanding channels before fixing conversion quality raises costs quickly.', 'Inconsistent follow-up causes avoidable pipeline leakage even with strong top-of-funnel.'], next: 'If you share your current channel mix and funnel numbers, I can recommend the highest-leverage GTM sequence for the next 21 days.' },
        { key: 'hiring', match: /(hire|hiring|team|role|recruit|talent)/i, opening: 'Hiring should solve a bottleneck, not reduce founder discomfort. The right approach is to map which constraint is truly limiting growth and decide whether process, tooling, or a new person is the fastest fix.', why: 'Each early hire is a force multiplier or a drag multiplier. Good hiring improves velocity and decision quality; premature hiring adds burn and management overhead before clear output appears.', actionTracks: ['define bottleneck and expected role outcomes', 'evaluate alternatives before opening headcount', 'design a scorecard and 30-60-90 day success plan'], risks: ['Hiring too senior too early can create complexity your stage does not need.', 'Hiring without clear ownership and metrics causes ambiguity and rework.'], next: 'Tell me the role you’re considering and your current team structure; I’ll help you decide whether to hire now or defer.' },
        { key: 'default', match: /.*/i, opening: 'The highest-quality founder decisions come from combining speed with structured reasoning: clarify the decision, pressure-test alternatives, and commit to a measurable execution sprint.', why: 'Startups fail less from lack of effort and more from scattered priorities. A clear framework lets you deploy limited cash and attention where outcomes matter most.', actionTracks: ['frame the decision and success metric', 'compare options with explicit trade-offs', 'execute in short cycles with fast review'], risks: ['Moving fast without a metric creates activity without learning.', 'Over-analysis delays execution and can hide weak assumptions.'], next: 'Share your exact decision in one sentence, and I’ll build a tailored action plan with milestones and fallback options.' }
      ];
    }

    function aiStructuredResponse(q) {
      ensureAIState();
      const lower = q.toLowerCase();
      const templates = aiTemplateLibrary();
      const base = templates.find(template => template.match.test(lower)) || templates.at(-1);
      const context = latestFounderContext();
      const personalization = getAIPersonalizationContext();
      const multiParts = parseMultiPartQuestion(q);
      const isDeepThinking = state.ai.composer.deepThinking === true;

      const getWords = (txt) => String(txt || '').trim().split(/\s+/).filter(Boolean).length;
      const recentReference = context.lastUserMessage && context.lastUserMessage !== q
        ? ` Building on your earlier question about "${context.lastUserMessage.slice(0, 70)}${context.lastUserMessage.length > 70 ? '...' : ''}", this recommendation keeps continuity so your decisions stack rather than reset.`
        : '';
      const keywordReference = context.topKeywords.length
        ? ` I’m intentionally prioritizing ${context.topKeywords.join(', ')} because those themes appear repeatedly in your recent messages and likely represent your real bottlenecks.`
        : '';
      const multipartLead = multiParts.length > 1
        ? `You asked ${multiParts.length} connected questions, so I’ll give one integrated answer that sequences decisions in the right order. `
        : '';
      const personalizationLead = `${personalization.profileLine}, here is a tailored recommendation with ${personalization.styleLabel}.`;
      const answer = `${personalizationLead} ${multipartLead}${base.opening}${recentReference}${keywordReference}`.trim();

      const why = `${base.why} From a founder lens, this matters because execution capacity is always limited: when priorities are explicit, your team can align faster, stakeholders trust your decision logic, and you avoid burning cycles on low-leverage work.`;

      const steps = [
        `Clarify the exact outcome for the next 14–30 days in one measurable sentence (for example, “increase weekly qualified demos by 25%” or “extend runway by 2 months”). This creates decision precision and avoids vague execution.`,
        `Audit your current constraints honestly: available cash, team bandwidth, technical limits, and decision deadlines. Strategy only works when it respects reality.`,
        `Choose one primary execution track: ${base.actionTracks[0]}. Define the owner, target metric, and first milestone so momentum starts immediately.`,
        `Launch a supporting track for leverage: ${base.actionTracks[1]}. Keep scope tight and instrument outcomes so you can see signal within days, not months.`,
        `Protect continuity through the third track: ${base.actionTracks[2]}. This prevents short-term fixes from creating long-term instability in the business.`,
        `Review outcomes weekly with explicit trade-off discussion. Ask: what worked, what failed, and what should stop now to free capacity for higher-impact bets.`
      ].slice(0, multiParts.length > 2 ? 7 : 6);
      if (isDeepThinking) {
        steps.push(
          'Before committing, pressure-test your preferred option against two realistic downside scenarios and define early warning indicators that trigger a contingency plan.',
          'Close each week with a short founder memo: decision made, evidence observed, and what changes next week. This improves strategic consistency and reduces reactive pivots.'
        );
      }

      const tip = `Key insights & trade-offs: ${base.risks[0]} ${base.risks[1]} Favor options that generate reliable learning quickly, even if they feel less dramatic than big swings. In early-stage execution, repeatable wins usually outperform heroic moves.`;
      const next = isDeepThinking
        ? `${base.next} If you want, I can also produce a step-by-step decision tree with assumptions, leading indicators, and fallback moves.`
        : base.next;

      const minWords = isDeepThinking ? 230 : 180;
      const maxWords = 350;
      let totalWords = getWords(answer) + getWords(why) + getWords(steps.join(' ')) + getWords(tip) + getWords(next);
      let expandedWhy = why;
      let expandedTip = tip;
      if (totalWords < minWords) {
        expandedWhy += ' It also improves communication quality with co-founders, team members, and investors because priorities, assumptions, and expected outcomes become explicit rather than implied.';
        expandedTip += ' As a rule, do not scale a tactic until you can explain why it worked and which condition made it effective.';
        totalWords = getWords(answer) + getWords(expandedWhy) + getWords(steps.join(' ')) + getWords(expandedTip) + getWords(next);
      }
      if (totalWords > maxWords) {
        expandedTip = expandedTip.split('. ').slice(0, 3).join('. ').trim();
      }
      return {
        answer,
        why: expandedWhy,
        steps,
        tip: expandedTip,
        next
      };
    }

    function aiAttachmentStructuredResponse(prompt, attachment) {
      const base = aiStructuredResponse(prompt || `Review this ${attachment?.kind || 'resource'} and guide me.`);
      const personalization = getAIPersonalizationContext();
      const name = attachment?.name || attachment?.value || 'uploaded resource';
      const typeLabel = attachment?.kind === 'link' ? 'link' : 'document';
      const sourceLabel = attachment?.kind === 'link' ? `the link you shared (${name})` : `your file "${name}"`;
      return {
        answer: `${personalization.profileLine}, I’ve incorporated ${sourceLabel} so this is grounded in your real operating context, not generic advice. The strongest strategic signal from this ${typeLabel} is that your next gains likely come from tighter prioritization, clearer owner accountability, and reducing decision latency. In founder terms: you probably don't need more ideas right now, you need a cleaner execution sequence with explicit trade-offs. I’ll treat this attachment as an operating input and map it to measurable actions you can validate quickly.`,
        why: `${base.why} Reading between the lines of ${sourceLabel}, the pattern suggests the core issue is sequencing and focus quality, not lack of effort. Teams usually stall when important insights sit as static notes instead of being converted into time-bound experiments with defined owners and success thresholds.`,
        steps: [
          `Extract exactly three decisions from ${typeLabel === 'link' ? 'the linked page' : 'this file'}: one to do now, one to delay, and one to stop. This forces strategic clarity immediately.`,
          `Convert those decisions into a 14-day sprint with named owners, measurable outcomes, and a review date. Keep each milestone binary (done / not done).`,
          `Translate the top insight from ${sourceLabel} into one customer-facing change in messaging, onboarding, or sales narrative within 72 hours.`,
          `Define two risk controls before execution: what signal means “continue,” and what signal means “pivot or pause.” This prevents sunk-cost drift.`,
          `Run a weekly review loop that compares expected outcome vs actual signal, then update priorities from evidence instead of intuition.`
        ],
        tip: `Attachment intelligence note: use ${typeLabel === 'link' ? 'that link' : 'this file'} as a live decision system, not a passive reference. The highest-performing founder teams turn context into rapid experiments, then into repeatable operating rules.`,
        next: `If helpful, I can convert ${sourceLabel} into a one-page execution brief with priorities, owners, dependencies, and fallback options.`
      };
    }

    function computePromptSuggestions() {
      const context = latestFounderContext(10);
      const adaptiveSuggestions = [
        'Act as my strategic co-founder and challenge my current plan with better alternatives.',
        'Turn my current goal into a 14-day execution roadmap with owners, metrics, and risks.',
        'What should I stop doing this month to improve focus and execution speed?',
        'Convert my latest business challenge into a decision memo with trade-offs.',
        'Draft a founder-ready update I can send to investors with clear narrative and metrics.',
        'Help me choose between growth, retention, and runway priorities for the next 30 days.'
      ];
      const latestAssistant = [...state.ai.history].reverse().find(msg => msg.role === 'assistant');
      const latestAttachment = [...state.ai.history].reverse().find(msg => msg.role === 'user' && msg.attachment)?.attachment;
      const continuationSuggestions = latestAssistant
        ? [
          'Pressure-test your previous recommendation with two realistic downside scenarios and mitigations.',
          'Translate your last answer into a weekly founder operating checklist I can actually run.',
          'Summarize the current strategy in plain language I can share with my team in 60 seconds.'
        ]
        : [];
      const attachmentSuggestions = latestAttachment
        ? [
          `Turn insights from ${latestAttachment.name || latestAttachment.value} into a 30-day plan with clear owners.`,
          `List the top assumptions inside ${latestAttachment.name || latestAttachment.value} and how to validate each this week.`,
          `Find conflicts between my latest goals and ${latestAttachment.name || latestAttachment.value}, then resolve them.`
        ]
        : [];
      const keywordSuggestions = context.topKeywords.map((keyword, idx) => {
        const variants = [
          `Create an advanced but practical plan to improve ${keyword} over the next 3 weeks.`,
          `Diagnose why ${keyword} may be underperforming and give me a founder action plan.`,
          `Give me a step-by-step operating playbook for ${keyword} with measurable checkpoints.`
        ];
        return variants[idx % variants.length];
      });
      const lastMessageSuggestion = context.lastUserMessage
        ? [`Continue this thread and deepen your answer with concrete milestones: "${context.lastUserMessage.slice(0, 80)}${context.lastUserMessage.length > 80 ? '...' : ''}"`]
        : [];
      state.ai.promptSuggestions = [...attachmentSuggestions, ...lastMessageSuggestion, ...keywordSuggestions, ...continuationSuggestions, ...adaptiveSuggestions].slice(0, 6);
    }

        registerMentionsFromText(q, 'ai-user');
        const chatBox = document.getElementById('chatBox');
        appendMessage(userMsg);
        const typing = document.createElement('div');
        typing.innerHTML = `<div class="max-w-fit bg-white border border-slate-200 rounded-2xl px-4 py-3 text-sm text-slate-500 shadow-sm"><span class="inline-flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-teal-400 animate-pulse"></span><span class="h-2 w-2 rounded-full bg-teal-400/80 animate-pulse [animation-delay:120ms]"></span><span class="h-2 w-2 rounded-full bg-teal-400/70 animate-pulse [animation-delay:220ms]"></span></span><span class="ml-2">Barya AI is thinking${state.ai.composer.deepThinking ? ' step-by-step' : ''}...</span></div>`;
        chatBox.appendChild(typing);
        chatBox.scrollTop = chatBox.scrollHeight;
        const structured = attachment ? aiAttachmentStructuredResponse(q, attachment) : aiStructuredResponse(q);
        const note = attachment ? 'Analyzing uploaded document...' : '';
        const aiMsg = { role: 'assistant', message: structured.answer, structured, note, ts: nowISO };
        registerMentionsFromText(`${structured.answer} ${(structured.steps || []).join(' ')}`, 'ai-assistant');
        setTimeout(() => {
          typing.remove();
          state.ai.history.push(userMsg, aiMsg);
          state.ai.composer.attachment = null;
          state.ai.composer.text = '';
          saveStateRaw();
          renderAI();
        }, 700);
      }

      document.getElementById('chatForm').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('chatInput');
        state.ai.composer.text = input.value;
        sendQuestion(input.value);
      };
      document.getElementById('chatInput').addEventListener('input', (e) => {
        state.ai.composer.text = e.target.value;
      });
      document.getElementById('chatAttach').onchange = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        state.ai.composer.attachment = { kind: 'file', name: file.name, type: file.type || 'application/octet-stream', ts: new Date().toISOString() };
        renderAttachmentPreview();
      };
      document.getElementById('attachLinkBtn').onclick = () => {
        const url = prompt('Paste webpage URL to analyze:');
        if (!url) return;
        const normalized = url.trim();
        if (!/^https?:\/\//i.test(normalized)) {
          alert('Please enter a valid URL starting with http:// or https://');
          return;
        }
        state.ai.composer.attachment = { kind: 'link', value: normalized, name: normalized, ts: new Date().toISOString() };
        renderAttachmentPreview();
      };
      document.getElementById('deepThinkingToggle').onclick = () => {
        state.ai.composer.deepThinking = !state.ai.composer.deepThinking;
        saveStateRaw();
        renderAI();
      };
      document.getElementById('aiShowRelated').onclick = () => {
        const latestUser = [...state.ai.history].reverse().find(msg => msg.role === 'user');
        const hinted = latestUser ? (wikiLinkTitles(latestUser.message)[0] || '') : '';
        const ref = findRefByTitle(hinted) || (buildKnowledgeGraph().nodes.find(node => node.section === 'ai')?.ref || '');
        if (ref) showRelated(ref);
      };
      document.getElementById('clearChat').onclick = () => {
        if (!confirm('Clear entire Barya AI chat history? This action cannot be undone.')) return;
        state.ai.history = [];
        state.ai.composer = { text: '', attachment: null };
        ensureAIState();
        saveStateRaw();
        renderAI();
      };
      el.querySelectorAll('[data-quick]').forEach(btn => btn.onclick = () => sendQuestion(btn.dataset.quick));
      el.querySelectorAll('[data-suggestion]').forEach(btn => btn.onclick = () => sendQuestion(state.ai.promptSuggestions[Number(btn.dataset.suggestion)] || ''));
      document.getElementById('exportChat').onclick = () => downloadJSON('chat-history.json', state.ai.history);
      document.getElementById('importChat').onchange = (e) => importJSONFile(e.target.files[0], (data) => {
        if (!Array.isArray(data)) return;
        state.ai.history = data
          .filter(item => item && (item.role === 'user' || item.role === 'assistant'))
          .map(item => ({
            role: item.role,
            message: String(item.message || ''),
            structured: item.structured || (item.role === 'assistant' ? aiStructuredResponse(String(item.message || '')) : undefined),
            ts: item.ts || new Date().toISOString()
          }));
        ensureAIState();
        saveStateRaw();
        renderAI();
      });
    }

    function renderMemory() {
      const el = document.getElementById('section-memory');
      const memory = state.memory || (state.memory = {});
      if (!Array.isArray(memory.insights)) memory.insights = [];
      if (!Array.isArray(memory.actions)) memory.actions = [];
      if (typeof memory.search !== 'string') memory.search = '';
      if (!memory.viewMode) memory.viewMode = 'list';
      if (!memory.leftTab) memory.leftTab = 'all';
      if (!memory.activeNoteId && memory.insights[0]) memory.activeNoteId = memory.insights[0].id;

      const normalizeTags = (input) => String(input || '')
        .split(',')
        .map(tag => tag.trim())
        .filter(Boolean)
        .filter((tag, idx, arr) => arr.findIndex(t => t.toLowerCase() === tag.toLowerCase()) === idx);
      memory.insights.forEach(note => {
        if (!note.id) note.id = crypto.randomUUID();
        if (!note.title) note.title = 'Untitled Note';
        if (typeof note.content !== 'string') note.content = String(note.content || '');
        if (!note.ts) note.ts = new Date().toISOString();
        if (!Array.isArray(note.tags)) note.tags = normalizeTags(note.tag || 'General');
        if (!note.tags.length) note.tags = ['General'];
        note.tag = note.tags.join(', ');
        if (typeof note.isDaily !== 'boolean') note.isDaily = /^\d{4}-\d{2}-\d{2}/.test(note.title);
      });

      const noteByTitle = new Map(memory.insights.map(note => [note.title.toLowerCase(), note]));
      const extractLinks = (content) => {
        const links = [];
        const regex = /\[\[([^\]]+)\]\]/g;
        let match;
        while ((match = regex.exec(content || '')) !== null) {
          const title = match[1].trim();
          if (title) links.push(title);
        }
        return [...new Set(links)];
      };

      memory.insights.forEach(note => {
        note.links = extractLinks(note.content)
          .map(title => noteByTitle.get(title.toLowerCase()))
          .filter(Boolean)
          .map(n => n.id);
      });

      const backlinksMap = {};
      memory.insights.forEach(note => {
        note.links.forEach(targetId => {
          if (!backlinksMap[targetId]) backlinksMap[targetId] = [];
          backlinksMap[targetId].push(note.id);
        });
      });

      let activeNote = memory.insights.find(n => n.id === memory.activeNoteId) || null;
      if (!activeNote && memory.insights.length) {
        activeNote = memory.insights[0];
        memory.activeNoteId = activeNote.id;
      }

      const q = memory.search.toLowerCase();
      const filteredNotes = memory.insights.filter(note => {
        const tags = (note.tags || []).join(' ');
        return `${note.title} ${note.content} ${tags}`.toLowerCase().includes(q);
      });
      const dailyNotes = filteredNotes.filter(note => note.isDaily);
      const allNotes = filteredNotes;
      const visibleNotes = memory.leftTab === 'daily' ? dailyNotes : allNotes;

      const dailyISO = new Date().toISOString().slice(0, 10);
      const graphNodes = filteredNotes.map((note, idx, arr) => {
        const cx = 300 + 220 * Math.cos((Math.PI * 2 * idx) / Math.max(1, arr.length));
        const cy = 210 + 160 * Math.sin((Math.PI * 2 * idx) / Math.max(1, arr.length));
        return { id: note.id, title: note.title, x: cx, y: cy, r: note.id === memory.activeNoteId ? 16 : 11 };
      });
      const nodeMap = new Map(graphNodes.map(n => [n.id, n]));

      el.innerHTML = `

                <button data-memory-tab="graph" class="w-full text-left px-3 py-2 rounded-lg border transition ${memory.viewMode === 'graph' ? 'border-orange-300 bg-orange-50 text-orange-700' : 'border-gray-200 bg-white hover:border-orange-300'}">Graph View</button>

                <button id="clearMemory" class="w-full px-3 py-2 rounded-lg bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 text-sm">Clear Memory Vault</button>

                <p class="text-xs text-zinc-500">${visibleNotes.length} visible · ${memory.insights.length} total notes</p>

                    ${visibleNotes.map(note => `

                        <div class="flex items-center justify-between gap-2">
                          <p class="font-medium truncate">${escapeHTML(note.title)}</p>

                        </div>

                    `}
                  </div>
                </section>

                <section class="bg-white border border-orange-100 rounded-xl p-4">
                  ${memory.viewMode === 'graph' ? `

                      <div class="flex flex-wrap items-center gap-2 justify-between">

                            }).join('') || emptyStateMarkup('↗️', 'No outgoing links yet.', 'Link this note to another note for context.', '', 'Start Here', 'section:memory')}

                      </div>

                  `}

              </div>

              <section class="bg-white border border-orange-100 rounded-xl p-4">

                <p class="text-xs text-zinc-500 mb-3">Capture what happened and connect it to a note or page for future context.</p>
                <form id="actionForm" class="grid md:grid-cols-[1fr_140px_190px_auto] gap-2 mb-3">
                  <input id="actionText" placeholder="Example: Follow up with investor" class="bg-white border border-gray-300 rounded px-3 py-2" />
                  <select id="actionCategory" class="bg-white border border-gray-300 rounded px-3 py-2">

                  </select>
                  <select id="actionLink" class="bg-white border border-gray-300 rounded px-3 py-2">
                    <option value="">Optional: link to note or page</option>
                    ${memory.insights.slice(0, 30).map(note => `<option value="note:${note.id}">🧠 ${escapeHTML(note.title)}</option>`).join('')}
                    ${(state.workspace?.pages || []).slice(0, 20).map(page => `<option value="page:${page.id}">📄 ${escapeHTML(page.title)}</option>`).join('')}
                  </select>
                  <button class="px-3 py-2 rounded bg-orange-500 text-white font-semibold hover:bg-orange-600">Add Action</button>
                </form>
                <ul class="space-y-2 max-h-[28vh] overflow-auto scrollbar-thin pr-1">
                  ${memory.actions.map(action => {
                    const linked = (action.linkRef || '').split(':');
                    const kind = linked[0];
                    const id = linked[1];
                    const linkedLabel = kind === 'note'
                      ? (memory.insights.find(n => n.id === id)?.title || 'Missing note')
                      : kind === 'page'
                        ? ((state.workspace?.pages || []).find(p => p.id === id)?.title || 'Missing page')
                        : '';
                    return `
                      <li class="bg-[#fffaf5] border border-orange-100 rounded-lg p-3 text-sm flex justify-between gap-3">
                        <div>
                          <p class="text-zinc-800">${escapeHTML(action.text)} <span class="text-zinc-500">· ${escapeHTML(action.category)}</span></p>
                          <p class="text-xs text-zinc-500 mt-1">${new Date(action.ts || Date.now()).toLocaleString()}</p>
                          ${linkedLabel ? `<button data-jump="${escapeAttr(action.linkRef)}" class="text-xs text-orange-700 hover:text-orange-800 mt-1">Linked to: ${escapeHTML(linkedLabel)}</button>` : '<p class="text-xs text-zinc-500 mt-1">No link added</p>'}
                        </div>
                        <button data-del-action="${action.id}" class="text-red-500 text-xs">Delete</button>
                      </li>
                    `;
                  }).join('') || `
                    <li class="rounded-xl border border-dashed border-orange-200 bg-orange-50/70 p-4 text-center text-sm text-zinc-600">
                      No actions yet. Add your first action to keep momentum.
                    </li>
                  `}
                </ul>
              </section>
            </div>
          </div>
        </section>
      `;

      const openNote = (noteId) => {
        memory.activeNoteId = noteId;
        memory.viewMode = 'list';
        saveState();
      };

      el.querySelectorAll('[data-memory-tab]').forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.memoryTab === 'graph') {
            memory.viewMode = 'graph';
          } else {
            memory.leftTab = btn.dataset.memoryTab;
            memory.viewMode = 'list';
          }
          saveState();
        };
      });

      document.getElementById('memorySearch').oninput = (e) => {
        memory.search = e.target.value;
        saveState();
      };

      document.getElementById('newMemoryNote').onclick = () => {
        const note = {
          id: crypto.randomUUID(),
          title: `Note ${memory.insights.length + 1}`,
          content: '',
          tags: ['General'],
          tag: 'General',
          ts: new Date().toISOString(),
          isDaily: false,
          links: []
        };
        memory.insights.unshift(note);
        memory.activeNoteId = note.id;
        memory.leftTab = 'all';
        memory.viewMode = 'list';
        saveState();
      };
      document.getElementById('emptyNewNote')?.addEventListener('click', () => document.getElementById('newMemoryNote').click());
      document.getElementById('emptyEditorNewNote')?.addEventListener('click', () => document.getElementById('newMemoryNote').click());

      document.getElementById('newDailyNote').onclick = () => {
        const existing = memory.insights.find(n => n.isDaily && n.title === dailyISO);
        if (existing) {
          memory.activeNoteId = existing.id;
          memory.leftTab = 'daily';
          memory.viewMode = 'list';
          saveState();
          return;
        }
        const note = {
          id: crypto.randomUUID(),
          title: dailyISO,
          content: `# Daily Note ${dailyISO}\n\n## Priorities\n- \n\n## Wins\n- `,
          tags: ['Daily', 'Journal'],
          tag: 'Daily, Journal',
          ts: new Date().toISOString(),
          isDaily: true,
          links: []
        };
        memory.insights.unshift(note);
        memory.activeNoteId = note.id;
        memory.leftTab = 'daily';
        memory.viewMode = 'list';
        saveState();
      };
      document.getElementById('emptyNewDailyNote')?.addEventListener('click', () => document.getElementById('newDailyNote').click());
      document.getElementById('emptyEditorNewDailyNote')?.addEventListener('click', () => document.getElementById('newDailyNote').click());

      el.querySelectorAll('[data-open-note]').forEach(btn => {
        btn.onclick = () => openNote(btn.dataset.openNote);
      });

      if (activeNote && memory.viewMode !== 'graph') {
        const showRelatedBtn = document.getElementById('memoryShowRelated');
        if (showRelatedBtn) showRelatedBtn.onclick = () => showRelated(`note:${activeNote.id}`);
        const linkToPageBtn = document.getElementById('memoryLinkToPage');
        if (linkToPageBtn) {
          linkToPageBtn.onclick = () => {
            const select = document.getElementById('memoryLinkPageSelect');
            const pageId = select?.value;
            if (!pageId) return;
            const page = (state.workspace?.pages || []).find(p => p.id === pageId);
            if (!page) return;
            const line = `\n\nRelated page: ${page.title}`;
            if (!activeNote.content.includes(line.trim())) activeNote.content += line;
            activeNote.ts = new Date().toISOString();
            saveState();
          };
        }
        document.getElementById('noteTitle').oninput = (e) => {

          saveStateWithoutRender();

          activeNote.ts = new Date().toISOString();
          saveStateWithoutRender();
        };
        document.getElementById('noteContent').oninput = (e) => {
          activeNote.content = e.target.value;
          activeNote.ts = new Date().toISOString();
          saveStateWithoutRender();

          memory.actions = memory.actions.filter(action => action.linkRef !== `note:${activeNote.id}`);
          saveState();

      if (memory.viewMode === 'graph') {
        const canvas = document.getElementById('memoryGraphCanvas');
        const ctx = canvas?.getContext('2d');
        if (ctx) {
          const animatedNodes = graphNodes.map(node => ({ ...node, sx: node.x, sy: node.y + 14, alpha: 0 }));
          const animatedNodeMap = new Map(animatedNodes.map(node => [node.id, node]));
          const springEase = (t) => {
            const clamped = Math.max(0, Math.min(1, t));
            return 1 - Math.exp(-5 * clamped) * Math.cos(5 * clamped);
          };
          const draw = (hoverId = null, nodeAlpha = 1) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0b111a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 1.3;
            filteredNotes.forEach(note => {
              const from = animatedNodeMap.get(note.id) || nodeMap.get(note.id);
              (note.links || []).forEach(targetId => {
                const to = animatedNodeMap.get(targetId) || nodeMap.get(targetId);
                if (!from || !to) return;
                ctx.strokeStyle = `rgba(20, 184, 166, ${0.35 * nodeAlpha})`;
                ctx.beginPath();
                ctx.moveTo(from.sx || from.x, from.sy || from.y);
                ctx.lineTo(to.sx || to.x, to.sy || to.y);
                ctx.stroke();
              });
            });

            animatedNodes.forEach(node => {
              const isActive = node.id === memory.activeNoteId;
              const isHover = node.id === hoverId;
              const x = node.sx || node.x;
              const y = node.sy || node.y;
              const alpha = (node.alpha ?? 1) * nodeAlpha;
              ctx.beginPath();
              ctx.arc(x, y, isHover ? node.r + 3 : node.r, 0, Math.PI * 2);
              ctx.fillStyle = isActive ? `rgba(20, 184, 166, ${alpha})` : `rgba(30, 41, 59, ${alpha})`;
              ctx.fill();
              ctx.lineWidth = isActive ? 2 : 1;
              ctx.strokeStyle = isActive ? `rgba(20, 184, 166, ${0.8 * alpha})` : `rgba(148, 163, 184, ${0.35 * alpha})`;
              ctx.stroke();

              ctx.fillStyle = isActive ? `rgba(0, 16, 24, ${alpha})` : `rgba(219, 234, 254, ${alpha})`;
              ctx.font = '12px sans-serif';
              ctx.fillText(node.title.slice(0, 18), x + 14, y + 4);
            });
          };

          const getNodeAt = (evt) => {
            const rect = canvas.getBoundingClientRect();
            const x = (evt.clientX - rect.left) * (canvas.width / rect.width);
            const y = (evt.clientY - rect.top) * (canvas.height / rect.height);
            return graphNodes.find(node => Math.hypot(node.x - x, node.y - y) <= node.r + 4) || null;
          };

          if (prefersReducedMotion()) {
            animatedNodes.forEach(node => {
              node.sx = node.x;
              node.sy = node.y;
              node.alpha = 1;
            });
            draw();
          } else {
            const startedAt = performance.now();
            const duration = 420;
            const animateGraphIn = (now) => {
              const t = Math.min(1, (now - startedAt) / duration);
              const eased = springEase(t);
              animatedNodes.forEach((node, idx) => {
                const stagger = Math.min(1, Math.max(0, (t * 1.08) - idx * 0.025));
                const local = springEase(stagger);
                node.sx = node.x;
                node.sy = node.y + (1 - local) * 14;
                node.alpha = local;
              });
              draw(null, eased);
              if (t < 1) requestAnimationFrame(animateGraphIn);
            };
            requestAnimationFrame(animateGraphIn);
          }
          canvas.onmousemove = (evt) => {
            const hit = getNodeAt(evt);
            canvas.style.cursor = hit ? 'pointer' : 'default';
            draw(hit?.id || null);
          };
          canvas.onclick = (evt) => {
            const hit = getNodeAt(evt);
            if (!hit) return;
            memory.activeNoteId = hit.id;
            memory.viewMode = 'list';
            saveState();

        }

        for (let i = 1; i <= 6; i += 1) {

          cash += (revenue - expenses);
          const runway = expenses > 0 ? `${Math.max(0, cash / expenses).toFixed(1)} months` : 'N/A';
          rows.push({ month: `M${i}`, revenue, expenses, runway });
        }
        return rows;

      const height = canvas.clientHeight;
      canvas.width = Math.floor(width * dpr); canvas.height = Math.floor(height * dpr); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const layout = visibleNodes.map((n, i) => ({ ...n, x: center.x + Math.cos(i) * 120, y: center.y + Math.sin(i) * 120, r: 14 + Math.min(10, n.connected), vx: 0, vy: 0 }));

        layout.forEach((n) => { ctx.fillStyle = colorByType[n.type] || '#0ea5a4'; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill(); ctx.strokeStyle = hover?.ref===n.ref ? '#0f766e' : '#fff'; ctx.lineWidth = hover?.ref===n.ref ? 3 : 1.5; ctx.stroke(); ctx.fillStyle='#0f172a'; ctx.font='600 12px Inter'; ctx.fillText(`${iconByType[n.type] || '•'} ${n.label}`.slice(0,30), n.x+n.r+5,n.y-2); });
        ctx.restore();
      }

      const clamp = () => { scale = Math.max(0.45, Math.min(3, scale)); };
      document.getElementById('kgZoomIn').onclick = () => { scale*=1.2; clamp(); draw(); };

      canvas.onmouseup = (e) => { const hit=hitNode(e.clientX,e.clientY); drag=null; pan=false; if (hit && !moved) openReference(hit.ref); };

                  const row = team.responsibilities[area] || {};
                  return `<tr class="border-t border-orange-100"><td class="p-2 font-medium">${area}</td>
                    <td class="p-2"><select data-raci="${area}|r" class="w-full rounded border border-orange-200 px-2 py-1"><option value="">—</option>${memberOptions.replace(`value="${escapeAttr(row.r)}"`, `value="${escapeAttr(row.r)}" selected`)}</select></td>
                    <td class="p-2"><select data-raci="${area}|a" class="w-full rounded border border-orange-200 px-2 py-1"><option value="">—</option>${memberOptions.replace(`value="${escapeAttr(row.a)}"`, `value="${escapeAttr(row.a)}" selected`)}</select></td>
                    <td class="p-2"><select data-raci="${area}|c" class="w-full rounded border border-orange-200 px-2 py-1"><option value="">—</option>${memberOptions.replace(`value="${escapeAttr(row.c)}"`, `value="${escapeAttr(row.c)}" selected`)}</select></td>
                    <td class="p-2"><select data-raci="${area}|i" class="w-full rounded border border-orange-200 px-2 py-1"><option value="">—</option>${memberOptions.replace(`value="${escapeAttr(row.i)}"`, `value="${escapeAttr(row.i)}" selected`)}</select></td></tr>`;
                }).join('')}
                </tbody>
              </table>
            </div>

            <div class="rounded-xl border border-orange-200 p-4 space-y-3">
              <h4 class="font-semibold text-orange-700">Meeting Tracker</h4>
              <form id="meetingForm" class="grid md:grid-cols-2 xl:grid-cols-3 gap-3">
                <label class="text-sm">Meeting Title<input name="title" required class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2" /></label>
                <label class="text-sm">Date & Time<input name="datetime" type="datetime-local" required class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2" /></label>
                <label class="text-sm">Participants<input name="participants" placeholder="Names separated by comma" class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2" /></label>
                <label class="text-sm md:col-span-2">Purpose / Agenda<input name="agenda" class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2" /></label>
                <label class="text-sm">Recurring<select name="recurring" class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2"><option value="no">No</option><option value="yes">Yes</option></select></label>
                <div class="self-end"><button type="submit" class="w-full rounded-lg bg-orange-500 text-white px-4 py-2 font-medium">Add Meeting</button></div>
              </form>
              <div class="space-y-2">
                ${team.meetings.length ? team.meetings.map((meeting) => `<div class="rounded-lg border border-orange-100 bg-orange-50/40 p-3 flex flex-wrap gap-3 items-center justify-between">
                  <div><p class="font-medium">${escapeHTML(meeting.title)}</p><p class="text-xs text-zinc-500">${new Date(meeting.datetime).toLocaleString()} • ${escapeHTML(meeting.participants || 'No participants')}</p><p class="text-xs text-zinc-500">${escapeHTML(meeting.agenda || 'No agenda')}</p></div>
                  <div class="flex gap-2"><span class="text-xs px-2 py-1 rounded-full border border-orange-200">${meeting.recurring ? 'Recurring' : 'One-time'}</span><button data-action="edit-meeting" data-meeting-id="${escapeAttr(meeting.id)}" class="px-2 py-1 rounded border border-orange-300 text-orange-700 text-sm">Edit</button><button data-action="remove-meeting" data-meeting-id="${escapeAttr(meeting.id)}" class="px-2 py-1 rounded border border-red-300 text-red-600 text-sm">Delete</button></div>
                </div>`).join('') : emptyStateMarkup('📅', 'No meetings scheduled yet.', 'Create your first recurring sync to stay aligned.', '', 'Start Here', 'section:settings')}
              </div>
            </div>

            <div class="rounded-xl border border-orange-200 bg-orange-50/60 p-4">
              <h4 class="font-semibold text-orange-700 mb-2">Team Insights</h4>
              <ul class="text-sm space-y-1 text-zinc-700 list-disc pl-5">
                <li>Recommended next hire: <strong>${escapeHTML(recommendedHire)}</strong>.</li>
                <li>${escapeHTML(equityNote)}</li>
                <li>${escapeHTML(burnNote)}</li>
              </ul>
            </div>
          </article>

          <div class="grid lg:grid-cols-2 gap-4">
            <article class="rounded-2xl border border-orange-200 bg-white p-5 shadow-sm space-y-3">
              <h3 class="font-semibold text-lg text-orange-700">Preferences</h3>
              <label class="block text-sm">
                <span class="font-medium text-zinc-700">Currency</span>
                <select data-setting="preferences.currency" class="w-full mt-1 rounded-xl border border-orange-200 bg-gradient-to-b from-white to-orange-50/30 px-3 py-2.5 shadow-sm focus:border-orange-400 focus:ring-2 focus:ring-orange-200">
                  ${renderCurrencyOptions(s.preferences.currency)}
                </select>
              </label>
              <label class="block text-sm">Language<select data-setting="preferences.language" class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2">${SUPPORTED_LANGUAGES.map((lang) => `<option value="${lang}" ${normalizeLanguageCode(s.preferences.language)===lang?'selected':''}>${LANGUAGE_NAMES[lang]}</option>`).join('')}</select></label>
              <label class="block text-sm">Date Format<select data-setting="preferences.dateFormat" class="w-full mt-1 rounded-lg border border-orange-200 px-3 py-2"><option ${s.preferences.dateFormat==='MM/DD/YYYY'?'selected':''}>MM/DD/YYYY</option><option ${s.preferences.dateFormat==='DD/MM/YYYY'?'selected':''}>DD/MM/YYYY</option><option ${s.preferences.dateFormat==='YYYY-MM-DD'?'selected':''}>YYYY-MM-DD</option></select></label>
              <label class="flex items-center justify-between rounded-lg border border-orange-200 bg-orange-50 px-3 py-2"><span>Dark Mode</span><input type="checkbox" data-setting="preferences.darkMode" ${s.preferences.darkMode ? 'checked' : ''} class="accent-orange-500" /></label>
            </article>

            <article class="rounded-2xl border border-orange-200 bg-white p-5 shadow-sm space-y-3">
              <h3 class="font-semibold text-lg text-orange-700">Data Management</h3>
              <p class="text-sm text-zinc-500">Export, import, or reset your entire workspace data securely.</p>
              <div class="flex flex-wrap gap-2">
                <button id="exportAll" class="px-3 py-2 rounded-lg bg-orange-500 text-white">Export All My Data</button>
                <label class="px-3 py-2 rounded-lg border border-orange-300 cursor-pointer">Import Data<input id="importAll" type="file" accept="application/json" class="hidden"></label>
                <button id="clearAll" class="px-3 py-2 rounded-lg border border-red-300 text-red-600">Reset All Data</button>
              </div>
            </article>
          </div>
        </section>
      `;

      el.querySelectorAll('[data-setting]').forEach(input => {
        input.oninput = () => {
          const path = input.dataset.setting.split('.');
          let ref = state.settings;
          for (let i = 0; i < path.length - 1; i++) ref = ref[path[i]];
          ref[path.at(-1)] = input.type === 'checkbox' ? input.checked : input.value;
          if (input.dataset.setting === 'preferences.language') {
            setLanguage(input.value);
            return;
          }
          if (input.dataset.setting === 'business.name') {
            state.title = input.value;
            document.getElementById('workspaceTitle').value = input.value;
          }
          if (input.dataset.setting === 'founder.name' || input.dataset.setting === 'founder.role') {
            renderHeaderFounderProfile();
          }
          applyThemePreference();
          saveStateWithoutRender();
        };
      });

      const photoInput = document.getElementById('founderPhotoInput');
      const photoUploadBtn = document.getElementById('founderPhotoUploadBtn');
      const photoRemoveBtn = document.getElementById('founderPhotoRemoveBtn');
      const photoPreview = document.getElementById('founderPhotoPreview');
      const founderNameInput = el.querySelector('[data-setting="founder.name"]');
      const updateFounderPhotoUI = () => {
        const founderName = founderNameInput?.value?.trim() || state.settings.founder.name || 'Founder';
        if (photoPreview) {
          photoPreview.innerHTML = renderFounderAvatar({
            name: founderName,
            photo: state.settings.founder.photo,
            size: 'h-[120px] w-[120px] text-3xl'
          });
        }
        if (photoUploadBtn) photoUploadBtn.textContent = state.settings.founder.photo ? 'Change Photo' : 'Upload Photo';
        if (photoRemoveBtn) photoRemoveBtn.classList.toggle('hidden', !state.settings.founder.photo);
        renderHeaderFounderProfile();
      };

      if (photoUploadBtn && photoInput) {
        photoUploadBtn.onclick = () => photoInput.click();
      }
      if (photoInput) {
        photoInput.onchange = (event) => {
          const file = event.target?.files?.[0];
          if (!file) return;
          if (!file.type.startsWith('image/')) {
            alert('Please upload a valid image file.');
            photoInput.value = '';
            return;
          }
          const maxBytes = 2 * 1024 * 1024;
          if (file.size > maxBytes) {
            alert('Image size should be 2MB or less.');
            photoInput.value = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = (loadEvent) => {
            const base64Image = String(loadEvent.target?.result || '');
            if (!base64Image) return;
            state.settings.founder.photo = base64Image;
            updateFounderPhotoUI();
            saveStateWithoutRender();
            photoInput.value = '';
          };
          reader.onerror = () => {
            alert('Could not process the selected image. Please try another file.');
            photoInput.value = '';
          };
          reader.readAsDataURL(file);
        };
      }
      if (photoRemoveBtn) {
        photoRemoveBtn.onclick = () => {
          state.settings.founder.photo = '';
          updateFounderPhotoUI();
          saveStateWithoutRender();
        };
      }
      if (founderNameInput) {
        founderNameInput.addEventListener('input', updateFounderPhotoUI);
      }
      el.querySelectorAll('[data-raci]').forEach((select) => {
        select.onchange = () => {
          const [area, type] = select.dataset.raci.split('|');
          state.settings.team.responsibilities[area] ||= { r: '', a: '', c: '', i: '' };
          state.settings.team.responsibilities[area][type] = select.value;
          saveState();
        };
      });
      const memberForm = document.getElementById('teamMemberForm');
      if (memberForm) {
        memberForm.onsubmit = (event) => {
          event.preventDefault();
          const form = new FormData(memberForm);
          const rolePreset = String(form.get('rolePreset') || '').trim();
          const roleCustom = String(form.get('roleCustom') || '').trim();
          const role = roleCustom || rolePreset;
          state.settings.team.members.push({
            id: createId(),
            name: String(form.get('name') || '').trim(),
            role,
            email: String(form.get('email') || '').trim(),
            equity: Number(form.get('equity')) || 0,
            salary: Number(form.get('salary')) || 0,
            dateJoined: String(form.get('dateJoined') || ''),
            notes: String(form.get('notes') || '').trim(),
            status: 'Active'
          });
          saveState();
          renderSettings();
        };
      }
      el.querySelectorAll('[data-action="remove-member"]').forEach((button) => {
        button.onclick = () => {
          const memberId = button.dataset.memberId;
          state.settings.team.members = state.settings.team.members.filter((m) => m.id !== memberId);
          saveState();
          renderSettings();
        };
      });
      el.querySelectorAll('[data-action="edit-member"]').forEach((button) => {
        button.onclick = () => {
          const member = state.settings.team.members.find((m) => m.id === button.dataset.memberId);
          if (!member) return;
          const name = prompt('Full Name', member.name) ?? member.name;
          const role = prompt('Role', member.role) ?? member.role;
          const equity = prompt('Equity %', String(member.equity ?? 0));
          const salary = prompt('Monthly Salary', String(member.salary ?? 0));
          member.name = name.trim() || member.name;
          member.role = role.trim() || member.role;
          member.equity = Number(equity);
          member.salary = Number(salary);
          saveState();
          renderSettings();
        };
      });
      const meetingForm = document.getElementById('meetingForm');
      if (meetingForm) {
        meetingForm.onsubmit = (event) => {
          event.preventDefault();
          const form = new FormData(meetingForm);
          state.settings.team.meetings.push({
            id: createId(),
            title: String(form.get('title') || '').trim(),
            datetime: String(form.get('datetime') || ''),
            participants: String(form.get('participants') || '').trim(),
            agenda: String(form.get('agenda') || '').trim(),
            recurring: String(form.get('recurring') || 'no') === 'yes'
          });
          saveState();
          renderSettings();
        };
      }
      el.querySelectorAll('[data-action="remove-meeting"]').forEach((button) => {
        button.onclick = () => {
          state.settings.team.meetings = state.settings.team.meetings.filter((m) => m.id !== button.dataset.meetingId);
          saveState();
          renderSettings();
        };
      });
      el.querySelectorAll('[data-action="edit-meeting"]').forEach((button) => {
        button.onclick = () => {
          const meeting = state.settings.team.meetings.find((m) => m.id === button.dataset.meetingId);
          if (!meeting) return;
          const title = prompt('Meeting Title', meeting.title) ?? meeting.title;
          const agenda = prompt('Purpose / Agenda', meeting.agenda || '') ?? meeting.agenda;
          meeting.title = title.trim() || meeting.title;
          meeting.agenda = agenda.trim();
          saveState();
          renderSettings();
        };
      });
      document.getElementById('exportAll').onclick = () => downloadJSON('barya-all-data.json', state);
      document.getElementById('importAll').onchange = (e) => importJSONFile(e.target.files[0], (data) => {
        state = deepMerge(structuredClone(defaultState), data);
        setLanguage(state.settings?.preferences?.language || 'en', { skipRender: true });
        applyThemePreference();
        renderHeaderFounderProfile();
        saveState();
        renderNav();
        renderActiveSection();
        document.getElementById('workspaceTitle').value = state.title;
        translateDom(document.body);
      });
      document.getElementById('clearAll').onclick = () => {
        if (!confirm('Reset all workspace data? This action cannot be undone.')) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(LANGUAGE_STORAGE_KEY);
        state = structuredClone(defaultState);
        setLanguage('en', { skipRender: true });
        applyThemePreference();
        renderHeaderFounderProfile();
        saveState();
        renderNav();
        document.getElementById('workspaceTitle').value = state.title;
        renderActiveSection();
        translateDom(document.body);
      };
    }

    function inputField(label, settingPath, value, type='text', placeholder='') {
      return `<label class="block text-sm">${label}<input type="${type}" data-setting="${settingPath}" value="${escapeAttr(value)}" placeholder="${escapeAttr(placeholder)}" class="w-full mt-1 rounded-lg border border-orange-200 bg-white px-3 py-2" /></label>`;
    }

    function emptyStateMarkup(icon = '✨', title = 'Nothing here yet', subtitle = 'Start by adding your first item.', extraClass = '', ctaLabel = '', ctaAction = '') {
      return `<div class="rounded-xl border border-dashed border-orange-500/25 bg-orange-500/5 p-4 text-center ${extraClass}">
        <p class="text-xl mb-1">${icon}</p>
        <p class="text-sm font-medium text-orange-100">${escapeHTML(title)}</p>
        <p class="text-xs text-zinc-400 mt-1">${escapeHTML(subtitle)}</p>
        ${ctaAction ? `<button type="button" data-start-here="${escapeAttr(ctaAction)}" class="mt-3 px-3 py-1.5 rounded-lg border border-teal-300 bg-teal-50 text-teal-700 text-xs font-semibold hover:bg-teal-100">${escapeHTML(ctaLabel || 'Start Here')}</button>` : ''}
      </div>`;
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function importJSONFile(file, cb) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          cb(data);
        } catch {
          alert('Invalid JSON file.');
        }
      };
      reader.readAsText(file);
    }

    function escapeHTML(str='') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(str='') { return escapeHTML(str).replaceAll('`',''); }

    init();
  </script>
</body>
</html>
