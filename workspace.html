<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barya Business AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            barya: {
              bg: '#0a0a0a',
              card: '#111111',
              accent: '#00d4ff',
              soft: '#1a1a1a'
            }
          },
          boxShadow: {
            neon: '0 0 0 1px rgba(0, 212, 255, 0.3), 0 0 30px rgba(0, 212, 255, 0.12)'
          }
        }
      }
    };
  </script>
  <style>
    :root { color-scheme: dark; }
    body { background: #0a0a0a; }
    .section-panel { display: none; }
    .section-panel.active { display: block; }
    .active-nav { background: rgba(0, 212, 255, 0.14); color: #00d4ff; border-color: rgba(0, 212, 255, 0.25); }
    .ring-progress {
      width: 132px;
      height: 132px;
      border-radius: 999px;
      background: conic-gradient(#00d4ff var(--pct), #202020 0);
      display: grid;
      place-items: center;
    }
    .ring-progress > div {
      width: 98px;
      height: 98px;
      border-radius: 999px;
      background: #111111;
      display: grid;
      place-items: center;
      border: 1px solid #2b2b2b;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #2c2c2c; border-radius: 10px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #131313; }
  </style>
</head>
<body class="text-zinc-100 min-h-screen">
  <div class="min-h-screen flex">
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-[270px] bg-[#0d0d0d] border-r border-zinc-800 px-4 py-5 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-lg font-semibold text-barya-accent">Barya Workspace</h1>
          <p class="text-xs text-zinc-400">Business AI Operating System</p>
        </div>
        <button id="closeSidebar" class="lg:hidden p-2 rounded border border-zinc-700 text-zinc-300">✕</button>
      </div>
      <nav class="space-y-2" id="mainNav"></nav>
    </aside>

    <div class="flex-1 lg:ml-0 w-full">
      <header class="sticky top-0 z-30 backdrop-blur bg-[#0a0a0a]/90 border-b border-zinc-800 px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <button id="openSidebar" class="lg:hidden p-2 rounded border border-zinc-700">☰</button>
          <input id="workspaceTitle" class="bg-transparent text-xl sm:text-2xl font-semibold outline-none border-b border-transparent focus:border-barya-accent max-w-[56vw] truncate" />
        </div>
        <div class="flex items-center gap-3">
          <span class="hidden sm:inline-flex text-xs bg-barya-soft border border-zinc-700 px-2 py-1 rounded-full">Local-First</span>
          <div class="text-right">
            <p class="text-sm font-medium">Shruti Barya</p>
            <p class="text-xs text-zinc-400">Founder</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 text-black font-bold grid place-items-center">SB</div>
        </div>
      </header>

      <main class="p-4 sm:p-6 space-y-6">
        <section id="section-dashboard" class="section-panel active space-y-6"></section>
        <section id="section-workspace" class="section-panel space-y-6"></section>
        <section id="section-tasks" class="section-panel space-y-6"></section>
        <section id="section-ai" class="section-panel space-y-6"></section>
        <section id="section-memory" class="section-panel space-y-6"></section>
        <section id="section-planning" class="section-panel space-y-6"></section>
        <section id="section-settings" class="section-panel space-y-6"></section>
      </main>
    </div>
  </div>

  <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

  <dialog id="memoryModal" class="w-[min(92vw,700px)] bg-[#111] border border-zinc-700 rounded-xl p-0 text-zinc-100">
    <div class="p-5 border-b border-zinc-800 flex justify-between items-center">
      <h3 class="text-lg font-semibold">Insight</h3>
      <button id="closeMemoryModal" class="text-zinc-400 hover:text-zinc-100">✕</button>
    </div>
    <div class="p-5" id="memoryModalBody"></div>
  </dialog>

  <script>
    const STORAGE_KEY = 'baryaWorkspaceV2';
    const navItems = [
      { id: 'dashboard', icon: '📊', label: 'Dashboard' },
      { id: 'workspace', icon: '📑', label: 'Workspace' },
      { id: 'tasks', icon: '✅', label: 'Tasks' },
      { id: 'ai', icon: '🤖', label: 'Barya AI' },
      { id: 'memory', icon: '🧠', label: 'Memory' },
      { id: 'planning', icon: '🗺️', label: 'Business Planning' },
      { id: 'settings', icon: '⚙️', label: 'Settings' }
    ];

    const defaultState = {
      activeSection: 'dashboard',
      title: 'Untitled Startup',
      dashboard: {
        metrics: { income: 25000, expenses: 12000, netSavings: 13000, runway: 9 },
        expenseCategories: [
          { id: crypto.randomUUID(), name: 'Payroll', amount: 6200 },
          { id: crypto.randomUUID(), name: 'Marketing', amount: 2500 },
          { id: crypto.randomUUID(), name: 'Software', amount: 1400 },
          { id: crypto.randomUUID(), name: 'Operations', amount: 1900 }
        ],
        transactions: [
          { id: crypto.randomUUID(), type: 'income', category: 'Revenue', amount: 25000, notes: 'Monthly recurring revenue', ts: new Date().toISOString() },
          { id: crypto.randomUUID(), type: 'expense', category: 'Payroll', amount: 6200, notes: 'Salaries + contractor payouts', ts: new Date().toISOString() },
          { id: crypto.randomUUID(), type: 'expense', category: 'Marketing', amount: 2500, notes: 'Paid acquisition + content', ts: new Date().toISOString() }
        ],
        recommendations: [],
        healthScore: 72
      },
      ai: {
        history: [
          {
            role: 'assistant',
            message: 'Welcome! Ask me about growth, runway, product, or hiring priorities.',
            structured: {
              answer: 'I can help you make practical founder decisions quickly.',
              why: 'You need clear decisions, not generic advice.',
              steps: ['Pick one challenge', 'Share current numbers', 'Define desired outcome'],
              tip: 'Specific context improves response quality.',
              next: 'Try asking: How do I improve runway in 60 days?'
            },
            ts: new Date().toISOString()
          }
        ]
      },
      memory: {
        insights: [
          { id: crypto.randomUUID(), title: 'ICP clarity', content: 'Top segment is B2B SaaS founders at pre-seed.', tag: 'Strategy', ts: new Date().toISOString() }
        ],
        actions: [
          { id: crypto.randomUUID(), text: 'Call 3 churned customers', category: 'Customer', ts: new Date().toISOString() }
        ],
        search: ''
      },
      workspace: {
        pages: [
          {
            id: crypto.randomUUID(),
            title: 'Welcome Workspace Page',
            updatedAt: new Date().toISOString(),
            blocks: [
              { id: crypto.randomUUID(), type: 'h1', text: 'Welcome to your flexible workspace' },
              { id: crypto.randomUUID(), type: 'paragraph', text: 'Create structured notes, to-dos, and plans. Everything is stored locally.' },
              { id: crypto.randomUUID(), type: 'todo', text: 'Create your first custom page', checked: false }
            ]
          }
        ],
        activePageId: null,
        databases: [],
        activeDatabaseId: null
      },
      tasks: {
        items: [],
        sprints: [],
        leftTab: 'all',
        view: 'list',
        search: '',
        priorityFilter: 'All',
        statusFilter: 'All',
        sprintFilter: 'all',
        selectedTaskId: null
      },
      planning: {
        guides: [
          { title: 'Market Validation', tasks: ['Interview 10 users', 'Test pricing', 'Confirm top pain'], done: [false, false, false] },
          { title: 'Go-To-Market', tasks: ['Define channel mix', 'Launch weekly content', 'Set CAC target'], done: [false, false, false] },
          { title: 'Financial Discipline', tasks: ['Set burn cap', 'Track runway weekly', 'Review budget monthly'], done: [false, false, false] },
          { title: 'Team Execution', tasks: ['Define roles', 'Set weekly goals', 'Run retro every Friday'], done: [false, false, false] }
        ],
        templates: {
          onePager: 'Vision, customer, problem, solution, moat.',
          fundraise: 'Round goal, use of funds, milestones.',
          ops: 'Quarter goals, KPI owners, weekly cadence.'
        }
      },
      settings: {
        founder: { name: 'Shruti Barya', role: 'Founder', email: 'shruti@barya.ai' },
        business: { name: 'Untitled Startup', stage: 'Pre-Seed', industry: 'B2B SaaS' },
        preferences: { currency: 'USD', language: 'English', darkMode: true }
      }
    };

    let state = loadState();
    let cashflowChart;
    let expenseChart;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(defaultState);
      try {
        const parsed = JSON.parse(raw);
        return deepMerge(structuredClone(defaultState), parsed);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function deepMerge(target, source) {
      for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
          deepMerge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
      return target;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateRecommendations();
      renderActiveSection();
    }

    function init() {
      renderNav();
      setupBaseEvents();
      updateRecommendations();
      renderActiveSection();
      document.getElementById('workspaceTitle').value = state.title;
    }

    function renderNav() {
      const nav = document.getElementById('mainNav');
      nav.innerHTML = navItems.map(item => `
        <button data-section="${item.id}" class="w-full border border-zinc-800 rounded-xl px-3 py-2.5 flex items-center gap-2 text-left hover:border-cyan-500/40 ${state.activeSection === item.id ? 'active-nav' : ''}">
          <span>${item.icon}</span><span class="text-sm font-medium">${item.label}</span>
        </button>
      `).join('');

      nav.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          state.activeSection = btn.dataset.section;
          renderNav();
          renderActiveSection();
          closeSidebar();
          saveStateRaw();
        };
      });
    }

    function saveStateRaw(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function renderActiveSection() {
      document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
      document.getElementById(`section-${state.activeSection}`).classList.add('active');
      if (state.activeSection === 'dashboard') renderDashboard();
      if (state.activeSection === 'workspace') renderWorkspace();
      if (state.activeSection === 'tasks') renderTasks();
      if (state.activeSection === 'ai') renderAI();
      if (state.activeSection === 'memory') renderMemory();
      if (state.activeSection === 'planning') renderPlanning();
      if (state.activeSection === 'settings') renderSettings();
    }

    function setupBaseEvents() {
      const titleInput = document.getElementById('workspaceTitle');
      titleInput.addEventListener('input', (e) => {
        state.title = e.target.value || 'Untitled Startup';
        state.settings.business.name = state.title;
        saveStateRaw();
      });
      document.getElementById('openSidebar').onclick = openSidebar;
      document.getElementById('closeSidebar').onclick = closeSidebar;
      document.getElementById('overlay').onclick = closeSidebar;
      document.getElementById('closeMemoryModal').onclick = () => document.getElementById('memoryModal').close();
    }

    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('overlay').classList.add('hidden');
    }

    function money(v){ return `${state.settings.preferences.currency} ${Number(v || 0).toLocaleString()}`; }

    function normalizeDashboardState() {
      const d = state.dashboard;
      if (!d.metrics) d.metrics = structuredClone(defaultState.dashboard.metrics);
      d.metrics.income = Number(d.metrics.income || 0);
      d.metrics.expenses = Number(d.metrics.expenses || 0);
      d.metrics.netSavings = Number(d.metrics.netSavings || d.metrics.income - d.metrics.expenses);
      d.metrics.runway = Number(d.metrics.runway || 0);
      if (!Array.isArray(d.expenseCategories)) d.expenseCategories = [];
      d.expenseCategories = d.expenseCategories.map(cat => ({
        id: cat.id || crypto.randomUUID(),
        name: (cat.name || 'Category').trim(),
        amount: Number(cat.amount || 0)
      })).filter(cat => cat.name);
      if (!Array.isArray(d.transactions)) d.transactions = [];
      d.transactions = d.transactions.map(tx => ({
        id: tx.id || crypto.randomUUID(),
        type: tx.type === 'income' ? 'income' : 'expense',
        category: tx.category || (tx.type === 'income' ? 'Revenue' : 'General'),
        amount: Number(tx.amount || 0),
        notes: tx.notes || '',
        ts: tx.ts || new Date().toISOString()
      }));
      if (!Array.isArray(d.recommendations)) d.recommendations = [];
      d.healthScore = Number.isFinite(Number(d.healthScore)) ? Number(d.healthScore) : 0;
    }

    function computeFinancialHealth() {
      const { income, expenses, runway } = state.dashboard.metrics;
      const profitabilityRaw = income <= 0 ? (expenses === 0 ? 100 : 0) : ((income - expenses) / income) * 100;
      const profitability = Math.max(0, Math.min(100, Math.round(profitabilityRaw)));
      const runwayScore = Math.max(0, Math.min(100, Math.round((runway / 18) * 100)));
      const burnRatio = income <= 0 ? 100 : Math.min(100, (expenses / income) * 100);
      const burnRateScore = Math.max(0, Math.min(100, Math.round(100 - burnRatio)));
      const healthScore = Math.round(runwayScore * 0.4 + profitability * 0.35 + burnRateScore * 0.25);
      state.dashboard.healthScore = healthScore;
      return { healthScore, runwayScore, profitability, burnRateScore };
    }

    function getTopExpenseCategories() {
      return [...state.dashboard.expenseCategories]
        .sort((a, b) => b.amount - a.amount)
        .slice(0, 3);
    }

    function getForecast(months = 6) {
      const { income, expenses, netSavings } = state.dashboard.metrics;
      const transactions = [...state.dashboard.transactions]
        .sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime())
        .slice(0, 20);
      const recent = transactions.slice(-8);
      const momentum = recent.length > 1
        ? recent.reduce((acc, tx, idx) => idx === 0 ? acc : acc + (tx.amount * (tx.type === 'income' ? 1 : -1)), 0) / recent.length
        : 0;
      const baseNet = Number(netSavings || income - expenses);
      return Array.from({ length: months }, (_, i) => {
        const lift = momentum * (0.15 + i * 0.04);
        return Math.round(baseNet + lift);
      });
    }

    function updateRecommendations() {
      normalizeDashboardState();
      const { income, expenses, runway, netSavings } = state.dashboard.metrics;
      const topExpenses = getTopExpenseCategories();
      const { healthScore, profitability } = computeFinancialHealth();
      const rec = [];
      rec.push(`You have ${runway.toFixed(1)} months runway — ${runway < 6 ? 'start building a runway buffer now.' : 'keep extending it with strict burn control.'}`);
      if (expenses > income) rec.push('Monthly burn exceeds income. Reduce expenses by 10-15% or unlock a new revenue stream in the next sprint.');
      if (profitability < 15) rec.push('Low profitability detected. Re-price weak-margin offerings and cut low-ROI spend.');
      if (topExpenses[0] && topExpenses[0].amount > expenses * 0.35) rec.push(`${topExpenses[0].name} is your largest cost center. Audit this category for efficiency gains this week.`);
      if (healthScore < 55) rec.push('Financial health is fragile. Pause discretionary spend and shift focus to cash-collecting activities.');
      if (netSavings > 0 && runway >= 9 && healthScore >= 70) rec.push('Strong position: build a 2-quarter growth reserve and test one scalable acquisition channel.');
      state.dashboard.recommendations = rec.slice(0, 5);
    }

    function renderDashboard() {
      normalizeDashboardState();
      updateRecommendations();
      const el = document.getElementById('section-dashboard');
      const d = state.dashboard;
      const { healthScore, runwayScore, profitability, burnRateScore } = computeFinancialHealth();
      const forecast = getForecast(6);
      const topExpenses = getTopExpenseCategories();

      el.innerHTML = `
        <div class="bg-gradient-to-r from-cyan-500/15 via-cyan-500/5 to-transparent border border-cyan-500/30 rounded-2xl p-5 sm:p-6 shadow-neon">
          <h2 class="text-2xl sm:text-3xl font-semibold text-barya-accent tracking-wide">Finance Command Center</h2>
          <p class="text-zinc-300 mt-2 text-sm sm:text-base">Real-time financial operating view for founder decisions: runway, burn, forecast, and transaction intelligence.</p>
        </div>

        <div class="grid xl:grid-cols-4 sm:grid-cols-2 gap-4">
          ${[
            { key: 'income', label: 'Income', hint: 'Monthly inflow' },
            { key: 'expenses', label: 'Expenses', hint: 'Monthly burn' },
            { key: 'netSavings', label: 'Net Savings', hint: 'Income - Expenses' },
            { key: 'runway', label: 'Runway', hint: 'In months' }
          ].map((metric) => `
            <label class="bg-[#101217] border border-zinc-800 rounded-xl p-4 block hover:border-cyan-500/40 transition">
              <p class="text-xs uppercase tracking-[0.15em] text-zinc-400 mb-2">${metric.label}</p>
              <input data-metric="${metric.key}" type="number" step="0.1" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-lg font-semibold outline-none focus:border-barya-accent" value="${d.metrics[metric.key]}" />
              <p class="text-xs text-zinc-500 mt-2">${metric.key === 'runway' ? `${Number(d.metrics.runway).toFixed(1)} months` : `${money(d.metrics[metric.key])} • ${metric.hint}`}</p>
            </label>
          `).join('')}
        </div>

        <div class="grid xl:grid-cols-3 gap-4">
          <div class="xl:col-span-2 bg-[#101217] border border-zinc-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-semibold text-barya-accent">Cash Flow Forecast (Next 6 Months)</h3>
              <span class="text-xs text-zinc-400">Trend-based projection</span>
            </div>
            <canvas id="cashFlowChart" height="110"></canvas>
            <p class="text-xs text-zinc-500 mt-2">Projected net cash trend: ${forecast.map(v => money(v)).join(' • ')}</p>
          </div>

          <div class="bg-[#101217] border border-zinc-800 rounded-xl p-4">
            <h3 class="font-semibold text-barya-accent mb-3">Barya AI Finance Summary</h3>
            <ul class="space-y-2 text-sm">
              ${d.recommendations.map((r) => `<li class="bg-zinc-900/80 border border-zinc-800 rounded-lg p-2.5">${escapeHTML(r)}</li>`).join('')}
            </ul>
          </div>
        </div>

        <div class="grid xl:grid-cols-3 gap-4">
          <div class="xl:col-span-2 bg-[#101217] border border-zinc-800 rounded-xl p-4 space-y-4">
            <div class="flex items-center justify-between">
              <h3 class="font-semibold text-barya-accent">Expense Breakdown</h3>
              <span class="text-xs text-zinc-500">${d.expenseCategories.length} categories</span>
            </div>
            <canvas id="expenseChart" height="110"></canvas>
            <form id="expenseCategoryForm" class="grid sm:grid-cols-[1fr_160px_auto] gap-2">
              <input id="expenseCategoryName" placeholder="Category name" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
              <input id="expenseCategoryAmount" type="number" min="0" step="0.01" placeholder="Amount" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
              <button class="px-3 py-2 rounded-lg bg-cyan-500/20 border border-cyan-500/30 text-cyan-300">Add Category</button>
            </form>
            <div class="grid sm:grid-cols-3 gap-2">
              ${topExpenses.map((exp, i) => `
                <div class="bg-zinc-900 border ${i === 0 ? 'border-cyan-500/40' : 'border-zinc-800'} rounded-lg p-2">
                  <p class="text-xs text-zinc-400">Top ${i + 1}</p>
                  <p class="font-medium">${escapeHTML(exp.name)}</p>
                  <p class="text-sm text-zinc-300">${money(exp.amount)}</p>
                </div>
              `).join('') || '<p class="text-sm text-zinc-500 col-span-3">No expense categories yet.</p>'}
            </div>
          </div>

          <div class="bg-[#101217] border border-zinc-800 rounded-xl p-4">
            <h3 class="font-semibold text-barya-accent mb-3">Startup Financial Health Score</h3>
            <div class="ring-progress mx-auto mb-4" style="--pct:${healthScore}%"><div><span class="text-2xl font-bold text-barya-accent">${healthScore}</span></div></div>
            <div class="space-y-2 text-sm">
              <div class="flex justify-between bg-zinc-900 rounded p-2 border border-zinc-800"><span>Runway Stability</span><span class="text-cyan-300">${runwayScore}/100</span></div>
              <div class="flex justify-between bg-zinc-900 rounded p-2 border border-zinc-800"><span>Profitability</span><span class="text-cyan-300">${profitability}/100</span></div>
              <div class="flex justify-between bg-zinc-900 rounded p-2 border border-zinc-800"><span>Burn Rate Control</span><span class="text-cyan-300">${burnRateScore}/100</span></div>
            </div>
          </div>
        </div>

        <div class="grid xl:grid-cols-2 gap-4">
          <div class="bg-[#101217] border border-zinc-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-semibold text-barya-accent">Enhanced Recent Activity</h3>
              <span class="text-xs text-zinc-500">${d.transactions.length} transactions</span>
            </div>
            <form id="transactionForm" class="grid sm:grid-cols-2 gap-2 mb-3">
              <select id="txType" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
              <input id="txCategory" placeholder="Category (e.g. Payroll)" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
              <input id="txAmount" type="number" min="0" step="0.01" placeholder="Amount" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
              <input id="txNotes" placeholder="Notes" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
              <button class="sm:col-span-2 px-3 py-2 rounded-lg bg-cyan-500/20 border border-cyan-500/30 text-cyan-300">Add Transaction</button>
            </form>
            <ul class="space-y-2 max-h-64 overflow-auto scrollbar-thin">
              ${d.transactions.slice().sort((a,b)=>new Date(b.ts)-new Date(a.ts)).map((tx) => `
                <li class="bg-zinc-900 border border-zinc-800 rounded-lg p-2.5">
                  <div class="flex justify-between gap-2">
                    <div>
                      <p class="text-sm font-medium">${escapeHTML(tx.category)} <span class="text-xs ${tx.type === 'income' ? 'text-emerald-300' : 'text-rose-300'}">${tx.type.toUpperCase()}</span></p>
                      <p class="text-xs text-zinc-500">${escapeHTML(tx.notes || 'No note')} • ${new Date(tx.ts).toLocaleDateString()}</p>
                    </div>
                    <div class="text-right">
                      <p class="font-semibold ${tx.type === 'income' ? 'text-emerald-300' : 'text-rose-300'}">${tx.type === 'income' ? '+' : '-'}${money(tx.amount)}</p>
                      <button data-del-tx="${tx.id}" class="text-xs text-zinc-500 hover:text-red-400">Delete</button>
                    </div>

          </div>

            <div class="flex flex-wrap gap-2">
              <button id="exportDashboard" class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/40">Export Finance Data</button>

          </div>
        </div>
      `;

      el.querySelectorAll('[data-metric]').forEach(input => {
        input.oninput = () => {
          state.dashboard.metrics[input.dataset.metric] = Number(input.value || 0);
          if (input.dataset.metric === 'income' || input.dataset.metric === 'expenses') {
            state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
          }
          saveState();
        };
      });

      document.getElementById('expenseCategoryForm').onsubmit = (e) => {
        e.preventDefault();
        const nameEl = document.getElementById('expenseCategoryName');
        const amountEl = document.getElementById('expenseCategoryAmount');
        const name = nameEl.value.trim();
        const amount = Number(amountEl.value || 0);
        if (!name || amount <= 0) return;
        state.dashboard.expenseCategories.push({ id: crypto.randomUUID(), name, amount });
        state.dashboard.metrics.expenses = state.dashboard.expenseCategories.reduce((sum, c) => sum + Number(c.amount || 0), 0);
        state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
        nameEl.value = '';
        amountEl.value = '';
        saveState();
      };

      document.getElementById('transactionForm').onsubmit = (e) => {
        e.preventDefault();
        const type = document.getElementById('txType').value;
        const category = document.getElementById('txCategory').value.trim() || (type === 'income' ? 'Revenue' : 'General');
        const amount = Number(document.getElementById('txAmount').value || 0);
        const notes = document.getElementById('txNotes').value.trim();
        if (amount <= 0) return;
        state.dashboard.transactions.unshift({
          id: crypto.randomUUID(),
          type,
          category,
          amount,
          notes,
          ts: new Date().toISOString()
        });
        if (type === 'income') state.dashboard.metrics.income += amount;
        if (type === 'expense') {
          state.dashboard.metrics.expenses += amount;
          const categoryEntry = state.dashboard.expenseCategories.find(c => c.name.toLowerCase() === category.toLowerCase());
          if (categoryEntry) categoryEntry.amount += amount;
          else state.dashboard.expenseCategories.push({ id: crypto.randomUUID(), name: category, amount });
        }
        state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
        saveState();
      };

      el.querySelectorAll('[data-del-tx]').forEach(btn => {
        btn.onclick = () => {
          const tx = state.dashboard.transactions.find(item => item.id === btn.dataset.delTx);
          if (!tx) return;
          if (tx.type === 'income') state.dashboard.metrics.income = Math.max(0, state.dashboard.metrics.income - tx.amount);
          if (tx.type === 'expense') {
            state.dashboard.metrics.expenses = Math.max(0, state.dashboard.metrics.expenses - tx.amount);
            const cat = state.dashboard.expenseCategories.find(c => c.name.toLowerCase() === tx.category.toLowerCase());
            if (cat) cat.amount = Math.max(0, cat.amount - tx.amount);
          }
          state.dashboard.transactions = state.dashboard.transactions.filter(item => item.id !== tx.id);
          state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
          saveState();
        };
      });

      document.getElementById('exportDashboard').onclick = () => downloadJSON('finance-command-center-data.json', state.dashboard);
      document.getElementById('importDashboard').onchange = (e) => importJSONFile(e.target.files[0], (data) => {

        normalizeDashboardState();
        state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
        saveState();
      });

      renderDashboardCharts();
    }

        cashflowChart = new Chart(cashFlowCtx, {
          type: 'line',
          data: {
            labels: forecast.map((_, i) => `Month ${i + 1}`),
            datasets: [{
              label: 'Projected Net Cash',
              data: forecast,

              backgroundColor: 'rgba(0, 212, 255, 0.15)',

              tension: 0.35,
              pointRadius: 3

      }
    }

      if (!Array.isArray(state.workspace.pages)) state.workspace.pages = [];
      if (!Array.isArray(state.workspace.databases)) state.workspace.databases = [];
      if (!state.workspace.activePageId && state.workspace.pages[0]) state.workspace.activePageId = state.workspace.pages[0].id;
      if (!state.workspace.activeDatabaseId && state.workspace.databases[0]) state.workspace.activeDatabaseId = state.workspace.databases[0].id;
    }

    function getActiveWorkspacePage() {
      ensureWorkspaceState();
      return state.workspace.pages.find(p => p.id === state.workspace.activePageId) || null;
    }

    function blockTypeLabel(type) {
      return ({ h1: 'Heading 1', h2: 'Heading 2', h3: 'Heading 3', paragraph: 'Paragraph', todo: 'To-do', bullet: 'Bullet', numbered: 'Numbered' })[type] || 'Paragraph';
    }

    function pagePreview(page) {
      const first = page.blocks.find(b => (b.text || '').trim());
      return first ? first.text.slice(0, 80) : 'Empty page';
    }

    function createWorkspacePage(title='Untitled Page', blocks=null) {
      const page = {
        id: crypto.randomUUID(),
        title,
        updatedAt: new Date().toISOString(),
        blocks: (blocks || [{ id: crypto.randomUUID(), type: 'paragraph', text: '' }]).map(b => ({ id: crypto.randomUUID(), type: b.type || 'paragraph', text: b.text || '', checked: !!b.checked }))
      };
      state.workspace.pages.unshift(page);
      state.workspace.activePageId = page.id;
      saveState();
    }

          state.workspace.activeDatabaseId = state.workspace.databases[0]?.id || null;
          saveState();
        };

        el.querySelectorAll('[data-db-row-name]').forEach(i => i.oninput = () => { const r = activeDb.rows.find(x => x.id === i.dataset.dbRowName); if (r) { r.name = i.value; saveStateRaw(); } });
        el.querySelectorAll('[data-db-row-status]').forEach(i => i.onchange = () => { const r = activeDb.rows.find(x => x.id === i.dataset.dbRowStatus); if (r) { r.status = i.value; saveStateRaw(); } });
        el.querySelectorAll('[data-db-row-due]').forEach(i => i.oninput = () => { const r = activeDb.rows.find(x => x.id === i.dataset.dbRowDue); if (r) { r.dueDate = i.value; saveStateRaw(); } });
        el.querySelectorAll('[data-db-row-notes]').forEach(i => i.oninput = () => { const r = activeDb.rows.find(x => x.id === i.dataset.dbRowNotes); if (r) { r.notes = i.value; saveStateRaw(); } });
        el.querySelectorAll('[data-db-row-delete]').forEach(btn => btn.onclick = () => { activeDb.rows = activeDb.rows.filter(r => r.id !== btn.dataset.dbRowDelete); saveState(); });
      }

      document.getElementById('workspaceExport').onclick = () => downloadJSON('workspace-data.json', state.workspace);
      document.getElementById('workspaceImport').onchange = (e) => importJSONFile(e.target.files[0], (data) => {
        state.workspace = deepMerge(structuredClone(defaultState.workspace), data || {});
        ensureWorkspaceState();
        saveState();
      });
      document.getElementById('workspaceClear').onclick = () => {
        if (!confirm('Clear all workspace pages and databases?')) return;
        state.workspace = structuredClone(defaultState.workspace);
        state.workspace.pages = [];
        state.workspace.activePageId = null;
        state.workspace.databases = [];
        state.workspace.activeDatabaseId = null;
        saveState();
      };
    }

    function ensureTasksState() {
      if (!state.tasks || typeof state.tasks !== 'object') state.tasks = structuredClone(defaultState.tasks);
      if (!Array.isArray(state.tasks.items)) state.tasks.items = [];
      if (!Array.isArray(state.tasks.sprints)) state.tasks.sprints = [];
      if (!state.tasks.leftTab) state.tasks.leftTab = 'all';
      if (!state.tasks.view) state.tasks.view = 'list';
      if (typeof state.tasks.search !== 'string') state.tasks.search = '';
      if (!state.tasks.priorityFilter) state.tasks.priorityFilter = 'All';
      if (!state.tasks.statusFilter) state.tasks.statusFilter = 'All';
      if (!state.tasks.sprintFilter) state.tasks.sprintFilter = 'all';
      state.tasks.items.forEach(task => {
        if (!task.id) task.id = crypto.randomUUID();
        task.title = String(task.title || 'Untitled Task');
        task.description = String(task.description || '');
        task.dueDate = task.dueDate || '';
        if (!['High', 'Medium', 'Low'].includes(task.priority)) task.priority = 'Medium';
        if (!['To Do', 'In Progress', 'Done'].includes(task.status)) task.status = 'To Do';
        if (!Array.isArray(task.tags)) task.tags = String(task.tags || '').split(',').map(t => t.trim()).filter(Boolean);
        if (!task.createdAt) task.createdAt = new Date().toISOString();
        if (!task.updatedAt) task.updatedAt = task.createdAt;
        if (task.sprintId === undefined) task.sprintId = '';
        if (task.linkRef === undefined) task.linkRef = '';
      });
      state.tasks.sprints.forEach(s => {
        if (!s.id) s.id = crypto.randomUUID();
        s.name = String(s.name || 'Untitled Sprint');
        s.startDate = s.startDate || '';
        s.endDate = s.endDate || '';
        if (!s.createdAt) s.createdAt = new Date().toISOString();
      });
    }

    function taskDateInRange(date, start, end) {
      if (!date) return false;
      const d = new Date(date);
      if (Number.isNaN(d.getTime())) return false;
      const s = new Date(start);
      const e = new Date(end);
      if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return false;
      return d >= s && d <= e;
    }

    function taskMatchesLeftTab(task, tab) {
      const todayIso = new Date().toISOString().slice(0, 10);
      const now = new Date();
      const weekEnd = new Date(now);
      weekEnd.setDate(now.getDate() + 7);
      if (tab === 'today') return task.dueDate === todayIso;
      if (tab === 'week') return !!task.dueDate && new Date(task.dueDate) <= weekEnd && new Date(task.dueDate) >= new Date(todayIso);
      if (tab === 'sprints') return !!task.sprintId;
      if (tab === 'completed') return task.status === 'Done';
      return true;
    }

    function linkedTaskLabel(task) {
      if (!task.linkRef) return 'Not linked';
      const [kind, id] = String(task.linkRef).split(':');
      if (kind === 'note') {
        const note = (state.memory?.insights || []).find(n => n.id === id);
        return `🧠 ${note?.title || 'Missing note'}`;
      }
      if (kind === 'page') {
        const page = (state.workspace?.pages || []).find(p => p.id === id);
        return `📄 ${page?.title || 'Missing page'}`;
      }
      return String(task.linkRef);
    }

    function renderTasks() {
      ensureTasksState();
      const el = document.getElementById('section-tasks');
      const t = state.tasks;
      const priorities = ['All', 'High', 'Medium', 'Low'];
      const statuses = ['All', 'To Do', 'In Progress', 'Done'];
      const leftTabs = [
        { id: 'all', label: 'All Tasks' },
        { id: 'today', label: 'Today' },
        { id: 'week', label: 'This Week' },
        { id: 'sprints', label: 'Sprints' },
        { id: 'completed', label: 'Completed' }
      ];
      const sprintMap = new Map(t.sprints.map(s => [s.id, s]));
      const normalizedSearch = t.search.toLowerCase().trim();
      const filtered = t.items.filter(task => {
        const searchText = `${task.title} ${task.description} ${(task.tags || []).join(' ')} ${linkedTaskLabel(task)}`.toLowerCase();
        const bySearch = !normalizedSearch || searchText.includes(normalizedSearch);
        const byPriority = t.priorityFilter === 'All' || task.priority === t.priorityFilter;
        const byStatus = t.statusFilter === 'All' || task.status === t.statusFilter;
        const bySprint = t.sprintFilter === 'all' || task.sprintId === t.sprintFilter;
        const byLeft = taskMatchesLeftTab(task, t.leftTab);
        return bySearch && byPriority && byStatus && bySprint && byLeft;
      });
      const sorted = [...filtered].sort((a, b) => {
        if (a.status !== b.status) return ['To Do', 'In Progress', 'Done'].indexOf(a.status) - ['To Do', 'In Progress', 'Done'].indexOf(b.status);
        if (!!a.dueDate !== !!b.dueDate) return a.dueDate ? -1 : 1;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        return b.updatedAt.localeCompare(a.updatedAt);
      });
      const selectedTask = t.items.find(task => task.id === t.selectedTaskId) || null;

      const sprintCards = t.sprints.map(sprint => {
        const tasks = t.items.filter(task => task.sprintId === sprint.id);
        const done = tasks.filter(task => task.status === 'Done').length;
        const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
        return `
          <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3">
            <div class="flex items-start justify-between gap-2">
              <div>
                <p class="font-medium">${escapeHTML(sprint.name)}</p>
                <p class="text-xs text-zinc-500">${escapeHTML(sprint.startDate || 'No start')} → ${escapeHTML(sprint.endDate || 'No end')}</p>
              </div>
              <button data-delete-sprint="${sprint.id}" class="text-xs text-red-400">Delete</button>
            </div>
            <div class="mt-3 h-2 rounded-full bg-zinc-800 overflow-hidden"><div class="h-full bg-[#00d4ff]" style="width:${pct}%"></div></div>
            <p class="text-xs text-zinc-400 mt-2">${done}/${tasks.length} completed (${pct}%)</p>
          </div>
        `;
      }).join('') || '<p class="text-sm text-zinc-500">No sprints yet.</p>';

      const taskCard = (task) => {
        const sprint = sprintMap.get(task.sprintId);
        const prColor = task.priority === 'High' ? 'text-rose-300 border-rose-500/40 bg-rose-500/10' : task.priority === 'Medium' ? 'text-amber-300 border-amber-500/40 bg-amber-500/10' : 'text-emerald-300 border-emerald-500/40 bg-emerald-500/10';
        return `
          <article draggable="${t.view === 'kanban'}" data-task-id="${task.id}" class="task-card bg-zinc-900 border border-zinc-800 rounded-xl p-3 space-y-2 ${t.selectedTaskId === task.id ? 'ring-1 ring-cyan-500/50' : ''}">
            <div class="flex items-start justify-between gap-2">
              <button data-select-task="${task.id}" class="text-left flex-1">
                <p class="font-medium">${escapeHTML(task.title)}</p>
                <p class="text-xs text-zinc-400">${escapeHTML(task.description || 'No description')}</p>
              </button>
              <span class="text-[11px] px-2 py-0.5 rounded border ${prColor}">${task.priority}</span>
            </div>
            <div class="flex flex-wrap gap-1">
              ${(task.tags || []).map(tag => `<span class="text-[10px] px-2 py-0.5 rounded-full bg-cyan-500/15 text-cyan-200 border border-cyan-500/25">${escapeHTML(tag)}</span>`).join('') || '<span class="text-[10px] text-zinc-500">No tags</span>'}
            </div>
            <div class="text-xs text-zinc-500 flex flex-wrap gap-3">
              <span>Due: ${escapeHTML(task.dueDate || '—')}</span>
              <span>Sprint: ${escapeHTML(sprint?.name || 'Backlog')}</span>
              <button data-jump-link="${task.id}" class="text-cyan-300 hover:text-cyan-200">${escapeHTML(linkedTaskLabel(task))}</button>
            </div>
            <div class="flex gap-2">
              <button data-edit-task="${task.id}" class="text-xs px-2 py-1 rounded bg-zinc-800 border border-zinc-700">Edit</button>
              <button data-delete-task="${task.id}" class="text-xs px-2 py-1 rounded bg-red-500/15 text-red-300 border border-red-500/30">Delete</button>
            </div>
          </article>
        `;
      };

      el.innerHTML = `
        <section class="bg-gradient-to-br from-[#0b0f14] to-[#090b10] border border-cyan-500/20 rounded-2xl shadow-neon overflow-hidden">
          <div class="grid xl:grid-cols-[220px_1fr] min-h-[76vh]">
            <aside class="border-r border-zinc-800 bg-[#0b0e13] p-4 space-y-3">
              <h2 class="text-lg font-semibold text-[#00d4ff]">Task & Sprint Manager</h2>
              ${leftTabs.map(tab => `<button data-task-tab="${tab.id}" class="w-full text-left px-3 py-2 rounded-lg border ${t.leftTab === tab.id ? 'bg-cyan-500/15 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-800 hover:border-cyan-500/30'}">${tab.label}</button>`).join('')}
              <div class="pt-3 border-t border-zinc-800 space-y-2">
                <button id="exportTasks" class="w-full px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-sm">Export Tasks & Sprints</button>
                <label class="block w-full px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-sm text-center cursor-pointer">Import Tasks & Sprints<input id="importTasks" type="file" accept="application/json" class="hidden"></label>
                <button id="clearTasks" class="w-full px-3 py-2 rounded bg-red-500/20 border border-red-500/30 text-red-300 text-sm">Clear All Tasks</button>
              </div>
            </aside>

            <div class="p-4 sm:p-5 space-y-4">
              <div class="flex flex-wrap items-center gap-2 justify-between">
                <div class="flex flex-wrap items-center gap-2">
                  <button id="newTaskBtn" class="px-3 py-2 rounded-lg bg-cyan-500/20 text-cyan-200 border border-cyan-500/40">+ New Task</button>
                  <button id="newSprintBtn" class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700">+ New Sprint</button>
                </div>
                <div class="flex items-center gap-2">
                  <button data-view="list" class="px-3 py-2 text-sm rounded-lg border ${t.view === 'list' ? 'bg-cyan-500/15 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-700'}">List</button>
                  <button data-view="kanban" class="px-3 py-2 text-sm rounded-lg border ${t.view === 'kanban' ? 'bg-cyan-500/15 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-700'}">Kanban</button>
                </div>
              </div>

              <div class="grid lg:grid-cols-4 gap-2">
                <input id="taskSearch" value="${escapeAttr(t.search)}" placeholder="Search tasks..." class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm lg:col-span-2" />
                <select id="taskPriorityFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm">${priorities.map(p => `<option ${t.priorityFilter===p?'selected':''}>${p}</option>`).join('')}</select>
                <select id="taskStatusFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm">${statuses.map(s => `<option ${t.statusFilter===s?'selected':''}>${s}</option>`).join('')}</select>
                <select id="taskSprintFilter" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-sm lg:col-span-2"><option value="all" ${t.sprintFilter==='all'?'selected':''}>All Sprints</option><option value="" ${t.sprintFilter===''?'selected':''}>No Sprint</option>${t.sprints.map(s => `<option value="${s.id}" ${t.sprintFilter===s.id?'selected':''}>${escapeHTML(s.name)}</option>`).join('')}</select>
              </div>

              <div class="grid xl:grid-cols-[1fr_340px] gap-4">
                <section>
                  ${t.view === 'list' ? `
                    <div class="space-y-2">${sorted.map(taskCard).join('') || '<p class="text-sm text-zinc-500">No tasks match your filters.</p>'}</div>
                  ` : `
                    <div class="grid md:grid-cols-3 gap-3">
                      ${['To Do','In Progress','Done'].map(status => `
                        <div data-drop-status="${status}" class="bg-[#0e1218] border border-zinc-800 rounded-xl p-3 min-h-[300px]">
                          <div class="flex items-center justify-between mb-2">
                            <h3 class="font-medium">${status}</h3>
                            <span class="text-xs text-zinc-500">${sorted.filter(task => task.status === status).length}</span>
                          </div>
                          <div class="space-y-2">${sorted.filter(task => task.status === status).map(taskCard).join('') || '<p class="text-xs text-zinc-500">Drop tasks here</p>'}</div>
                        </div>
                      `).join('')}
                    </div>
                  `}
                </section>

                <aside class="space-y-4">
                  <div class="bg-[#0e1218] border border-zinc-800 rounded-xl p-3">
                    <h3 class="font-semibold mb-2">Task Editor</h3>
                    <form id="taskForm" class="space-y-2">
                      <input id="taskTitle" required placeholder="Task title" value="${escapeAttr(selectedTask?.title || '')}" class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                      <textarea id="taskDescription" rows="3" placeholder="Description" class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2">${escapeHTML(selectedTask?.description || '')}</textarea>
                      <div class="grid grid-cols-2 gap-2">
                        <input id="taskDueDate" type="date" value="${escapeAttr(selectedTask?.dueDate || '')}" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                        <select id="taskPriority" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2">${['High','Medium','Low'].map(p => `<option ${selectedTask?.priority===p?'selected':''}>${p}</option>`).join('')}</select>
                        <select id="taskStatus" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2">${['To Do','In Progress','Done'].map(s => `<option ${selectedTask?.status===s?'selected':''}>${s}</option>`).join('')}</select>
                        <select id="taskSprint" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2"><option value="">No Sprint</option>${t.sprints.map(s => `<option value="${s.id}" ${selectedTask?.sprintId===s.id?'selected':''}>${escapeHTML(s.name)}</option>`).join('')}</select>
                      </div>
                      <input id="taskTags" value="${escapeAttr((selectedTask?.tags || []).join(', '))}" placeholder="Tags (comma separated)" class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                      <select id="taskLinkRef" class="w-full bg-zinc-900 border border-zinc-700 rounded px-3 py-2">
                        <option value="">Link to note/page (optional)</option>
                        ${(state.memory?.insights || []).slice(0, 30).map(note => `<option value="note:${note.id}" ${selectedTask?.linkRef===`note:${note.id}`?'selected':''}>🧠 ${escapeHTML(note.title)}</option>`).join('')}
                        ${(state.workspace?.pages || []).slice(0, 30).map(page => `<option value="page:${page.id}" ${selectedTask?.linkRef===`page:${page.id}`?'selected':''}>📄 ${escapeHTML(page.title)}</option>`).join('')}
                      </select>
                      <div class="flex gap-2">
                        <button class="px-3 py-2 rounded bg-cyan-500/20 text-cyan-200 border border-cyan-500/40 text-sm">${selectedTask ? 'Update Task' : 'Create Task'}</button>
                        <button id="taskFormReset" type="button" class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-sm">Reset</button>
                      </div>
                    </form>
                  </div>

                  <div class="bg-[#0e1218] border border-zinc-800 rounded-xl p-3">
                    <h3 class="font-semibold mb-2">Sprint Mode</h3>
                    <form id="sprintForm" class="grid grid-cols-1 gap-2 mb-3">
                      <input id="sprintName" placeholder="Sprint name" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                      <div class="grid grid-cols-2 gap-2">
                        <input id="sprintStart" type="date" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                        <input id="sprintEnd" type="date" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                      </div>
                      <button class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700 text-sm">Create Sprint</button>
                    </form>
                    <div class="space-y-2 max-h-[260px] overflow-auto scrollbar-thin">${sprintCards}</div>
                  </div>
                </aside>
              </div>
            </div>
          </div>
        </section>
      `;

      el.querySelectorAll('[data-task-tab]').forEach(btn => btn.onclick = () => { t.leftTab = btn.dataset.taskTab; saveState(); });
      el.querySelectorAll('[data-view]').forEach(btn => btn.onclick = () => { t.view = btn.dataset.view; saveState(); });
      document.getElementById('taskSearch').oninput = (e) => { t.search = e.target.value; saveState(); };
      document.getElementById('taskPriorityFilter').onchange = (e) => { t.priorityFilter = e.target.value; saveState(); };
      document.getElementById('taskStatusFilter').onchange = (e) => { t.statusFilter = e.target.value; saveState(); };
      document.getElementById('taskSprintFilter').onchange = (e) => { t.sprintFilter = e.target.value; saveState(); };

      document.getElementById('newTaskBtn').onclick = () => { t.selectedTaskId = null; renderTasks(); };
      document.getElementById('newSprintBtn').onclick = () => document.getElementById('sprintName').focus();
      el.querySelectorAll('[data-select-task]').forEach(btn => btn.onclick = () => { t.selectedTaskId = btn.dataset.selectTask; renderTasks(); });
      el.querySelectorAll('[data-edit-task]').forEach(btn => btn.onclick = () => { t.selectedTaskId = btn.dataset.editTask; renderTasks(); });
      el.querySelectorAll('[data-delete-task]').forEach(btn => btn.onclick = () => {
        t.items = t.items.filter(task => task.id !== btn.dataset.deleteTask);
        if (t.selectedTaskId === btn.dataset.deleteTask) t.selectedTaskId = null;
        saveState();
      });

      el.querySelectorAll('[data-jump-link]').forEach(btn => btn.onclick = () => {
        const task = t.items.find(item => item.id === btn.dataset.jumpLink);
        if (!task?.linkRef) return;
        const [kind, id] = task.linkRef.split(':');
        if (kind === 'note') {
          state.activeSection = 'memory';
          if (state.memory) state.memory.activeNoteId = id;
          renderNav();
          saveState();
        } else if (kind === 'page') {
          state.activeSection = 'workspace';
          if (state.workspace) state.workspace.activePageId = id;
          renderNav();
          saveState();
        }
      });

      document.getElementById('taskForm').onsubmit = (e) => {
        e.preventDefault();
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) return;
        const payload = {
          title,
          description: document.getElementById('taskDescription').value.trim(),
          dueDate: document.getElementById('taskDueDate').value,
          priority: document.getElementById('taskPriority').value,
          status: document.getElementById('taskStatus').value,
          sprintId: document.getElementById('taskSprint').value,
          tags: document.getElementById('taskTags').value.split(',').map(tag => tag.trim()).filter(Boolean),
          linkRef: document.getElementById('taskLinkRef').value,
          updatedAt: new Date().toISOString()
        };
        if (t.selectedTaskId) {
          const idx = t.items.findIndex(task => task.id === t.selectedTaskId);
          if (idx >= 0) t.items[idx] = { ...t.items[idx], ...payload };
        } else {
          const now = new Date().toISOString();
          const newTask = { id: crypto.randomUUID(), createdAt: now, ...payload };
          t.items.unshift(newTask);
          t.selectedTaskId = newTask.id;
        }
        saveState();
      };
      document.getElementById('taskFormReset').onclick = () => { t.selectedTaskId = null; renderTasks(); };

      document.getElementById('sprintForm').onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById('sprintName').value.trim();
        if (!name) return;
        t.sprints.unshift({
          id: crypto.randomUUID(),
          name,
          startDate: document.getElementById('sprintStart').value,
          endDate: document.getElementById('sprintEnd').value,
          createdAt: new Date().toISOString()
        });
        document.getElementById('sprintForm').reset();
        saveState();
      };
      el.querySelectorAll('[data-delete-sprint]').forEach(btn => btn.onclick = () => {
        const sid = btn.dataset.deleteSprint;
        t.sprints = t.sprints.filter(s => s.id !== sid);
        t.items.forEach(task => { if (task.sprintId === sid) task.sprintId = ''; });
        saveState();
      });

      document.getElementById('exportTasks').onclick = () => downloadJSON('tasks-sprints-export.json', { items: t.items, sprints: t.sprints });
      document.getElementById('importTasks').onchange = (e) => importJSONFile(e.target.files[0], (data) => {
        if (!data || typeof data !== 'object') return;
        t.items = Array.isArray(data.items) ? data.items : [];
        t.sprints = Array.isArray(data.sprints) ? data.sprints : [];
        t.selectedTaskId = null;
        ensureTasksState();
        saveState();
      });
      document.getElementById('clearTasks').onclick = () => {
        if (!confirm('Clear all tasks and sprints? This cannot be undone.')) return;
        state.tasks = structuredClone(defaultState.tasks);
        saveState();
      };

      el.querySelectorAll('[data-drop-status]').forEach(zone => {
        zone.ondragover = (evt) => evt.preventDefault();
        zone.ondrop = (evt) => {
          evt.preventDefault();
          const taskId = evt.dataTransfer.getData('text/task-id');
          const task = t.items.find(item => item.id === taskId);
          if (!task) return;
          task.status = zone.dataset.dropStatus;
          task.updatedAt = new Date().toISOString();
          saveState();
        };
      });
      el.querySelectorAll('.task-card').forEach(card => {
        card.ondragstart = (evt) => evt.dataTransfer.setData('text/task-id', card.dataset.taskId || '');
      });
    }

    function ensureAIState() {
      if (!state.ai || typeof state.ai !== 'object') state.ai = {};
      if (!Array.isArray(state.ai.history)) state.ai.history = [];
      if (!state.ai.history.length) {
        state.ai.history.push({
          role: 'assistant',
          message: 'Ready to think like your strategic co-founder. What decision are we making today?',
          structured: {
            answer: 'I can help with strategy, growth, hiring, product, pricing, and execution.',
            why: 'Founders win with fast, high-quality decisions under constraints.',
            steps: ['Share your current goal.', 'Add constraints (time, team, cash).', 'Tell me your target outcome in 30 days.'],
            tip: 'The tighter your constraints, the sharper my plan.',
            next: 'Ask: “I have 4 months runway and rising churn—what should I do first?”'
          },
          ts: new Date().toISOString()
        });
      }
      if (typeof state.ai.thinkStepByStep !== 'boolean') state.ai.thinkStepByStep = false;
      if (!Array.isArray(state.ai.promptSuggestions)) state.ai.promptSuggestions = [];
    }

    function latestFounderContext(limit = 8) {
      const recent = state.ai.history.slice(-limit);
      const userTopics = recent
        .filter(msg => msg.role === 'user')
        .flatMap(msg => (msg.message.toLowerCase().match(/[a-z]{4,}/g) || []))
        .filter(word => !['with', 'that', 'this', 'from', 'your', 'what', 'have', 'need', 'want', 'please', 'help', 'about', 'should', 'could'].includes(word));
      const scores = {};
      userTopics.forEach(word => { scores[word] = (scores[word] || 0) + 1; });
      const topKeywords = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([word]) => word);
      return {
        lastUserMessage: [...recent].reverse().find(msg => msg.role === 'user')?.message || '',
        topKeywords
      };
    }

    function parseMultiPartQuestion(input) {
      return input
        .split(/\n|(?:\s+\d+[\).\-\:]\s+)|(?:\s+\-\s+)|(?:\s+\?\s+)/g)
        .map(part => part.trim())
        .filter(Boolean)
        .slice(0, 4);
    }

    function aiTemplateLibrary() {
      const cash = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
      const runway = Number(state.dashboard.metrics.runway || 0);
      return [
        { key: 'runway', match: /(runway|burn|cashflow|cash flow)/i, answer: `You have ${runway} months runway and net monthly cashflow of ${money(cash)}; priority is to reduce burn and accelerate cash collections in parallel.`, why: 'Runway defines optionality. Optionality gives you negotiation power and execution calm.', steps: ['Freeze non-essential expenses today.', 'Renegotiate top 3 vendor contracts this week.', 'Launch one revenue pull-forward offer to existing customers.'], tip: 'Founders who protect runway can choose strategy; founders who don’t are forced into it.', next: 'Want a 30-day runway extension plan mapped by week?' },
        { key: 'churn', match: /(churn|retention|cancel|renewal)/i, answer: 'Treat churn like a product signal, not just a support problem: fix failed outcomes in first 14 days.', why: 'Retention compounds; acquisition without retention is expensive leakage.', steps: ['Segment churn by persona and first-value time.', 'Interview 5 recent churned users this week.', 'Ship one onboarding change tied to activation.'], tip: 'The fastest churn fix is often expectation-setting before onboarding, not after.', next: 'Share your top churn reason and I’ll convert it into a 2-week experiment.' },
        { key: 'pricing', match: /(pricing|price|discount|plan)/i, answer: 'Reframe pricing around delivered outcomes and urgency, then test one high-confidence package first.', why: 'Pricing is positioning. Weak pricing attracts low-fit customers and hurts retention.', steps: ['Define one primary buyer outcome.', 'Create a 3-tier offer anchored around that outcome.', 'Test price increase with new leads for 14 days.'], tip: 'Never lower price before increasing clarity of value communication.', next: 'Want me to draft your outcome-based pricing page structure?' },
        { key: 'gtm', match: /(gtm|go to market|launch|distribution|acquisition|channel)/i, answer: 'Pick one primary channel and build a repeatable weekly cadence before adding others.', why: 'Focus creates signal density; too many channels create random noise.', steps: ['Select one channel with fastest feedback loop.', 'Define weekly input targets (content, outreach, demos).', 'Review conversion funnel every Friday.'], tip: 'A mediocre channel executed consistently beats 5 channels started and abandoned.', next: 'Tell me your audience and I’ll design a 4-week GTM sprint.' },
        { key: 'fundraise', match: /(fundraise|investor|pitch|round|valuation)/i, answer: 'Fundraise with evidence: show momentum, insight velocity, and disciplined use of capital.', why: 'Investors back execution quality more than storytelling polish.', steps: ['Build a concise 10-slide narrative around traction and plan.', 'Prepare answers for burn, runway, and growth assumptions.', 'Set a tight 3-week investor outreach window.'], tip: 'Control your process timeline or the process controls you.', next: 'Need a founder-ready investor update + outreach tracker template?' },
        { key: 'hiring', match: /(hire|hiring|team|recruit|talent)/i, answer: 'Hire only for bottlenecks directly tied to revenue, retention, or product velocity.', why: 'Early hiring mistakes create recurring burn and management drag.', steps: ['List current bottlenecks and quantify impact.', 'Write outcome-based role scorecards.', 'Run structured interviews with paid practical tasks.'], tip: 'A clear scorecard avoids charisma bias and speeds up decisions.', next: 'Share the role and I’ll create a practical interview loop.' },
        { key: 'product', match: /(product|feature|roadmap|build|mvp)/i, answer: 'Prioritize product work by user outcome impact and learning speed, not by request volume.', why: 'Roadmaps should reduce uncertainty and increase paid value delivery.', steps: ['Define top user outcome for this quarter.', 'Cut roadmap to 3 bets max.', 'Tie each bet to one measurable behavior shift.'], tip: 'If a feature has no success metric, it is scope—not strategy.', next: 'Want a prioritization matrix for your current backlog?' },
        { key: 'sales', match: /(sales|close|pipeline|demo|conversion)/i, answer: 'Tighten your sales pipeline around qualification clarity and objection handling.', why: 'Conversion gains are usually faster and cheaper than top-of-funnel expansion.', steps: ['Document top 5 objections from recent calls.', 'Create response scripts for each objection.', 'Track stage-to-stage conversion daily.'], tip: 'Disqualifying low-fit leads early increases win-rate and founder focus.', next: 'Paste your pipeline stages and I’ll diagnose bottlenecks.' },
        { key: 'marketing', match: /(marketing|content|brand|seo|campaign)/i, answer: 'Build authority around one sharp narrative linked to a measurable business outcome.', why: 'Consistent narrative increases trust and lowers CAC over time.', steps: ['Define one promise to one persona.', 'Publish 3 high-signal pieces weekly.', 'Recycle winning content into distribution assets.'], tip: 'Educational content works best when it solves one urgent decision.', next: 'Want a 2-week founder content calendar aligned to pipeline goals?' },
        { key: 'ops', match: /(operations|ops|process|system|workflow)/i, answer: 'Design simple operating rhythms: weekly priorities, daily visibility, clear ownership.', why: 'Operational clarity compounds speed as team size increases.', steps: ['Set weekly company-level priorities.', 'Assign one owner and KPI per priority.', 'Run a 30-minute Friday accountability review.'], tip: 'Speed comes from clear ownership, not more meetings.', next: 'Need a weekly operating cadence template for your team size?' },
        { key: 'competition', match: /(competitor|competition|positioning|differentiate)/i, answer: 'Win by owning a specific use case and outcome, not by copying broad feature sets.', why: 'Customers buy confident fit, not generic parity.', steps: ['Map top 3 alternatives and where they win.', 'Define your strongest differentiated wedge.', 'Rewrite messaging around that wedge.'], tip: 'Niche dominance often beats broad relevance in early stages.', next: 'Share 2 competitors and I’ll draft your differentiation statement.' },
        { key: 'time', match: /(time|focus|priority|overwhelm|busy)/i, answer: 'Use ruthless prioritization: one company goal, three weekly bets, daily execution blocks.', why: 'Founder attention is the highest-leverage resource in the business.', steps: ['Pick one north-star objective for this week.', 'List only 3 initiatives that move it.', 'Block 2 deep-work sessions on calendar daily.'], tip: 'If everything is urgent, nothing is strategic.', next: 'Want me to convert your current to-do list into a priority stack?' },

        { key: 'onboarding', match: /(onboarding|activation|first value)/i, answer: 'Compress time-to-first-value so new users experience a win within minutes.', why: 'Activation quality strongly predicts retention and expansion revenue.', steps: ['Identify one critical first success event.', 'Remove friction before that event.', 'Trigger contextual guidance in first session.'], tip: 'Activation is a product + messaging problem, not only UX polish.', next: 'Need a step-by-step onboarding flow for your product type?' },
        { key: 'support', match: /(support|ticket|nps|csat|customer success)/i, answer: 'Turn support into a structured insight engine that feeds product and onboarding.', why: 'Support data reveals hidden friction faster than analytics dashboards alone.', steps: ['Tag tickets by root cause.', 'Review top pain cluster weekly.', 'Ship one fix per week from support insights.'], tip: 'Fast acknowledgement + clear expectation often matters more than perfect first reply.', next: 'Want a support taxonomy you can adopt immediately?' },
        { key: 'expansion', match: /(upsell|cross-sell|expansion|enterprise)/i, answer: 'Drive expansion by identifying usage milestones that naturally trigger higher-value needs.', why: 'Expansion revenue improves payback and extends runway without proportional CAC.', steps: ['Define product usage thresholds for upsell triggers.', 'Create milestone-based outreach playbooks.', 'Track expansion conversion monthly.'], tip: 'Customers upgrade when the next tier removes a painful ceiling.', next: 'Share your current plans and I’ll map upgrade trigger moments.' },
        { key: 'default', match: /.*/i, answer: 'Start with one high-impact decision and execute in focused 7-day cycles.', why: 'Short decision loops reduce risk and increase learning velocity.', steps: ['Define the exact decision in one sentence.', 'Set success criteria for the next 7 days.', 'Review outcomes and choose next move quickly.'], tip: 'Clarity beats intensity—especially under pressure.', next: 'What is the single decision you need to make this week?' }
      ];
    }

    function aiStructuredResponse(q) {
      ensureAIState();
      const lower = q.toLowerCase();
      const templates = aiTemplateLibrary();
      const base = templates.find(template => template.match.test(lower)) || templates.at(-1);
      const context = latestFounderContext();
      const multiParts = parseMultiPartQuestion(q);
      const hasMultiPart = multiParts.length > 1;
      const reasoning = state.ai.thinkStepByStep
        ? [
            `Understand context: recent focus = ${context.topKeywords.join(', ') || 'general strategy'}.`,
            'Identify the core founder constraint and decision deadline.',
            'Prioritize actions by highest near-term business impact.',
            'Convert strategy into immediate execution steps.'
          ]
        : [];

      let answer = base.answer;
      if (context.topKeywords.length) {
        answer += ` Considering your recent focus on ${context.topKeywords.join(', ')}, this should be prioritized now.`;
      }
      if (hasMultiPart) {
        answer = `You asked ${multiParts.length} connected questions; here is one integrated plan: ${answer}`;
      }

      const stepPrefix = hasMultiPart ? [`Break down the ${multiParts.length} parts and assign one owner per part.`] : [];
      const steps = [...stepPrefix, ...base.steps].slice(0, 5);
      return {
        answer,
        why: base.why,
        steps,
        tip: base.tip,
        next: base.next,
        reasoning,
        multiParts
      };
    }

    function computePromptSuggestions() {
      const context = latestFounderContext(10);
      const baseSuggestions = [
        'Build me a 30-day execution sprint with weekly milestones.',
        'Audit my founder calendar and remove low-leverage tasks.',
        'Create a cash preservation plan for the next 60 days.',
        'Draft a high-signal weekly investor update from my metrics.',
        'Design a retention rescue plan for users dropping in week 1.'
      ];
      const keywordSuggestions = context.topKeywords.map(keyword => `Give me a tactical plan to improve ${keyword} in the next 2 weeks.`);
      const lastMessageSuggestion = context.lastUserMessage
        ? [`Continue from my previous question and convert it into an action checklist: "${context.lastUserMessage.slice(0, 70)}..."`]
        : [];
      state.ai.promptSuggestions = [...keywordSuggestions, ...lastMessageSuggestion, ...baseSuggestions].slice(0, 6);
    }

      function appendMessage(item) {
        const box = document.getElementById('chatBox');
        const wrap = document.createElement('div');
        if (item.role === 'user') {
          wrap.innerHTML = `
            <div class="ml-auto max-w-3xl bg-cyan-500/15 border border-cyan-500/30 rounded-2xl p-3">

        } else {
          const structured = item.structured || aiStructuredResponse(item.message || '');
          wrap.innerHTML = `

      function sendQuestion(question) {
        const q = question.trim();
        if (!q) return;
        const nowISO = new Date().toISOString();
        const userMsg = { role: 'user', message: q, ts: nowISO };
        const structured = aiStructuredResponse(q);
        const aiMsg = { role: 'assistant', message: structured.answer, structured, ts: nowISO };
        state.ai.history.push(userMsg, aiMsg);
        saveStateRaw();
        renderAI();
      }

      document.getElementById('chatForm').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('chatInput');
        sendQuestion(input.value);

        renderAI();

      el.querySelectorAll('[data-suggestion]').forEach(btn => btn.onclick = () => sendQuestion(state.ai.promptSuggestions[Number(btn.dataset.suggestion)] || ''));
      document.getElementById('exportChat').onclick = () => downloadJSON('chat-history.json', state.ai.history);

            role: item.role,
            message: String(item.message || ''),
            structured: item.structured || (item.role === 'assistant' ? aiStructuredResponse(String(item.message || '')) : undefined),
            ts: item.ts || new Date().toISOString()
          }));
        ensureAIState();
        saveStateRaw();
        renderAI();
      });
    }

    function renderMemory() {
      const el = document.getElementById('section-memory');
      const memory = state.memory || (state.memory = {});
      if (!Array.isArray(memory.insights)) memory.insights = [];
      if (!Array.isArray(memory.actions)) memory.actions = [];
      if (typeof memory.search !== 'string') memory.search = '';
      if (!memory.viewMode) memory.viewMode = 'list';
      if (!memory.leftTab) memory.leftTab = 'all';
      if (!memory.activeNoteId && memory.insights[0]) memory.activeNoteId = memory.insights[0].id;

      const normalizeTags = (input) => String(input || '')
        .split(',')
        .map(tag => tag.trim())
        .filter(Boolean)
        .filter((tag, idx, arr) => arr.findIndex(t => t.toLowerCase() === tag.toLowerCase()) === idx);
      memory.insights.forEach(note => {
        if (!note.id) note.id = crypto.randomUUID();
        if (!note.title) note.title = 'Untitled Note';
        if (typeof note.content !== 'string') note.content = String(note.content || '');
        if (!note.ts) note.ts = new Date().toISOString();
        if (!Array.isArray(note.tags)) note.tags = normalizeTags(note.tag || 'General');
        if (!note.tags.length) note.tags = ['General'];
        note.tag = note.tags.join(', ');
        if (typeof note.isDaily !== 'boolean') note.isDaily = /^\d{4}-\d{2}-\d{2}/.test(note.title);
      });

      const noteByTitle = new Map(memory.insights.map(note => [note.title.toLowerCase(), note]));
      const extractLinks = (content) => {
        const links = [];
        const regex = /\[\[([^\]]+)\]\]/g;
        let match;
        while ((match = regex.exec(content || '')) !== null) {
          const title = match[1].trim();
          if (title) links.push(title);
        }
        return [...new Set(links)];
      };

      memory.insights.forEach(note => {
        note.links = extractLinks(note.content)
          .map(title => noteByTitle.get(title.toLowerCase()))
          .filter(Boolean)
          .map(n => n.id);
      });

      const backlinksMap = {};
      memory.insights.forEach(note => {
        note.links.forEach(targetId => {
          if (!backlinksMap[targetId]) backlinksMap[targetId] = [];
          backlinksMap[targetId].push(note.id);
        });
      });

      let activeNote = memory.insights.find(n => n.id === memory.activeNoteId) || null;

        activeNote = memory.insights[0];
        memory.activeNoteId = activeNote.id;

        return { id: note.id, title: note.title, x: cx, y: cy, r: note.id === memory.activeNoteId ? 16 : 11 };
      });
