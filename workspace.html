        return structuredClone(defaultState);
      }
    }

        const parsed = JSON.parse(localStorage.getItem(CHECKLIST_STORAGE_KEY) || '{}');
        const normalized = {};

          normalized[item.id] = Boolean(parsed[item.id]);
        });

    function normalizeLanguageCode(value) {
      if (!value) return 'en';
      const raw = String(value).trim().toLowerCase();
      if (SUPPORTED_LANGUAGES.includes(raw)) return raw;
      return LANGUAGE_NAME_TO_CODE[raw] || 'en';
    }

    function currentLanguage() {
      return normalizeLanguageCode(state.settings?.preferences?.language || 'en');
    }

    function translateText(text) {
      const lang = currentLanguage();
      if (lang === 'en') return text;
      const fallback = translations.en?.textMap?.[text] || text;
      const map = translations[lang]?.textMap || {};
      return map[text] || fallback;
    }

    function setLanguage(lang, options = {}) {
      const resolvedLang = normalizeLanguageCode(lang);
      state.settings.preferences.language = resolvedLang;
      localStorage.setItem(LANGUAGE_STORAGE_KEY, resolvedLang);
      document.documentElement.lang = resolvedLang;
      if (!options.skipRender) {
        renderNav();
        renderActiveSection();
        translateDom(document.body);
      }
      schedulePersist(0);
    }

    function translateDom(root = document) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);
      textNodes.forEach((node) => {
        const parent = node.parentElement;
        if (!parent) return;
        if (['SCRIPT', 'STYLE', 'TEXTAREA', 'OPTION'].includes(parent.tagName)) return;
        const original = (node.nodeValue || '').trim();
        if (!original) return;
        const translated = translateText(original);
        if (translated !== original) node.nodeValue = node.nodeValue.replace(original, translated);
      });
      root.querySelectorAll('[placeholder]').forEach((el) => {
        const placeholder = el.getAttribute('placeholder');
        if (!placeholder) return;
        el.setAttribute('placeholder', translateText(placeholder));
      });
      root.querySelectorAll('[title]').forEach((el) => {
        const value = el.getAttribute('title');
        if (!value) return;
        el.setAttribute('title', translateText(value));
      });
      root.querySelectorAll('option').forEach((opt) => {
        const base = opt.getAttribute('data-base-label') || opt.textContent.trim();
        opt.setAttribute('data-base-label', base);
        opt.textContent = translateText(base);
      });
      const titleInput = document.getElementById('workspaceTitle');
      if (titleInput) {
        const placeholder = titleInput.getAttribute('placeholder') || translations.en.appTitle;
        titleInput.setAttribute('placeholder', translateText(placeholder));
      }
      const searchHint = document.getElementById('globalSearchHint');
      if (searchHint) searchHint.textContent = translations[currentLanguage()]?.searchHint || translations.en.searchHint;
      const localFirstBadge = document.getElementById('localFirstBadge');
      if (localFirstBadge) localFirstBadge.textContent = translations[currentLanguage()]?.localFirst || translations.en.localFirst;
      const modalTitle = document.getElementById('memoryModalTitle');
      if (modalTitle) modalTitle.textContent = translations[currentLanguage()]?.insight || translations.en.insight;
      document.title = translations[currentLanguage()]?.appTitle || translations.en.appTitle;
    }

    function getFounderInitials(name, fallback = 'YN') {
      const initials = (String(name || '').trim().match(/\b\w/g) || [])
        .slice(0, 2)
        .join('')
        .toUpperCase();
      return initials || fallback;
    }

    function renderFounderAvatar({ name, photo, size = 'h-10 w-10 text-sm' }) {

      const rawPhoto = String(founder.photo || '').trim();

      }
    }

    function deepMerge(target, source) {
      for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
          deepMerge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
      return target;
    }

    function persistStateNow() {
      const snapshot = JSON.stringify(state);
      if (snapshot === latestPersistedSnapshot) return;
      latestPersistedSnapshot = snapshot;
      localStorage.setItem(STORAGE_KEY, snapshot);
      showSavedToast();
    }

    function prefersReducedMotion() {
      return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    }

    function showSavedToast() {
      const toast = document.getElementById('saveToast');
      if (!toast) return;
      toast.classList.add('show');
      if (saveToastTimer) clearTimeout(saveToastTimer);
      saveToastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, prefersReducedMotion() ? 1200 : 1500);
    }

    function schedulePersist(delay = 120) {
      if (persistTimer) clearTimeout(persistTimer);
      persistTimer = setTimeout(() => {
        persistTimer = null;
        persistStateNow();
      }, delay);
    }

    function queueRenderActiveSection() {
      if (renderQueued) return;
      renderQueued = true;
      requestAnimationFrame(() => {
        renderQueued = false;
        renderActiveSection();
      });
    }

    function saveState() {
      updateRecommendations();
      schedulePersist(0);
      queueRenderActiveSection();
    }

    function saveStateWithoutRender() {
      updateRecommendations();
      schedulePersist(0);
    }

    function init() {
      ensureKnowledgeGraphState();
      ensureResourcesState();
      setLanguage(state.settings?.preferences?.language || 'en', { skipRender: true });
      renderNav();
      setupBaseEvents();
      setupGlobalShortcuts();
      updateRecommendations();
      renderActiveSection();
      document.getElementById('workspaceTitle').value = state.title;
      latestPersistedSnapshot = JSON.stringify(state);
      applyThemePreference();
      renderHeaderFounderProfile();
      setupWelcomeTour();
      setupGuidedTour();
      translateDom(document.body);
      maybeOpenGuidedTour();
      window.addEventListener('storage', (event) => {
        if (event.key !== STORAGE_KEY || !event.newValue) return;
        try {
          const parsed = JSON.parse(event.newValue);
          const merged = deepMerge(structuredClone(defaultState), parsed);
          state.settings = merged.settings;
          renderHeaderFounderProfile();
        } catch {
          /* noop */
        }
      });
    }

    function setupWelcomeTour() {
      const modal = document.getElementById('welcomeTourModal');
      const nextBtn = document.getElementById('welcomeTourNext');
      const startBtn = document.getElementById('welcomeTourGetStarted');
      const skipBtn = document.getElementById('welcomeTourSkip');
      if (!modal || !nextBtn || !startBtn || !skipBtn) return;

      const closeTour = () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        localStorage.setItem(ONBOARDING_TOUR_STORAGE_KEY, 'true');
      };
      const renderTourStep = () => {
        const stepText = document.getElementById('welcomeTourStepText');
        const stepNum = document.getElementById('welcomeTourStepNumber');
        if (stepText) stepText.textContent = WELCOME_TOUR_STEPS[welcomeTourStep] || '';
        if (stepNum) stepNum.textContent = String(welcomeTourStep + 1);
        const isLast = welcomeTourStep >= WELCOME_TOUR_STEPS.length - 1;
        nextBtn.classList.toggle('hidden', isLast);
        startBtn.classList.toggle('hidden', !isLast);
      };

      nextBtn.onclick = () => {
        welcomeTourStep = Math.min(WELCOME_TOUR_STEPS.length - 1, welcomeTourStep + 1);
        renderTourStep();
      };
      startBtn.onclick = closeTour;
      skipBtn.onclick = closeTour;
      renderTourStep();
    }

    function maybeOpenWelcomeTour() {
      if (localStorage.getItem(ONBOARDING_TOUR_STORAGE_KEY) === 'true') return;
      const modal = document.getElementById('welcomeTourModal');
      if (!modal) return;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function setupGuidedTour() {
      const startBtn = document.getElementById('takeTourBtn');
      const overlay = document.getElementById('guidedTourOverlay');
      const nextBtn = document.getElementById('tourNextBtn');
      const prevBtn = document.getElementById('tourPrevBtn');
      const skipBtn = document.getElementById('tourSkipBtn');
      if (!startBtn || !overlay || !nextBtn || !prevBtn || !skipBtn) return;

      const renderDots = () => {
        const dots = document.getElementById('tourStepDots');
        if (!dots) return;
        dots.innerHTML = GUIDED_TOUR_STEPS.map((_, index) => `<span class="tour-progress-dot ${index === guidedTourStep ? 'active' : ''}"></span>`).join('');
      };

      const updateSpotlight = () => {
        const step = GUIDED_TOUR_STEPS[guidedTourStep];
        const target = document.querySelector(step.target);
        const spotlight = document.getElementById('tourSpotlight');
        if (!target || !spotlight) return;
        const rect = target.getBoundingClientRect();
        const pad = 8;
        spotlight.style.top = `${Math.max(8, rect.top - pad)}px`;
        spotlight.style.left = `${Math.max(8, rect.left - pad)}px`;
        spotlight.style.width = `${Math.max(120, rect.width + pad * 2)}px`;
        spotlight.style.height = `${Math.max(56, rect.height + pad * 2)}px`;
      };

      const renderGuidedStep = () => {
        const step = GUIDED_TOUR_STEPS[guidedTourStep];
        if (step.section) switchSection(step.section);
        const stepLabel = document.getElementById('tourStepLabel');
        const stepTitle = document.getElementById('tourStepTitle');
        const stepDescription = document.getElementById('tourStepDescription');
        const nextLabel = guidedTourStep === GUIDED_TOUR_STEPS.length - 1 ? 'Finish' : 'Next';
        if (stepLabel) stepLabel.textContent = `Step ${guidedTourStep + 1} of ${GUIDED_TOUR_TOTAL_STEPS}`;
        if (stepTitle) stepTitle.textContent = step.title;
        if (stepDescription) stepDescription.textContent = step.description;
        nextBtn.textContent = nextLabel;
        prevBtn.disabled = guidedTourStep === 0;
        prevBtn.classList.toggle('opacity-50', guidedTourStep === 0);
        renderDots();
        setTimeout(updateSpotlight, 260);
      };

      const closeGuidedTour = () => {
        overlay.classList.add('hidden');
        localStorage.setItem(ONBOARDING_TOUR_STORAGE_KEY, 'true');
      };

      const startGuidedTour = () => {
        guidedTourStep = 0;
        overlay.classList.remove('hidden');
        renderGuidedStep();
      };

      startBtn.onclick = startGuidedTour;
      nextBtn.onclick = () => {
        if (guidedTourStep >= GUIDED_TOUR_STEPS.length - 1) {
          closeGuidedTour();
          return;
        }
        guidedTourStep += 1;
        renderGuidedStep();
      };
      prevBtn.onclick = () => {
        guidedTourStep = Math.max(0, guidedTourStep - 1);
        renderGuidedStep();
      };
      skipBtn.onclick = closeGuidedTour;
      window.addEventListener('resize', () => {
        if (!overlay.classList.contains('hidden')) updateSpotlight();
      });
      window.addEventListener('scroll', () => {
        if (!overlay.classList.contains('hidden')) updateSpotlight();
      }, { passive: true });
    }

    function maybeOpenGuidedTour() {
      if (localStorage.getItem(ONBOARDING_TOUR_STORAGE_KEY) === 'true') return;
      const overlay = document.getElementById('guidedTourOverlay');
      const startBtn = document.getElementById('takeTourBtn');
      if (!overlay || !startBtn) return;
      setTimeout(() => startBtn.click(), 260);

    function renderNav() {
      const nav = document.getElementById('mainNav');
      nav.innerHTML = navItems.map(item => {
        const isActive = state.activeSection === item.id;
        return `
        <button
          data-section="${item.id}"
          aria-current="${isActive ? 'page' : 'false'}"
          class="nav-item ${isActive ? 'active-nav' : ''}">
          <span class="nav-icon" aria-hidden="true">${item.icon}</span>
          <span class="nav-label ${isActive ? 'font-semibold' : 'font-medium'}">${translateText(item.key)}</span>
        </button>
      `;
      }).join('');

      nav.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          switchSection(btn.dataset.section);
          closeSidebar();
        };
      });
    }

    function saveStateRaw(){ schedulePersist(80); }

    function switchSection(nextSection) {
      if (!nextSection || nextSection === state.activeSection) return;
      const currentPanel = document.getElementById(`section-${state.activeSection}`);
      const completeSwitch = () => {
        state.activeSection = nextSection;
        renderNav();
        renderActiveSection();
        saveStateRaw();
      };
      if (prefersReducedMotion() || !currentPanel) {
        completeSwitch();
        return;
      }
      currentPanel.classList.add('section-leave');
      setTimeout(() => {
        currentPanel.classList.remove('section-leave');
        completeSwitch();
      }, 210);
    }

    function renderActiveSection() {
      document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
      const activePanel = document.getElementById(`section-${state.activeSection}`);
      activePanel.classList.add('active');
      if (state.activeSection === 'dashboard') renderDashboard();
      if (state.activeSection === 'workspace') renderWorkspace();
      if (state.activeSection === 'tasks') renderTasks();
      if (state.activeSection === 'resources') renderResources();
      if (state.activeSection === 'ai') renderAI();
      if (state.activeSection === 'memory') renderMemory();
      if (state.activeSection === 'planning') renderPlanning();
      if (state.activeSection === 'settings') renderSettings();
      if (state.activeSection === 'knowledge-graph') renderKnowledgeGraph();
      if (!prefersReducedMotion()) {
        activePanel.classList.remove('section-enter-active');
        requestAnimationFrame(() => activePanel.classList.add('section-enter-active'));
      }
      enhanceSurfacePolish();
      translateDom(document.getElementById(`section-${state.activeSection}`));
    }

    function enhanceSurfacePolish() {
      const panel = document.getElementById(`section-${state.activeSection}`);
      if (!panel) return;
      panel.querySelectorAll('div, section, article, aside, label').forEach(node => {
        const c = node.className || '';
        if (typeof c !== 'string') return;
        if (!/rounded-(lg|xl|2xl)/.test(c) || !/border/.test(c)) return;
        node.classList.add('glass-card');
        node.classList.add('premium-hover');
      });
      panel.querySelectorAll('input, textarea, select').forEach(input => input.classList.add('soft-input'));
    }

      const titleInput = document.getElementById('workspaceTitle');
      titleInput.addEventListener('input', (e) => {
        state.title = e.target.value;
        state.settings.business.name = state.title;
        saveStateRaw();

      document.getElementById('openSidebar').onclick = openSidebar;

      document.getElementById('closeHowItWorksModal').onclick = closeHowItWorksModal;
      document.getElementById('howItWorksModal').addEventListener('click', (event) => {
        if (event.target.id === 'howItWorksModal') closeHowItWorksModal();
      });
      document.addEventListener('click', (event) => {
        const startBtn = event.target.closest('[data-start-here]');
        if (!startBtn) return;
        const action = startBtn.dataset.startHere;
        if (!action) return;
        if (action.startsWith('section:')) switchSection(action.replace('section:', ''));
        if (action === 'resource-form') {
          state.resources.customFormOpen = true;
          switchSection('resources');
          saveStateRaw();
        }
      });
      window.addEventListener('resize', debounce(() => {
        if (state.activeSection === 'dashboard') renderDashboardCharts();
      }, 150));
      window.addEventListener('beforeunload', () => persistStateNow());
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') persistStateNow();
      });

    function focusSectionSearch() {
      const searchBySection = {
        dashboard: ['txCategory'],
        workspace: ['workspacePageTitle'],
        tasks: ['taskSearch'],
        resources: ['resourcesSearch'],
        ai: ['chatInput'],
        memory: ['memorySearch'],
        planning: ['strategyIdeaInput', 'researchFollowInput'],
        settings: ['workspaceTitle'],
        'knowledge-graph': ['kgSearch']
      };
      const targets = searchBySection[state.activeSection] || [];
      for (const id of targets) {
        const input = document.getElementById(id);
        if (input) {
          input.focus();
          if ('select' in input) input.select();

    function debounce(fn, wait = 120) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), wait);

    function getCurrencyMeta(code = '') {
      const normalizedCode = String(code || '').trim().toUpperCase();
      return {
        code: normalizedCode,
        symbol: CURRENCY_META[normalizedCode]?.symbol || normalizedCode
      };
    }

    function renderCurrencyOptions(selectedCode = '') {
      const selected = String(selectedCode || '').trim().toUpperCase();
      const options = ['<option value="" ' + (!selected ? 'selected' : '') + '>Select Currency</option>'];
      Object.keys(CURRENCY_META).forEach((code) => {
        const optionLabel = `${CURRENCY_META[code].symbol} ${code}`;
        options.push(`<option value="${code}" ${selected === code ? 'selected' : ''}>${optionLabel}</option>`);
      });
      if (selected && !CURRENCY_META[selected]) {
        options.push(`<option value="${selected}" selected>${selected}</option>`);
      }
      return options.join('');
    }

    function getCurrencyDisplayLabel(currencyCode = state.settings.preferences.currency || '') {
      const { code, symbol } = getCurrencyMeta(currencyCode);
      return code ? `${symbol} ${code}` : 'Select Currency';
    }

    function money(v, { decimals = 0, includeCode = true } = {}){
      const rawAmount = Number(v || 0);
      const amount = Number.isFinite(rawAmount) ? rawAmount : 0;
      const amountLabel = amount.toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
      const { code, symbol } = getCurrencyMeta(state.settings.preferences.currency || '');
      if (!code) return amountLabel;
      return includeCode ? `${symbol} ${code} ${amountLabel}` : `${symbol} ${amountLabel}`;
    }

      if (!Array.isArray(state.resources.customResources)) state.resources.customResources = [];

        state.resources.library = resourceLibraryDefaults();

      if (typeof state.resources.activeTab !== 'string') state.resources.activeTab = 'templates';

    function wikiLinkTitles(text) {
      const titles = [];
      const pattern = /\[\[([^\]]+)\]\]/g;
      let match;
      while ((match = pattern.exec(String(text || '')))) {
        const t = match[1].trim();
        if (t && !titles.includes(t)) titles.push(t);
      }
      return titles;
    }

    function findRefByTitle(title) {
      const q = String(title || '').trim().toLowerCase();
      if (!q) return '';
      const page = (state.workspace?.pages || []).find(p => String(p.title || '').trim().toLowerCase() === q);
      if (page) return `page:${page.id}`;
      const note = (state.memory?.insights || []).find(n => String(n.title || '').trim().toLowerCase() === q);
      if (note) return `note:${note.id}`;
      const task = (state.tasks?.items || []).find(t => String(t.title || '').trim().toLowerCase() === q);
      if (task) return `task:${task.id}`;
      const research = (state.planning?.strategy?.sessions || []).find(r => String(r.query || '').trim().toLowerCase() === q);
      if (research) return `research:${research.id}`;
      return '';
    }

    function refMeta(ref) {
      const [kind, id] = String(ref || '').split(':');
      if (kind === 'page') {
        const page = (state.workspace?.pages || []).find(p => p.id === id);
        return page ? { title: page.title, type: page.objectType || 'Page', section: 'workspace', id } : null;
      }
      if (kind === 'note') {
        const note = (state.memory?.insights || []).find(n => n.id === id);
        return note ? { title: note.title, type: note.isDaily ? 'Daily Note' : 'Note', section: 'memory', id } : null;
      }
      if (kind === 'task') {
        const task = (state.tasks?.items || []).find(t => t.id === id);
        return task ? { title: task.title, type: 'Task', section: 'tasks', id } : null;
      }
      if (kind === 'research') {
        const session = (state.planning?.strategy?.sessions || []).find(s => s.id === id);
        return session ? { title: `Research: ${session.query.slice(0, 54)}`, type: 'Research', section: 'planning', id } : null;
      }
      if (kind === 'mention') {
        const m = (state.knowledgeGraph?.mentions || []).find(x => x.id === id);
        return m ? { title: m.title, type: 'Mention', section: 'ai', id } : null;
      }
      return null;
    }

    function addGraphMention(title, context = 'ai') {
      ensureKnowledgeGraphState();
      const normalized = String(title || '').trim();
      if (!normalized || normalized.length < 3) return;
      const existing = state.knowledgeGraph.mentions.find(m => m.title.toLowerCase() === normalized.toLowerCase());
      if (existing) {
        existing.lastSeenAt = new Date().toISOString();
        existing.count = Number(existing.count || 1) + 1;
        existing.context = context;
      } else {
        state.knowledgeGraph.mentions.push({ id: crypto.randomUUID(), title: normalized, context, count: 1, ts: new Date().toISOString(), lastSeenAt: new Date().toISOString() });
      }
    }

    function registerMentionsFromText(text, context = 'ai') {
      const wiki = wikiLinkTitles(text);
      wiki.forEach(title => addGraphMention(title, context));
      const proper = String(text || '').match(/\b([A-Z][a-z]{2,}(?:\s+[A-Z][a-z]{2,}){0,3})\b/g) || [];
      proper.slice(0, 8).forEach(token => { if (!findRefByTitle(token)) addGraphMention(token, context); });
    }

    function openReference(ref) {
      const [kind, id] = String(ref || '').split(':');
      if (!kind || !id) return;
      if (kind === 'page') {

      if (kind === 'note') {

      if (kind === 'task') {
        state.activeSection = 'tasks';
        if (state.tasks) state.tasks.selectedTaskId = id;
      }
      if (kind === 'research') {
        state.activeSection = 'planning';
        if (state.planning?.strategy) state.planning.strategy.activeSessionId = id;
      }
      if (kind === 'mention') {

    function buildKnowledgeGraph() {
      ensureKnowledgeGraphState();
      ensureWorkspaceState();
      ensureTasksState();
      const nodes = [];
      const edges = [];
      const nodeByRef = new Map();
      const addNode = (ref, label, type, section) => {
        if (!ref || nodeByRef.has(ref)) return;
        const node = { ref, label: label || 'Untitled', type, section, connected: 0 };
        nodeByRef.set(ref, node);
        nodes.push(node);
      };
      const addEdge = (from, to, relation = 'link') => {
        if (!from || !to || from === to || !nodeByRef.has(from) || !nodeByRef.has(to)) return;
        const key = [from, to].sort().join('::');
        if (edges.find(e => e.key === key)) return;
        edges.push({ key, from, to, relation });
      };

      (state.workspace?.pages || []).forEach(p => addNode(`page:${p.id}`, p.title, p.objectType || 'Page', 'workspace'));
      (state.memory?.insights || []).forEach(n => addNode(`note:${n.id}`, n.title, n.isDaily ? 'Daily Note' : 'Note', 'memory'));
      (state.tasks?.items || []).forEach(t => addNode(`task:${t.id}`, t.title, 'Task', 'tasks'));
      (state.planning?.strategy?.sessions || []).forEach(s => addNode(`research:${s.id}`, `Research: ${s.query.slice(0, 50)}`, 'Research', 'planning'));
      (state.knowledgeGraph?.mentions || []).forEach(m => addNode(`mention:${m.id}`, m.title, 'Mention', 'ai'));

      (state.workspace?.pages || []).forEach(p => {
        const from = `page:${p.id}`;
        (p.blocks || []).forEach(block => {
          wikiLinkTitles(`${block.text || ''} ${block.content || ''}`).forEach(title => {
            const to = findRefByTitle(title);
            if (to) addEdge(from, to, '[[link]]');
          });
          (block.targets || []).forEach(targetId => addEdge(from, `page:${targetId}`, block.relationKey || 'relation'));
        });
        Object.values(p.relations || {}).forEach(list => (list || []).forEach(id => addEdge(from, `page:${id}`, 'relation')));
      });

      (state.memory?.insights || []).forEach(note => {
        const from = `note:${note.id}`;
        wikiLinkTitles(note.content || '').forEach(title => {
          const to = findRefByTitle(title);
          if (to) addEdge(from, to, '[[link]]');
        });
        const text = `${note.title} ${note.content || ''}`.toLowerCase();
        (state.tasks?.items || []).forEach(task => { if (text.includes((task.title || '').toLowerCase()) && task.title) addEdge(from, `task:${task.id}`, 'auto'); });
      });

      (state.tasks?.items || []).forEach(task => {
        const from = `task:${task.id}`;
        if (task.linkRef) addEdge(from, task.linkRef, 'linkRef');
        wikiLinkTitles(`${task.title} ${task.description}`).forEach(title => { const to = findRefByTitle(title); if (to) addEdge(from, to, '[[link]]'); });
      });

      (state.planning?.strategy?.sessions || []).forEach(session => {
        const from = `research:${session.id}`;
        wikiLinkTitles(`${session.query} ${session.followUp || ''} ${session.deep?.summary || ''}`).forEach(title => {
          const to = findRefByTitle(title);
          if (to) addEdge(from, to, 'research');
        });
      });

      (state.ai?.history || []).forEach(msg => {
        if (!msg?.message) return;
        const linked = wikiLinkTitles(msg.message);
        linked.forEach(title => {
          const target = findRefByTitle(title);
          if (target) {
            const mention = (state.knowledgeGraph.mentions || []).find(m => m.title.toLowerCase() === title.toLowerCase());
            if (mention) addEdge(`mention:${mention.id}`, target, 'mention');
          }
        });
      });

      edges.forEach(edge => {
        const a = nodeByRef.get(edge.from);
        const b = nodeByRef.get(edge.to);
        if (a) a.connected += 1;
        if (b) b.connected += 1;
      });

      return { nodes, edges, nodeByRef };
    }

    function normalizeDashboardState() {
      const d = state.dashboard;
      let projectionSettingsChanged = false;
      if (!d.metrics) d.metrics = structuredClone(defaultState.dashboard.metrics);
      d.metrics.income = Number(d.metrics.income || 0);

      if (!Array.isArray(d.expenseCategories)) d.expenseCategories = [];

      if (!Array.isArray(d.transactions)) d.transactions = [];

      if (!d.projectionSettings) {

      const previousSeed = d.projectionSettings.variationSeed;
      d.projectionSettings.variationSeed = Number.isFinite(Number(d.projectionSettings.variationSeed))
        ? Number(d.projectionSettings.variationSeed)
        : defaultState.dashboard.projectionSettings.variationSeed;
      if (d.projectionSettings.variationSeed !== previousSeed) projectionSettingsChanged = true;
      if (projectionSettingsChanged) saveStateRaw();
    }

    function computeFinancialHealth() {
      const { income, expenses, runway } = state.dashboard.metrics;
      const profitabilityRaw = income <= 0 ? (expenses === 0 ? 100 : 0) : ((income - expenses) / income) * 100;
      const profitability = Math.max(0, Math.min(100, Math.round(profitabilityRaw)));
      const runwayScore = Math.max(0, Math.min(100, Math.round((runway / 18) * 100)));
      const burnRatio = income <= 0 ? 100 : Math.min(100, (expenses / income) * 100);
      const burnRateScore = Math.max(0, Math.min(100, Math.round(100 - burnRatio)));
      const healthScore = Math.round(runwayScore * 0.4 + profitability * 0.35 + burnRateScore * 0.25);
      state.dashboard.healthScore = healthScore;
      return { healthScore, runwayScore, profitability, burnRateScore };
    }

    function getTopExpenseCategories() {
      return [...state.dashboard.expenseCategories]
        .sort((a, b) => b.amount - a.amount)

    function getFutureMonthLabels(months = 6) {
      const labels = [];
      const now = new Date();
      for (let i = 1; i <= months; i += 1) {
        const dt = new Date(now.getFullYear(), now.getMonth() + i, 1);
        labels.push(dt.toLocaleString('en-IN', { month: 'long', year: 'numeric' }));
      }
      return labels;
    }

    function getForecast(months = 6) {
      const { income, expenses, netSavings, runway } = state.dashboard.metrics;
      const monthlyNetBase = Number(netSavings || income - expenses);
      const txs = [...state.dashboard.transactions]
        .filter(tx => Number.isFinite(Number(tx.amount)) && tx.ts)
        .sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());

      const monthlyBuckets = new Map();
      txs.forEach((tx) => {
        const dt = new Date(tx.ts);
        if (Number.isNaN(dt.getTime())) return;
        const key = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        const signedAmount = Number(tx.amount) * (tx.type === 'income' ? 1 : -1);
        monthlyBuckets.set(key, (monthlyBuckets.get(key) || 0) + signedAmount);
      });

      const lastThreeMonths = [];
      const now = new Date();
      for (let i = 2; i >= 0; i -= 1) {
        const dt = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const key = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        lastThreeMonths.push(monthlyBuckets.has(key) ? monthlyBuckets.get(key) : monthlyNetBase);
      }

      const monthOverMonthDeltas = [];
      for (let i = 1; i < lastThreeMonths.length; i += 1) {
        monthOverMonthDeltas.push(lastThreeMonths[i] - lastThreeMonths[i - 1]);
      }
      const trendDelta = monthOverMonthDeltas.length
        ? monthOverMonthDeltas.reduce((sum, d) => sum + d, 0) / monthOverMonthDeltas.length
        : 0;

      const seed = Number(state.dashboard.projectionSettings?.variationSeed || 0.037);
      const projection = Array.from({ length: months }, (_, i) => {
        const monthIndex = i + 1;
        const trendAdjusted = monthlyNetBase + (trendDelta * monthIndex);
        const variancePct = Math.sin((monthIndex * 1.91) + (seed * 100)) * 0.1;
        return Math.round(trendAdjusted * (1 + variancePct));
      });

      return {
        labels: getFutureMonthLabels(months),
        values: projection,
        currentNet: Math.round(monthlyNetBase),
        trendDelta: Math.round(trendDelta),
        projectedRunwayMonths: Math.max(0, Math.round(Number(runway || 0)))
      };
    }

    function updateRecommendations() {

      const { healthScore, profitability } = computeFinancialHealth();
      const rec = [];
      rec.push(`You have ${runway.toFixed(1)} months runway — ${runway < 6 ? 'start building a runway buffer now.' : 'keep extending it with strict burn control.'}`);
      if (expenses > income) rec.push('Monthly burn exceeds income. Reduce expenses by 10-15% or unlock a new revenue stream in the next sprint.');
      if (profitability < 15) rec.push('Low profitability detected. Re-price weak-margin offerings and cut low-ROI spend.');
      if (topExpenses[0] && topExpenses[0].amount > expenses * 0.35) rec.push(`${topExpenses[0].name} is your largest cost center. Audit this category for efficiency gains this week.`);
      if (healthScore < 55) rec.push('Financial health is fragile. Pause discretionary spend and shift focus to cash-collecting activities.');
      if (netSavings > 0 && runway >= 9 && healthScore >= 70) rec.push('Strong position: build a 2-quarter growth reserve and test one scalable acquisition channel.');
      state.dashboard.recommendations = rec.slice(0, 5);
    }

          notes,

    function normalizeWorkspaceBlock(block) {
      const legacyMap = { paragraph: 'text', h1: 'heading', h2: 'heading', h3: 'heading' };
      const normalizedType = legacyMap[block.type] || block.type || 'text';
      const levelFromLegacy = block.type === 'h1' ? 1 : block.type === 'h2' ? 2 : block.type === 'h3' ? 3 : 2;
      const normalized = {
        id: block.id || crypto.randomUUID(),
        type: normalizedType,
        text: String(block.text || ''),
        checked: !!block.checked,
        level: Number(block.level || levelFromLegacy || 2),
        relationKey: block.relationKey || WORKSPACE_RELATION_KEYS[0],
        targets: Array.isArray(block.targets) ? block.targets : [],
        open: block.open !== false,
        content: String(block.content || ''),
        columns: Array.isArray(block.columns) && block.columns.length ? block.columns.map(c => String(c || 'Column')) : ['Name', 'Status', 'Notes'],
        rows: Array.isArray(block.rows) ? block.rows.map(row => Array.isArray(row) ? row.map(cell => String(cell || '')) : []) : []
      };
      if (!['text', 'heading', 'todo', 'bullet', 'numbered', 'database', 'relation', 'toggle'].includes(normalized.type)) normalized.type = 'text';
      return normalized;
    }

    function createWorkspaceBlock(type = 'text') {
      return normalizeWorkspaceBlock({ id: crypto.randomUUID(), type });
    }

    function ensureWorkspaceState() {
      if (!state.workspace || typeof state.workspace !== 'object') state.workspace = structuredClone(defaultState.workspace);
      if (!Array.isArray(state.workspace.pages)) state.workspace.pages = [];
      state.workspace.pages.forEach(page => {
        if (!page.id) page.id = crypto.randomUUID();
        page.title = String(page.title || 'Untitled Page');
        page.objectType = WORKSPACE_OBJECT_TYPES.includes(page.objectType) ? page.objectType : 'Page';
        page.updatedAt = page.updatedAt || new Date().toISOString();
        if (!Array.isArray(page.blocks)) page.blocks = [createWorkspaceBlock('text')];
        page.blocks = page.blocks.map(normalizeWorkspaceBlock);
        if (!page.relations || typeof page.relations !== 'object') page.relations = {};
        WORKSPACE_RELATION_KEYS.forEach(key => {
          if (!Array.isArray(page.relations[key])) page.relations[key] = [];
          page.relations[key] = page.relations[key].filter(Boolean);
        });
      });
      if (!state.workspace.activePageId && state.workspace.pages[0]) state.workspace.activePageId = state.workspace.pages[0].id;
      if (!Array.isArray(state.workspace.databases)) state.workspace.databases = [];
      if (!state.workspace.activeDatabaseId && state.workspace.databases[0]) state.workspace.activeDatabaseId = state.workspace.databases[0].id;
    }

    function getActiveWorkspacePage() {
      ensureWorkspaceState();
      return state.workspace.pages.find(p => p.id === state.workspace.activePageId) || null;
    }

    function blockTypeLabel(type) {
      return ({ text: 'Text', heading: 'Heading', todo: 'To-do', bullet: 'Bullet', numbered: 'Numbered', database: 'Database', relation: 'Link', toggle: 'Toggle' })[type] || 'Text';
    }

    function pagePreview(page) {
      const first = (page.blocks || []).find(b => (b.text || '').trim());
      return first ? first.text.slice(0, 90) : 'Empty page';

      return new Map((state.workspace.pages || []).map(p => [p.id, p]));

      const ids = [];
      const pages = state.workspace.pages || [];
      const pattern = /\[\[([^\]]+)\]\]/g;
      let match;
      while ((match = pattern.exec(String(text || '')))) {
        const name = match[1].trim().toLowerCase();
        const found = pages.find(page => page.title.trim().toLowerCase() === name);
        if (found && found.id !== currentPageId && !ids.includes(found.id)) ids.push(found.id);
      }
      return ids;
    }

    function computeWorkspaceConnections() {
      ensureWorkspaceState();
      const backlinks = new Map((state.workspace.pages || []).map(p => [p.id, []]));
      const related = new Map((state.workspace.pages || []).map(p => [p.id, new Set()]));

      (state.workspace.pages || []).forEach(page => {
        (page.blocks || []).forEach(block => {
          if (['text', 'heading', 'todo', 'bullet', 'numbered', 'toggle'].includes(block.type)) {
            resolveMentionedPageIds(`${block.text || ''} ${block.content || ''}`, page.id).forEach(targetId => {
              backlinks.get(targetId)?.push({ fromId: page.id, via: 'smart-link' });
              related.get(page.id)?.add(targetId);
              related.get(targetId)?.add(page.id);
            });
          }
          if (block.type === 'relation') {
            (block.targets || []).forEach(targetId => {
              if (!targetId || targetId === page.id) return;
              backlinks.get(targetId)?.push({ fromId: page.id, via: block.relationKey || 'Relation block' });
              related.get(page.id)?.add(targetId);
              related.get(targetId)?.add(page.id);
            });
          }
        });
        WORKSPACE_RELATION_KEYS.forEach(key => {
          (page.relations[key] || []).forEach(targetId => {
            if (!targetId || targetId === page.id) return;
            backlinks.get(targetId)?.push({ fromId: page.id, via: key });
            related.get(page.id)?.add(targetId);
            related.get(targetId)?.add(page.id);
          });
        });
      });

      return {
        backlinks,
        related: new Map(Array.from(related.entries()).map(([k, set]) => [k, Array.from(set)]))
      };
    }

    function createWorkspacePage(title='Untitled Page', blocks=null, objectType='Page', relations=null) {
      const page = {
        id: crypto.randomUUID(),
        title,
        objectType: WORKSPACE_OBJECT_TYPES.includes(objectType) ? objectType : 'Page',
        updatedAt: new Date().toISOString(),
        relations: Object.fromEntries(WORKSPACE_RELATION_KEYS.map(key => [key, Array.isArray(relations?.[key]) ? relations[key] : []])),
        blocks: (blocks || [createWorkspaceBlock('text')]).map(b => normalizeWorkspaceBlock({ ...b, id: crypto.randomUUID() }))
      };
      state.workspace.pages.unshift(page);
      state.workspace.activePageId = page.id;
      workspacePendingAnimation.pageId = page.id;
      saveState();
    }

    function updatePageUpdatedAt(page) {
      page.updatedAt = new Date().toISOString();
    }

      el.innerHTML = `
        <div class="bg-white border border-orange-100 rounded-2xl p-4 sm:p-6 space-y-5 shadow-sm">

              `).join('') || emptyStateMarkup('🗂️', 'No pages yet.', 'Create your first page to start organizing ideas.', '', 'Start Here', 'section:workspace')}

              ${activePage ? `
                <div class="flex flex-wrap gap-2 items-center">
                  <input id="workspacePageTitle" value="${escapeAttr(activePage.title)}" class="flex-1 min-w-[230px] bg-white border border-zinc-300 rounded-lg px-3 py-2 text-xl font-semibold focus:border-orange-400 outline-none" placeholder="Untitled page" />
                  <select id="workspaceObjectType" class="bg-white border border-zinc-300 rounded-lg px-3 py-2 text-sm">
                    ${WORKSPACE_OBJECT_TYPES.map(type => `<option value="${type}" ${activePage.objectType===type?'selected':''}>${type}</option>`).join('')}
                  </select>
                  <button id="workspaceShowRelated" class="px-3 py-2 rounded bg-orange-50 border border-orange-200 text-orange-600">Show Connected</button>

                  <div class="flex items-center justify-between">
                    <h4 class="font-semibold text-zinc-800">Editor</h4>
                    <p class="text-xs text-zinc-600">Type / to add heading, list, checkbox etc.</p>
                  </div>
                  <div id="workspaceBlocks" class="space-y-2">
                    ${(activePage.blocks || []).map((block, idx) => {
                      const cmdOpen = block.commandOpen ? '' : 'hidden';

                    }).join('') || `<div class="rounded-xl border border-dashed border-orange-300 bg-white p-6 text-center text-zinc-700">

Write your idea, build plans, and connect everything.
Use the 'Add Block' button below to get started.</p>

              ` : `<div class="rounded-xl border border-dashed border-orange-300 bg-orange-50 p-8 text-center text-zinc-700">
                <p class="text-2xl mb-2">✨</p>
                <p class="whitespace-pre-line font-medium">This is your personal workspace ✨
Write your idea, build plans, and connect everything.
Use the 'Add Block' button below to get started.</p>
              </div>`}
            </section>

            <aside class="bg-white border border-orange-100 rounded-xl p-4 space-y-4">
              <h3 class="text-sm font-semibold text-zinc-700">Connections</h3>
              <div class="rounded-lg border border-orange-100 bg-orange-50/70 p-3 text-sm text-zinc-700 whitespace-pre-line">How to add links:
- In any page, type [[ and then the page name
- Or use the 'Add Link' button below to connect to another page</div>
              ${activePage ? `
                <div class="space-y-2">
                  <p class="text-xs uppercase text-zinc-500">Connected Pages</p>
                  <div class="flex flex-wrap gap-1">${relatedObjects.map(id => `<button data-open-page="${id}" class="text-xs px-2 py-1 rounded-full bg-orange-100 border border-orange-200 hover:bg-orange-200 transition">${escapeHTML(pageMap.get(id)?.title || 'Unknown')}</button>`).join('') || emptyStateMarkup('🔗', 'No connections yet.', 'Link this page to another one to build your graph.', '', 'Start Here', 'section:workspace')}</div>
                </div>
                <div class="space-y-2">
                  <p class="text-xs uppercase text-zinc-500">Linked From</p>
                  <div class="space-y-1">${backlinks.map(link => `<button data-open-page="${link.fromId}" class="w-full text-left text-sm px-2 py-1 rounded border border-zinc-200 hover:border-orange-300 bg-white">← ${escapeHTML(pageMap.get(link.fromId)?.title || 'Unknown')}</button>`).join('') || emptyStateMarkup('🧭', 'No pages link here yet.', 'Mention this page in another page using [[Page Name]].', '', 'Start Here', 'section:workspace')}</div>
                </div>
                <div class="pt-2 border-t border-zinc-200 space-y-2">
                  <p class="text-xs uppercase text-zinc-500">Add Link</p>
                  <select id="workspaceQuickLinkSelect" class="w-full bg-white border border-zinc-300 rounded px-2 py-1 text-sm">
                    <option value="">Select page...</option>
                    ${(state.workspace.pages || []).filter(p => p.id !== activePage.id).map(p => `<option value="${p.id}">${escapeHTML(p.title)}</option>`).join('')}
                  </select>
                  <button id="workspaceQuickLinkBtn" class="w-full px-3 py-2 rounded border border-orange-300 bg-orange-100 text-orange-700">Add Link</button>
                </div>
              ` : emptyStateMarkup('📄', 'No page selected yet.', 'Open a page and connections will show here.', '', 'Start Here', 'section:workspace')}
            </section>
          </div>
        </div>
      `;

      document.getElementById('workspaceHowBtn').onclick = () => document.getElementById('workspaceHowPanel').classList.toggle('hidden');
      document.getElementById('workspaceNewPage').onclick = () => createWorkspacePage();

      el.querySelectorAll('[data-open-page]').forEach(btn => btn.onclick = () => {
        state.workspace.activePageId = btn.dataset.openPage;
        saveState();
      });

      if (!activePage) return;

      document.getElementById('workspacePageTitle').oninput = (e) => {
        activePage.title = e.target.value;
        updatePageUpdatedAt(activePage);
        saveStateRaw();
      };
      document.getElementById('workspaceObjectType').onchange = (e) => {
        activePage.objectType = e.target.value;
        updatePageUpdatedAt(activePage);
        saveState();
      };
      document.getElementById('workspaceShowRelated').onclick = () => showRelated(`page:${activePage.id}`);
      document.getElementById('workspaceDeletePage').onclick = () => {
        if (!confirm('Delete this object?')) return;
        state.workspace.pages = state.workspace.pages.filter(p => p.id !== activePage.id);
        state.workspace.activePageId = state.workspace.pages[0]?.id || null;
        saveState();
      };

      el.querySelectorAll('[data-relation-add]').forEach(btn => btn.onclick = () => {
        const key = btn.dataset.relationAdd;
        const select = el.querySelector(`[data-relation-select="${CSS.escape(key)}"]`);
        const id = select?.value;
        if (!id) return;
        if (!activePage.relations[key].includes(id)) activePage.relations[key].push(id);
        updatePageUpdatedAt(activePage);
        saveState();
      });

      document.getElementById('workspaceAddBlock').onclick = () => {
        const createdBlock = createWorkspaceBlock('text');
        activePage.blocks.push(createdBlock);
        workspacePendingAnimation.blockId = createdBlock.id;
        updatePageUpdatedAt(activePage);
        saveState();
      };

      document.getElementById('workspaceQuickLinkBtn')?.addEventListener('click', () => {
        const id = document.getElementById('workspaceQuickLinkSelect')?.value;
        if (!id) return;
        if (!activePage.relations['Linked Notes'].includes(id)) activePage.relations['Linked Notes'].push(id);
        updatePageUpdatedAt(activePage);
        saveState();
      });

      let dragId = null;
      el.querySelectorAll('.workspace-block').forEach(blockEl => {
        blockEl.addEventListener('dragstart', () => {
          dragId = blockEl.dataset.blockId;
          blockEl.classList.add('opacity-60');
        });
        blockEl.addEventListener('dragend', () => {
          dragId = null;
          blockEl.classList.remove('opacity-60');
        });
        blockEl.addEventListener('dragover', (evt) => evt.preventDefault());
        blockEl.addEventListener('drop', () => {
          const targetId = blockEl.dataset.blockId;
          if (!dragId || dragId === targetId) return;
          const fromIndex = activePage.blocks.findIndex(b => b.id === dragId);
          const toIndex = activePage.blocks.findIndex(b => b.id === targetId);
          if (fromIndex < 0 || toIndex < 0) return;
          const [moved] = activePage.blocks.splice(fromIndex, 1);
          activePage.blocks.splice(toIndex, 0, moved);
          updatePageUpdatedAt(activePage);
          saveState();
        });
      });

      el.querySelectorAll('[data-delete-block]').forEach(btn => btn.onclick = () => {
        activePage.blocks = activePage.blocks.filter(b => b.id !== btn.dataset.deleteBlock);
        updatePageUpdatedAt(activePage);
        saveState();
      });

      bindWorkspaceBlockEvents(el, activePage);

      document.getElementById('workspaceExport').onclick = () => downloadJSON('workspace-data.json', state.workspace);
      document.getElementById('workspaceImport').onchange = (e) => importJSONFile(e.target.files[0], (data) => {
        state.workspace = deepMerge(structuredClone(defaultState.workspace), data || {});
        ensureWorkspaceState();
        saveState();
      });
      document.getElementById('workspaceClear').onclick = () => {
        if (!confirm('Clear all workspace objects?')) return;
        state.workspace = structuredClone(defaultState.workspace);
        state.workspace.pages = [];
        state.workspace.activePageId = null;
        saveState();
      };

      if (workspacePendingAnimation.pageId || workspacePendingAnimation.blockId) {
        setTimeout(() => {
          workspacePendingAnimation = { pageId: null, blockId: null };
        }, 320);
      }
    }

    function renderWorkspaceBlockBody(block, idx, currentPageId, filteredMenu, cmdOpenClass) {
      const headingClass = block.level === 1 ? 'text-2xl font-bold' : block.level === 2 ? 'text-xl font-semibold' : 'text-lg font-semibold';
      const mentionIds = resolveMentionedPageIds(`${block.text || ''} ${block.content || ''}`, currentPageId);
      const mentionPills = mentionIds.map(id => {
        const page = (state.workspace.pages || []).find(p => p.id === id);
        return `<span class="text-[11px] px-2 py-1 rounded-full border border-orange-500/30 bg-orange-500/10">[[${escapeHTML(page?.title || 'Unknown')}]]</span>`;
      }).join('');

      const slashMenu = `
        <div class="${cmdOpenClass} mt-2 rounded-lg border border-orange-200 bg-white p-2 space-y-1" data-command-menu="${block.id}">
          ${(filteredMenu.length ? filteredMenu : workspaceBlockMenu).map(item => `<button data-command-type="${item.type}" data-command-for="${block.id}" class="w-full text-left px-2 py-1 rounded hover:bg-orange-500/15 text-sm">/${item.type} · ${item.label}</button>`).join('')}
        </div>
      `;

      if (block.type === 'todo') {
        return `<label class="flex items-center gap-2"><input type="checkbox" data-block-check="${block.id}" ${block.checked ? 'checked' : ''} class="accent-orange-400" /><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="flex-1 bg-white border border-zinc-300 rounded px-2 py-2" placeholder="To-do" /></label>${mentionPills ? `<div class="flex gap-1 flex-wrap mt-2">${mentionPills}</div>`:''}${slashMenu}`;
      }
      if (block.type === 'heading') {
        return `<div class="space-y-2"><div class="flex gap-2"><select data-block-level="${block.id}" class="bg-white border border-zinc-300 rounded px-2 py-1 text-xs">${[1,2,3].map(level=>`<option value="${level}" ${block.level===level?'selected':''}>H${level}</option>`).join('')}</select><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="${headingClass} flex-1 bg-white border border-zinc-300 rounded px-2 py-2" placeholder="Heading" /></div>${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div>`;
      }
      if (block.type === 'bullet' || block.type === 'numbered') {
        const marker = block.type === 'bullet' ? '•' : `${idx + 1}.`;
        return `<div class="flex items-start gap-2"><span class="text-zinc-500 mt-2">${marker}</span><div class="flex-1 space-y-2"><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="w-full bg-white border border-zinc-300 rounded px-2 py-2" placeholder="List item" />${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div></div>`;
      }
      if (block.type === 'toggle') {
        return `<div class="space-y-2"><button data-toggle-open="${block.id}" class="text-sm px-2 py-1 rounded border border-zinc-300 bg-white">${block.open ? '▼' : '▶'} Toggle</button><input data-block-text="${block.id}" value="${escapeAttr(block.text)}" class="w-full bg-white border border-zinc-300 rounded px-2 py-2" placeholder="Toggle title" />${block.open ? `<textarea data-block-content="${block.id}" class="w-full h-20 bg-white border border-zinc-300 rounded px-2 py-2" placeholder="Toggle content">${escapeHTML(block.content || '')}</textarea>` : ''}${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div>`;
      }
      if (block.type === 'relation') {
        return `<div class="space-y-2"><div class="flex gap-2"><select data-block-relation-key="${block.id}" class="bg-white border border-zinc-300 rounded px-2 py-1 text-sm">${WORKSPACE_RELATION_KEYS.map(key => `<option value="${key}" ${block.relationKey===key?'selected':''}>${key}</option>`).join('')}</select><select data-block-relation-target="${block.id}" class="flex-1 bg-white border border-zinc-300 rounded px-2 py-1 text-sm"><option value="">Select page…</option>${(state.workspace.pages || []).filter(p => p.id !== currentPageId).map(p => `<option value="${p.id}">${escapeHTML(p.title)} · ${escapeHTML(p.objectType||'Page')}</option>`).join('')}</select><button data-block-relation-add="${block.id}" class="px-3 py-1 rounded bg-orange-100 border border-orange-300 text-orange-700">Add Link</button></div><div class="flex flex-wrap gap-1">${(block.targets || []).map(id => `<span class="text-xs px-2 py-1 rounded-full border border-orange-500/30 bg-orange-500/10">${escapeHTML((state.workspace.pages || []).find(p => p.id === id)?.title || 'Missing')}</span>`).join('') || '<span class="text-xs text-zinc-600">No linked pages</span>'}</div>${slashMenu}</div>`;
      }
      if (block.type === 'database') {
        const cols = block.columns.length || 1;
        return `<div class="space-y-2"><div class="overflow-auto"><table class="min-w-full text-xs border border-zinc-200"><thead><tr>${block.columns.map((col, cIdx) => `<th class="p-1 border border-zinc-200"><input data-block-db-col="${block.id}:${cIdx}" value="${escapeAttr(col)}" class="w-full bg-white border border-zinc-300 rounded px-1 py-1" /></th>`).join('')}<th class="p-1 border border-zinc-200"><button data-block-db-add-col="${block.id}" class="text-orange-500">+ Col</button></th></tr></thead><tbody>${(block.rows || []).map((row, rIdx) => `<tr>${Array.from({length: cols}).map((_, cIdx) => `<td class="border border-zinc-200 p-1"><input data-block-db-cell="${block.id}:${rIdx}:${cIdx}" value="${escapeAttr(row[cIdx] || '')}" class="w-full bg-white border border-zinc-300 rounded px-1 py-1"/></td>`).join('')}<td class="border border-zinc-200 p-1 text-center"><button data-block-db-del-row="${block.id}:${rIdx}" class="text-red-400">✕</button></td></tr>`).join('')}</tbody></table></div><div class="flex gap-2"><button data-block-db-add-row="${block.id}" class="px-2 py-1 rounded border border-zinc-300 bg-white text-xs">+ Row</button></div>${slashMenu}</div>`;

      return `<div class="space-y-2"><textarea data-block-text="${block.id}" class="w-full min-h-[74px] bg-white border border-zinc-300 rounded px-2 py-2" placeholder="Write something...">${escapeHTML(block.text)}</textarea>${mentionPills ? `<div class="flex gap-1 flex-wrap">${mentionPills}</div>`:''}${slashMenu}</div>`;
    }

    function bindWorkspaceBlockEvents(el, activePage) {
      const findBlock = (id) => activePage.blocks.find(b => b.id === id);
      const touchPage = () => { updatePageUpdatedAt(activePage); saveStateRaw(); };

      el.querySelectorAll('[data-block-text]').forEach(input => input.oninput = () => {
        const block = findBlock(input.dataset.blockText);
        if (!block) return;
        block.text = input.value;
        const trimmed = block.text.trimStart();
        block.commandOpen = trimmed.startsWith('/');
        block.commandQuery = block.commandOpen ? trimmed.replace(/^\//, '').trim() : '';
        touchPage();
        if (block.commandOpen) renderWorkspace();
      });
      el.querySelectorAll('[data-block-content]').forEach(input => input.oninput = () => {
        const block = findBlock(input.dataset.blockContent);
        if (!block) return;
        block.content = input.value;
        touchPage();
      });
      el.querySelectorAll('[data-block-check]').forEach(input => input.onchange = () => {
        const block = findBlock(input.dataset.blockCheck);
        if (!block) return;
        block.checked = input.checked;
        touchPage();
      });
      el.querySelectorAll('[data-block-level]').forEach(select => select.onchange = () => {
        const block = findBlock(select.dataset.blockLevel);
        if (!block) return;
        block.level = Number(select.value || 2);
        touchPage();
        renderWorkspace();
      });
      el.querySelectorAll('[data-toggle-open]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.toggleOpen);
        if (!block) return;
        block.open = !block.open;
        touchPage();
        renderWorkspace();
      });

      el.querySelectorAll('[data-command-type]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.commandFor);
        if (!block) return;
        const converted = normalizeWorkspaceBlock({ ...block, type: btn.dataset.commandType, commandOpen: false, commandQuery: '' });
        Object.assign(block, converted);
        touchPage();
        saveState();
      });

      el.querySelectorAll('[data-block-relation-key]').forEach(select => select.onchange = () => {
        const block = findBlock(select.dataset.blockRelationKey);
        if (!block) return;
        block.relationKey = select.value;
        touchPage();
      });
      el.querySelectorAll('[data-block-relation-add]').forEach(btn => btn.onclick = () => {
        const id = btn.dataset.blockRelationAdd;
        const block = findBlock(id);
        const select = el.querySelector(`[data-block-relation-target="${id}"]`);
        if (!block || !select?.value) return;
        if (!block.targets.includes(select.value)) block.targets.push(select.value);
        touchPage();
        saveState();
      });

      el.querySelectorAll('[data-block-db-add-row]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.blockDbAddRow);
        if (!block) return;
        block.rows.push(Array.from({ length: block.columns.length }, () => ''));
        touchPage();
        saveState();
      });
      el.querySelectorAll('[data-block-db-del-row]').forEach(btn => btn.onclick = () => {
        const [id, rowIdxRaw] = btn.dataset.blockDbDelRow.split(':');
        const block = findBlock(id);
        const rowIdx = Number(rowIdxRaw);
        if (!block || Number.isNaN(rowIdx)) return;
        block.rows.splice(rowIdx, 1);
        touchPage();
        saveState();
      });
      el.querySelectorAll('[data-block-db-add-col]').forEach(btn => btn.onclick = () => {
        const block = findBlock(btn.dataset.blockDbAddCol);
        if (!block) return;
        block.columns.push(`Column ${block.columns.length + 1}`);
        block.rows.forEach(row => row.push(''));
        touchPage();
        saveState();
      });
      el.querySelectorAll('[data-block-db-col]').forEach(input => input.oninput = () => {
        const [id, colRaw] = input.dataset.blockDbCol.split(':');
        const colIdx = Number(colRaw);
        const block = findBlock(id);
        if (!block || Number.isNaN(colIdx)) return;
        block.columns[colIdx] = input.value || `Column ${colIdx + 1}`;
        touchPage();
      });
      el.querySelectorAll('[data-block-db-cell]').forEach(input => input.oninput = () => {
        const [id, rowRaw, colRaw] = input.dataset.blockDbCell.split(':');
        const rowIdx = Number(rowRaw);
        const colIdx = Number(colRaw);
        const block = findBlock(id);
        if (!block || Number.isNaN(rowIdx) || Number.isNaN(colIdx)) return;
        if (!Array.isArray(block.rows[rowIdx])) block.rows[rowIdx] = [];
        block.rows[rowIdx][colIdx] = input.value;
        touchPage();
      });
    }

    function ensureTasksState() {
      if (!state.tasks || typeof state.tasks !== 'object') state.tasks = structuredClone(defaultState.tasks);
      if (!Array.isArray(state.tasks.items)) state.tasks.items = [];
      if (!Array.isArray(state.tasks.sprints)) state.tasks.sprints = [];
      if (!state.tasks.leftTab) state.tasks.leftTab = 'all';
      if (!state.tasks.view) state.tasks.view = 'kanban';
      if (typeof state.tasks.search !== 'string') state.tasks.search = '';
      if (!state.tasks.priorityFilter) state.tasks.priorityFilter = 'All';
      if (!state.tasks.statusFilter) state.tasks.statusFilter = 'All';
      if (!state.tasks.sprintFilter) state.tasks.sprintFilter = 'all';
      state.tasks.items.forEach(task => {
        if (!task.id) task.id = crypto.randomUUID();
        task.title = String(task.title || 'Untitled Task');
        task.description = String(task.description || '');
        task.dueDate = task.dueDate || '';
        if (!['High', 'Medium', 'Low'].includes(task.priority)) task.priority = 'Medium';
        if (!['To Do', 'In Progress', 'Done'].includes(task.status)) task.status = 'To Do';
        if (!Array.isArray(task.tags)) task.tags = String(task.tags || '').split(',').map(t => t.trim()).filter(Boolean);
        if (!task.createdAt) task.createdAt = new Date().toISOString();
        if (!task.updatedAt) task.updatedAt = task.createdAt;
        if (task.sprintId === undefined) task.sprintId = '';
        if (task.linkRef === undefined) task.linkRef = '';
      });
      state.tasks.sprints.forEach(s => {
        if (!s.id) s.id = crypto.randomUUID();
        s.name = String(s.name || 'Untitled Sprint');
        s.startDate = s.startDate || '';
        s.endDate = s.endDate || '';
        if (!s.createdAt) s.createdAt = new Date().toISOString();
      });
      if (!state.tasks.items.length) {
        const now = new Date();
        const mk = (title, priority, status, offset) => {
          const due = new Date(now);
          due.setDate(due.getDate() + offset);
          return { id: crypto.randomUUID(), title, description: '', dueDate: due.toISOString().slice(0, 10), priority, status, tags: [], sprintId: '', linkRef: '', createdAt: now.toISOString(), updatedAt: now.toISOString() };
        };
        state.tasks.items = [
          mk('Define launch landing page copy', 'High', 'To Do', 2),
          mk('Review onboarding flow', 'Medium', 'In Progress', 4),
          mk('Publish welcome email sequence', 'Low', 'Done', -1)
        ];
      }
    }

    function buildTaskLinkOptions() {
      const options = [{ value: '', label: 'No link' }];
      (state.workspace?.pages || []).slice(0, 60).forEach(page => options.push({ value: `page:${page.id}`, label: `📄 Workspace: ${page.title || 'Untitled Page'}` }));
      (state.memory?.insights || []).slice(0, 60).forEach(note => options.push({ value: `note:${note.id}`, label: `🧠 Memory: ${note.title || 'Untitled Note'}` }));
      (state.strategy?.sessions || []).slice(0, 60).forEach(session => options.push({ value: `strategy:${session.id}`, label: `🔬 Strategy: ${session.query || 'Research Session'}` }));
      return options;
    }

    function getLinkedItem(task) {
      if (!task?.linkRef) return null;
      const [kind, id] = String(task.linkRef).split(':');
      if (kind === 'note') {
        const note = (state.memory?.insights || []).find(n => n.id === id);
        return note ? { icon: '🧠', type: 'Memory', title: note.title, target: () => {
          state.activeSection = 'memory';
          if (state.memory) state.memory.activeNoteId = id;
        } } : { icon: '🧠', type: 'Memory', title: 'Missing note', missing: true };
      }
      if (kind === 'page') {
        const page = (state.workspace?.pages || []).find(p => p.id === id);
        return page ? { icon: '📄', type: 'Workspace', title: page.title, target: () => {
          state.activeSection = 'workspace';
          if (state.workspace) state.workspace.activePageId = id;
        } } : { icon: '📄', type: 'Workspace', title: 'Missing page', missing: true };
      }
      if (kind === 'strategy') {
        const session = (state.strategy?.sessions || []).find(s => s.id === id);
        return session ? { icon: '🔬', type: 'Strategy', title: session.query || 'Research Session', target: () => {
          state.activeSection = 'planning';
          if (state.strategy) state.strategy.activeSessionId = id;
        } } : { icon: '🔬', type: 'Strategy', title: 'Missing research output', missing: true };
      }
      return { icon: '🔗', type: 'Linked', title: task.linkRef, missing: true };
    }

    function linkedTaskLabel(task) {
      const linked = getLinkedItem(task);
      return linked ? `${linked.icon} ${linked.title}` : 'Not linked';
    }

      }).join('') || emptyStateMarkup('🏁', 'No sprints yet.', 'Create a sprint to group execution goals.', '', 'Start Here', 'section:tasks');

      const taskCard = (task) => {

          <div class="text-xs text-slate-500 flex flex-wrap gap-3"><span class="${overdue ? 'text-rose-600 font-semibold' : ''}">Due: ${escapeHTML(task.dueDate || '—')} ${overdue ? '• Overdue' : ''}</span><span>Sprint: ${escapeHTML(sprint?.name || 'Backlog')}</span>${linked ? `<button data-jump-link="${task.id}" class="text-teal-700 hover:text-teal-600">${linked.icon} ${escapeHTML(linked.title)}</button>` : '<span class="text-slate-400">Not linked</span>'}</div>
          <div class="flex gap-2"><button data-edit-task="${task.id}" class="text-xs px-2.5 py-1.5 rounded-lg bg-slate-100 border border-slate-200">Edit</button><button data-delete-task="${task.id}" class="text-xs px-2.5 py-1.5 rounded-lg bg-rose-50 border border-rose-200 text-rose-600">Delete</button></div></article>`;
      };

      const activeTasksMarkup = t.view === 'list'

        : `<div class="grid md:grid-cols-3 gap-3">${['To Do', 'In Progress', 'Done'].map(status => `<div data-drop-status="${status}" class="bg-white border border-slate-200 rounded-2xl p-3 min-h-[280px]"><div class="flex items-center justify-between mb-2"><h3 class="font-medium text-slate-700">${status}</h3><span class="text-xs text-slate-400">${sorted.filter(task => task.status === status).length}</span></div><div class="space-y-2">${sorted.filter(task => task.status === status).map(taskCard).join('') || '<p class="text-xs text-slate-400">No tasks</p>'}</div></div>`).join('')}</div>`;

      el.innerHTML = `

></div></form>
