<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barya Business AI Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            barya: {
              bg: '#0a0a0a',
              card: '#111111',
              accent: '#00d4ff',
              soft: '#1a1a1a'
            }
          },
          boxShadow: {
            neon: '0 0 0 1px rgba(0, 212, 255, 0.3), 0 0 30px rgba(0, 212, 255, 0.12)'
          }
        }
      }
    };
  </script>
  <style>
    :root { color-scheme: dark; }
    body { background: #0a0a0a; }
    .section-panel { display: none; }
    .section-panel.active { display: block; }
    .active-nav { background: rgba(0, 212, 255, 0.14); color: #00d4ff; border-color: rgba(0, 212, 255, 0.25); }
    .ring-progress {
      width: 132px;
      height: 132px;
      border-radius: 999px;
      background: conic-gradient(#00d4ff var(--pct), #202020 0);
      display: grid;
      place-items: center;
    }
    .ring-progress > div {
      width: 98px;
      height: 98px;
      border-radius: 999px;
      background: #111111;
      display: grid;
      place-items: center;
      border: 1px solid #2b2b2b;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #2c2c2c; border-radius: 10px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #131313; }
  </style>
</head>
<body class="text-zinc-100 min-h-screen">
  <div class="min-h-screen flex">
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-[270px] bg-[#0d0d0d] border-r border-zinc-800 px-4 py-5 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-lg font-semibold text-barya-accent">Barya Workspace</h1>
          <p class="text-xs text-zinc-400">Business AI Operating System</p>
        </div>
        <button id="closeSidebar" class="lg:hidden p-2 rounded border border-zinc-700 text-zinc-300">✕</button>
      </div>
      <nav class="space-y-2" id="mainNav"></nav>
    </aside>

    <div class="flex-1 lg:ml-0 w-full">
      <header class="sticky top-0 z-30 backdrop-blur bg-[#0a0a0a]/90 border-b border-zinc-800 px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <button id="openSidebar" class="lg:hidden p-2 rounded border border-zinc-700">☰</button>
          <input id="workspaceTitle" class="bg-transparent text-xl sm:text-2xl font-semibold outline-none border-b border-transparent focus:border-barya-accent max-w-[56vw] truncate" />
        </div>
        <div class="flex items-center gap-3">
          <span class="hidden sm:inline-flex text-xs bg-barya-soft border border-zinc-700 px-2 py-1 rounded-full">Local-First</span>
          <div class="text-right">
            <p class="text-sm font-medium">Shruti Barya</p>
            <p class="text-xs text-zinc-400">Founder</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-blue-500 text-black font-bold grid place-items-center">SB</div>
        </div>
      </header>

      <main class="p-4 sm:p-6 space-y-6">
        <section id="section-dashboard" class="section-panel active space-y-6"></section>
        <section id="section-workspace" class="section-panel space-y-6"></section>
        <section id="section-ai" class="section-panel space-y-6"></section>
        <section id="section-memory" class="section-panel space-y-6"></section>
        <section id="section-planning" class="section-panel space-y-6"></section>
        <section id="section-settings" class="section-panel space-y-6"></section>
      </main>
    </div>
  </div>

  <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

  <dialog id="memoryModal" class="w-[min(92vw,700px)] bg-[#111] border border-zinc-700 rounded-xl p-0 text-zinc-100">
    <div class="p-5 border-b border-zinc-800 flex justify-between items-center">
      <h3 class="text-lg font-semibold">Insight</h3>
      <button id="closeMemoryModal" class="text-zinc-400 hover:text-zinc-100">✕</button>
    </div>
    <div class="p-5" id="memoryModalBody"></div>
  </dialog>

  <script>
    const STORAGE_KEY = 'baryaWorkspaceV2';
    const navItems = [
      { id: 'dashboard', icon: '📊', label: 'Dashboard' },
      { id: 'workspace', icon: '📑', label: 'Workspace' },
      { id: 'ai', icon: '🤖', label: 'Barya AI' },
      { id: 'memory', icon: '🧠', label: 'Memory' },
      { id: 'planning', icon: '🗺️', label: 'Business Planning' },
      { id: 'settings', icon: '⚙️', label: 'Settings' }
    ];

    const defaultState = {
      activeSection: 'dashboard',
      title: 'Untitled Startup',
      dashboard: {
        metrics: { income: 25000, expenses: 12000, netSavings: 13000, runway: 9 },
        readinessScore: 68,
        growth: [12, 17, 23, 28, 36, 45],
        activities: ['Updated financial model', 'Sent investor update'],
        recommendations: []
      },
      ai: {
        history: [
          {
            role: 'assistant',
            message: 'Welcome! Ask me about growth, runway, product, or hiring priorities.',
            structured: {
              answer: 'I can help you make practical founder decisions quickly.',
              why: 'You need clear decisions, not generic advice.',
              steps: ['Pick one challenge', 'Share current numbers', 'Define desired outcome'],
              tip: 'Specific context improves response quality.',
              next: 'Try asking: How do I improve runway in 60 days?'
            },
            ts: new Date().toISOString()
          }
        ]
      },
      memory: {
        insights: [
          { id: crypto.randomUUID(), title: 'ICP clarity', content: 'Top segment is B2B SaaS founders at pre-seed.', tag: 'Strategy', ts: new Date().toISOString() }
        ],
        actions: [
          { id: crypto.randomUUID(), text: 'Call 3 churned customers', category: 'Customer', ts: new Date().toISOString() }
        ],
        search: ''
      },
      workspace: {
        pages: [
          {
            id: crypto.randomUUID(),
            title: 'Welcome Workspace Page',
            updatedAt: new Date().toISOString(),
            blocks: [
              { id: crypto.randomUUID(), type: 'h1', text: 'Welcome to your flexible workspace' },
              { id: crypto.randomUUID(), type: 'paragraph', text: 'Create structured notes, to-dos, and plans. Everything is stored locally.' },
              { id: crypto.randomUUID(), type: 'todo', text: 'Create your first custom page', checked: false }
            ]
          }
        ],
        activePageId: null,
        databases: [],
        activeDatabaseId: null
      },
      planning: {
        guides: [
          { title: 'Market Validation', tasks: ['Interview 10 users', 'Test pricing', 'Confirm top pain'], done: [false, false, false] },
          { title: 'Go-To-Market', tasks: ['Define channel mix', 'Launch weekly content', 'Set CAC target'], done: [false, false, false] },
          { title: 'Financial Discipline', tasks: ['Set burn cap', 'Track runway weekly', 'Review budget monthly'], done: [false, false, false] },
          { title: 'Team Execution', tasks: ['Define roles', 'Set weekly goals', 'Run retro every Friday'], done: [false, false, false] }
        ],
        templates: {
          onePager: 'Vision, customer, problem, solution, moat.',
          fundraise: 'Round goal, use of funds, milestones.',
          ops: 'Quarter goals, KPI owners, weekly cadence.'
        }
      },
      settings: {
        founder: { name: 'Shruti Barya', role: 'Founder', email: 'shruti@barya.ai' },
        business: { name: 'Untitled Startup', stage: 'Pre-Seed', industry: 'B2B SaaS' },
        preferences: { currency: 'USD', language: 'English', darkMode: true }
      }
    };

    let state = loadState();
    let growthChart;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(defaultState);
      try {
        const parsed = JSON.parse(raw);
        return deepMerge(structuredClone(defaultState), parsed);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function deepMerge(target, source) {
      for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
          deepMerge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
      return target;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateRecommendations();
      renderActiveSection();
    }

    function init() {
      renderNav();
      setupBaseEvents();
      updateRecommendations();
      renderActiveSection();
      document.getElementById('workspaceTitle').value = state.title;
    }

    function renderNav() {
      const nav = document.getElementById('mainNav');
      nav.innerHTML = navItems.map(item => `
        <button data-section="${item.id}" class="w-full border border-zinc-800 rounded-xl px-3 py-2.5 flex items-center gap-2 text-left hover:border-cyan-500/40 ${state.activeSection === item.id ? 'active-nav' : ''}">
          <span>${item.icon}</span><span class="text-sm font-medium">${item.label}</span>
        </button>
      `).join('');

      nav.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          state.activeSection = btn.dataset.section;
          renderNav();
          renderActiveSection();
          closeSidebar();
          saveStateRaw();
        };
      });
    }

    function saveStateRaw(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function renderActiveSection() {
      document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
      document.getElementById(`section-${state.activeSection}`).classList.add('active');
      if (state.activeSection === 'dashboard') renderDashboard();
      if (state.activeSection === 'workspace') renderWorkspace();
      if (state.activeSection === 'ai') renderAI();
      if (state.activeSection === 'memory') renderMemory();
      if (state.activeSection === 'planning') renderPlanning();
      if (state.activeSection === 'settings') renderSettings();
    }

    function setupBaseEvents() {
      const titleInput = document.getElementById('workspaceTitle');
      titleInput.addEventListener('input', (e) => {
        state.title = e.target.value || 'Untitled Startup';
        state.settings.business.name = state.title;
        saveStateRaw();
      });
      document.getElementById('openSidebar').onclick = openSidebar;
      document.getElementById('closeSidebar').onclick = closeSidebar;
      document.getElementById('overlay').onclick = closeSidebar;
      document.getElementById('closeMemoryModal').onclick = () => document.getElementById('memoryModal').close();
    }

    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('overlay').classList.add('hidden');
    }

    function money(v){ return `${state.settings.preferences.currency} ${Number(v || 0).toLocaleString()}`; }

    function updateRecommendations() {
      const { income, expenses, runway } = state.dashboard.metrics;
      const score = state.dashboard.readinessScore;
      const rec = [];
      if (expenses > income) rec.push('Cut monthly burn by at least 15% to move cashflow positive.');
      if (runway < 6) rec.push('Runway below 6 months: prioritize fundraising pipeline this month.');
      if (score < 70) rec.push('Readiness below 70: tighten ICP, retention loops, and weekly KPI review.');
      if (!rec.length) rec.push('Healthy trajectory: focus on scalable channel experiments and hiring plan.');
      state.dashboard.recommendations = rec;
    }

    function renderDashboard() {
      const el = document.getElementById('section-dashboard');
      const d = state.dashboard;
      const pct = Math.max(0, Math.min(100, Number(d.readinessScore || 0)));
      el.innerHTML = `
        <div class="grid xl:grid-cols-4 sm:grid-cols-2 gap-4">
          ${['income','expenses','netSavings','runway'].map((k) => `
            <label class="bg-barya-card border border-zinc-800 rounded-xl p-4 block">
              <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">${k === 'netSavings' ? 'Net Savings' : k}</p>
              <input data-metric="${k}" type="number" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 outline-none focus:border-barya-accent" value="${d.metrics[k]}" />
              <p class="text-xs text-zinc-500 mt-2">${k === 'runway' ? 'months' : money(d.metrics[k])}</p>
            </label>
          `).join('')}
        </div>

        <div class="grid lg:grid-cols-3 gap-4">
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3"><h3 class="font-semibold">Startup Readiness</h3></div>
            <div class="flex items-center gap-5">
              <div class="ring-progress" style="--pct:${pct}%"><div><span class="text-2xl font-bold text-barya-accent">${pct}%</span></div></div>
              <div class="flex-1">
                <label class="text-xs text-zinc-400">Edit Score</label>
                <input id="readinessInput" type="range" min="0" max="100" value="${pct}" class="w-full accent-cyan-400" />
                <p class="text-xs text-zinc-500 mt-2">Driven by traction, retention, and financial consistency.</p>
              </div>
            </div>
          </div>

          <div class="lg:col-span-2 bg-barya-card border border-zinc-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-semibold">Revenue Growth Chart</h3>
              <button id="addGrowthPoint" class="text-sm px-3 py-1.5 rounded bg-cyan-500/20 text-cyan-300 border border-cyan-500/30">Add Month</button>
            </div>
            <canvas id="growthChart" height="100"></canvas>
          </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-4">
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-semibold">Recent Activity</h3>
            </div>
            <form id="activityForm" class="flex gap-2 mb-3">
              <input id="activityInput" placeholder="Add activity" class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
              <button class="px-3 py-2 rounded bg-cyan-500/20 border border-cyan-500/30 text-cyan-300">Add</button>
            </form>
            <ul class="space-y-2 max-h-56 overflow-auto scrollbar-thin">
              ${d.activities.map((a,i)=>`<li class="flex justify-between items-center bg-zinc-900 border border-zinc-800 rounded p-2 text-sm"><span>${escapeHTML(a)}</span><button data-del-activity="${i}" class="text-red-400">Delete</button></li>`).join('') || '<li class="text-zinc-500 text-sm">No activity yet.</li>'}
            </ul>
          </div>

          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4">
            <h3 class="font-semibold mb-3">Recommendations</h3>
            <ul class="space-y-2 text-sm">
              ${d.recommendations.map(r => `<li class="bg-zinc-900 border border-zinc-800 rounded p-2">${escapeHTML(r)}</li>`).join('')}
            </ul>
          </div>
        </div>

        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 flex flex-wrap gap-2">
          <button id="exportDashboard" class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700">Export Dashboard</button>
          <label class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700 cursor-pointer">Import Dashboard<input id="importDashboard" type="file" accept="application/json" class="hidden"></label>
        </div>
      `;

      el.querySelectorAll('[data-metric]').forEach(input => {
        input.oninput = () => {
          state.dashboard.metrics[input.dataset.metric] = Number(input.value || 0);
          if (input.dataset.metric !== 'runway') {
            state.dashboard.metrics.netSavings = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
          }
          saveState();
        };
      });
      document.getElementById('readinessInput').oninput = (e) => { state.dashboard.readinessScore = Number(e.target.value); saveState(); };
      document.getElementById('addGrowthPoint').onclick = () => { state.dashboard.growth.push((state.dashboard.growth.at(-1) || 0) + Math.ceil(Math.random() * 8)); saveState(); };
      document.getElementById('activityForm').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('activityInput');
        if (!input.value.trim()) return;
        state.dashboard.activities.unshift(input.value.trim());
        input.value = '';
        saveState();
      };
      el.querySelectorAll('[data-del-activity]').forEach(btn => btn.onclick = () => { state.dashboard.activities.splice(Number(btn.dataset.delActivity), 1); saveState(); });
      document.getElementById('exportDashboard').onclick = () => downloadJSON('dashboard-data.json', state.dashboard);
      document.getElementById('importDashboard').onchange = (e) => importJSONFile(e.target.files[0], (data) => { state.dashboard = deepMerge(structuredClone(defaultState.dashboard), data); saveState(); });

      renderGrowthChart();
    }

    function renderGrowthChart() {
      const ctx = document.getElementById('growthChart');
      if (!ctx) return;
      if (growthChart) growthChart.destroy();
      growthChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: state.dashboard.growth.map((_, i) => `M${i+1}`),
          datasets: [{
            label: 'Revenue (k)',
            data: state.dashboard.growth,
            borderColor: '#00d4ff',
            backgroundColor: 'rgba(0, 212, 255, 0.18)',
            fill: true,
            tension: 0.35,
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#d4d4d8' } } },
          scales: {
            x: { ticks: { color: '#a1a1aa' }, grid: { color: '#262626' } },
            y: { ticks: { color: '#a1a1aa' }, grid: { color: '#262626' } }
          }
        }
      });
    }


    const workspaceTemplates = {
      startupOnePager: {
        label: 'Startup One-Pager',
        blocks: [
          { type: 'h1', text: 'Startup One-Pager' },
          { type: 'h2', text: 'Problem' },
          { type: 'paragraph', text: 'What urgent pain are you solving?' },
          { type: 'h2', text: 'Solution' },
          { type: 'paragraph', text: 'Describe your core product in plain language.' },
          { type: 'bullet', text: 'Target user segment' },
          { type: 'bullet', text: 'Unique value proposition' },
          { type: 'numbered', text: 'Top KPI this month' }
        ]
      },
      weeklyReview: {
        label: 'Weekly Review',
        blocks: [
          { type: 'h1', text: 'Weekly Review' },
          { type: 'h2', text: 'Wins' },
          { type: 'bullet', text: 'Major progress achieved' },
          { type: 'h2', text: 'Challenges' },
          { type: 'bullet', text: 'Main blocker this week' },
          { type: 'h2', text: 'Next Week Plan' },
          { type: 'todo', text: 'One critical priority', checked: false }
        ]
      },
      businessPlan: {
        label: 'Business Plan',
        blocks: [
          { type: 'h1', text: 'Business Plan' },
          { type: 'h2', text: 'Market Opportunity' },
          { type: 'paragraph', text: 'Total market, segment, and why now.' },
          { type: 'h2', text: 'Go-To-Market' },
          { type: 'numbered', text: 'Acquisition channel 1' },
          { type: 'numbered', text: 'Acquisition channel 2' },
          { type: 'h3', text: 'Financial Targets' },
          { type: 'paragraph', text: 'Revenue, burn, and runway goals.' }
        ]
      },
      customerInterview: {
        label: 'Customer Interview Notes',
        blocks: [
          { type: 'h1', text: 'Customer Interview Notes' },
          { type: 'h2', text: 'Participant Details' },
          { type: 'paragraph', text: 'Role, company, and context.' },
          { type: 'h2', text: 'Pain Points' },
          { type: 'bullet', text: 'Pain point #1' },
          { type: 'bullet', text: 'Pain point #2' },
          { type: 'h2', text: 'Quotes' },
          { type: 'paragraph', text: 'Most important direct quote.' }
        ]
      },
      ideaValidation: {
        label: 'Idea Validation Tracker',
        blocks: [
          { type: 'h1', text: 'Idea Validation Tracker' },
          { type: 'h2', text: 'Hypothesis' },
          { type: 'paragraph', text: 'If we build X for Y, then Z outcome should happen.' },
          { type: 'h2', text: 'Experiments' },
          { type: 'todo', text: 'Launch test landing page', checked: false },
          { type: 'todo', text: 'Run 5 discovery calls', checked: false },
          { type: 'h3', text: 'Decision' },
          { type: 'paragraph', text: 'Continue, iterate, or stop.' }
        ]
      }
    };

    function ensureWorkspaceState() {
      if (!Array.isArray(state.workspace.pages)) state.workspace.pages = [];
      if (!Array.isArray(state.workspace.databases)) state.workspace.databases = [];
      if (!state.workspace.activePageId && state.workspace.pages[0]) state.workspace.activePageId = state.workspace.pages[0].id;
      if (!state.workspace.activeDatabaseId && state.workspace.databases[0]) state.workspace.activeDatabaseId = state.workspace.databases[0].id;
    }

    function getActiveWorkspacePage() {
      ensureWorkspaceState();
      return state.workspace.pages.find(p => p.id === state.workspace.activePageId) || null;
    }

    function blockTypeLabel(type) {
      return ({ h1: 'Heading 1', h2: 'Heading 2', h3: 'Heading 3', paragraph: 'Paragraph', todo: 'To-do', bullet: 'Bullet', numbered: 'Numbered' })[type] || 'Paragraph';
    }

    function pagePreview(page) {
      const first = page.blocks.find(b => (b.text || '').trim());
      return first ? first.text.slice(0, 80) : 'Empty page';
    }

    function createWorkspacePage(title='Untitled Page', blocks=null) {
      const page = {
        id: crypto.randomUUID(),
        title,
        updatedAt: new Date().toISOString(),
        blocks: (blocks || [{ id: crypto.randomUUID(), type: 'paragraph', text: '' }]).map(b => ({ id: crypto.randomUUID(), type: b.type || 'paragraph', text: b.text || '', checked: !!b.checked }))
      };
      state.workspace.pages.unshift(page);
      state.workspace.activePageId = page.id;
      saveState();
    }

    function createWorkspaceDatabase() {
      const db = {
        id: crypto.randomUUID(),
        name: `Database ${state.workspace.databases.length + 1}`,
        rows: []
      };
      state.workspace.databases.unshift(db);
      state.workspace.activeDatabaseId = db.id;
      saveState();
    }

    function renderWorkspace() {
      ensureWorkspaceState();
      const el = document.getElementById('section-workspace');
      const activePage = getActiveWorkspacePage();
      const activeDb = state.workspace.databases.find(d => d.id === state.workspace.activeDatabaseId) || null;

      el.innerHTML = `
        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 sm:p-5 space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <h2 class="text-xl font-semibold text-barya-accent">Flexible Workspace</h2>
            <div class="flex flex-wrap gap-2">
              <button id="workspaceTemplatesBtn" class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/40">Ready Templates</button>
              <button id="workspaceNewDatabase" class="px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/40">New Database</button>
              <button id="workspaceNewPage" class="px-4 py-2 rounded-lg bg-cyan-500/20 text-cyan-300 border border-cyan-500/40 text-base font-semibold">New Page</button>
            </div>
          </div>

          <div id="workspaceTemplates" class="hidden grid sm:grid-cols-2 xl:grid-cols-3 gap-3">

    function aiStructuredResponse(q) {
      const lower = q.toLowerCase();
      const cash = state.dashboard.metrics.income - state.dashboard.metrics.expenses;
      const runway = state.dashboard.metrics.runway;
      let answer = 'Focus on one bottleneck and measure weekly outcomes.';
      if (lower.includes('runway')) answer = `Current net cashflow is ${money(cash)}; extend runway by reducing burn and improving collections.`;
      if (lower.includes('growth') || lower.includes('revenue')) answer = 'Scale one reliable channel and tighten conversion handoff.';
      if (lower.includes('hiring')) answer = 'Delay non-critical hires and prioritize revenue-linked roles.';
      return {
        answer,
        why: 'A focused operating rhythm increases execution speed and reduces decision noise.',
        steps: ['Set one 2-week objective', 'Define 2 leading indicators', 'Review every Friday with owners'],
        tip: 'Document assumptions before each experiment.',
        next: 'Want a tailored 30-day sprint? Ask with your current constraints.'
      };
    }

    function renderAI() {
      const el = document.getElementById('section-ai');
      el.innerHTML = `
        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4">
          <div class="flex flex-wrap gap-2 mb-4">
            ${['Improve runway', 'Fix churn', 'Plan GTM sprint', 'Investor update outline'].map(q => `<button data-quick="${q}" class="px-3 py-1.5 text-sm rounded border border-zinc-700 bg-zinc-900 hover:border-cyan-500/40">${q}</button>`).join('')}
          </div>
          <div id="chatBox" class="space-y-3 max-h-[55vh] overflow-auto scrollbar-thin pr-1 mb-4"></div>
          <form id="chatForm" class="flex gap-2">
            <input id="chatInput" placeholder="Ask Barya AI..." class="flex-1 bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
            <button class="px-4 py-2 rounded bg-cyan-500/20 text-cyan-300 border border-cyan-500/30">Send</button>
          </form>
          <div class="flex flex-wrap gap-2 mt-4">
            <button id="exportChat" class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700">Export Chat</button>
            <label class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700 cursor-pointer">Import Chat<input id="importChat" type="file" accept="application/json" class="hidden"></label>
          </div>
        </div>
      `;

      function appendMessage(item) {
        const box = document.getElementById('chatBox');
        const wrap = document.createElement('div');
        if (item.role === 'user') {
          wrap.innerHTML = `<div class="ml-auto max-w-2xl bg-cyan-500/15 border border-cyan-500/25 rounded-xl p-3"><p>${escapeHTML(item.message)}</p></div>`;
        } else {
          wrap.innerHTML = `
            <div class="max-w-3xl bg-zinc-900 border border-zinc-800 rounded-xl p-3 space-y-2">
              <p class="text-xs uppercase tracking-wide text-barya-accent">Clear Answer</p><p>${escapeHTML(item.structured.answer)}</p>
              <p class="text-xs uppercase tracking-wide text-barya-accent pt-2">Why It Matters</p><p>${escapeHTML(item.structured.why)}</p>
              <p class="text-xs uppercase tracking-wide text-barya-accent pt-2">Action Steps</p>
              <ul class="list-disc pl-5">${item.structured.steps.map(s=>`<li>${escapeHTML(s)}</li>`).join('')}</ul>
              <p class="text-xs uppercase tracking-wide text-barya-accent pt-2">Founder Tip</p><p>${escapeHTML(item.structured.tip)}</p>
              <p class="text-xs uppercase tracking-wide text-barya-accent pt-2">Next Move</p><p>${escapeHTML(item.structured.next)}</p>
            </div>`;
        }
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
      }

      state.ai.history.forEach(appendMessage);

      function sendQuestion(question){
        const q = question.trim();
        if (!q) return;
        const userMsg = { role: 'user', message: q, ts: new Date().toISOString() };
        const structured = aiStructuredResponse(q);
        const aiMsg = { role: 'assistant', message: structured.answer, structured, ts: new Date().toISOString() };
        state.ai.history.push(userMsg, aiMsg);
        saveStateRaw();
        renderAI();
      }

      document.getElementById('chatForm').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('chatInput');
        sendQuestion(input.value);
      };
      el.querySelectorAll('[data-quick]').forEach(btn => btn.onclick = () => sendQuestion(btn.dataset.quick));
      document.getElementById('exportChat').onclick = () => downloadJSON('chat-history.json', state.ai.history);
      document.getElementById('importChat').onchange = (e) => importJSONFile(e.target.files[0], (data) => { if (Array.isArray(data)) { state.ai.history = data; saveState(); } });
    }

    function renderMemory() {
      const el = document.getElementById('section-memory');
      const memory = state.memory || (state.memory = {});
      if (!Array.isArray(memory.insights)) memory.insights = [];
      if (!Array.isArray(memory.actions)) memory.actions = [];
      if (typeof memory.search !== 'string') memory.search = '';
      if (!memory.viewMode) memory.viewMode = 'list';
      if (!memory.leftTab) memory.leftTab = 'all';
      if (!memory.activeNoteId && memory.insights[0]) memory.activeNoteId = memory.insights[0].id;

      const normalizeTags = (input) => String(input || '')
        .split(',')
        .map(tag => tag.trim())
        .filter(Boolean)
        .filter((tag, idx, arr) => arr.findIndex(t => t.toLowerCase() === tag.toLowerCase()) === idx);
      memory.insights.forEach(note => {
        if (!note.id) note.id = crypto.randomUUID();
        if (!note.title) note.title = 'Untitled Note';
        if (typeof note.content !== 'string') note.content = String(note.content || '');
        if (!note.ts) note.ts = new Date().toISOString();
        if (!Array.isArray(note.tags)) note.tags = normalizeTags(note.tag || 'General');
        if (!note.tags.length) note.tags = ['General'];
        note.tag = note.tags.join(', ');
        if (typeof note.isDaily !== 'boolean') note.isDaily = /^\d{4}-\d{2}-\d{2}/.test(note.title);
      });

      const noteByTitle = new Map(memory.insights.map(note => [note.title.toLowerCase(), note]));
      const extractLinks = (content) => {
        const links = [];
        const regex = /\[\[([^\]]+)\]\]/g;
        let match;
        while ((match = regex.exec(content || '')) !== null) {
          const title = match[1].trim();
          if (title) links.push(title);
        }
        return [...new Set(links)];
      };

      memory.insights.forEach(note => {
        note.links = extractLinks(note.content)
          .map(title => noteByTitle.get(title.toLowerCase()))
          .filter(Boolean)
          .map(n => n.id);
      });

      const backlinksMap = {};
      memory.insights.forEach(note => {
        note.links.forEach(targetId => {
          if (!backlinksMap[targetId]) backlinksMap[targetId] = [];
          backlinksMap[targetId].push(note.id);
        });
      });

      let activeNote = memory.insights.find(n => n.id === memory.activeNoteId) || null;
      if (!activeNote && memory.insights.length) {
        activeNote = memory.insights[0];
        memory.activeNoteId = activeNote.id;
      }

      const q = memory.search.toLowerCase();
      const filteredNotes = memory.insights.filter(note => {
        const tags = (note.tags || []).join(' ');
        return `${note.title} ${note.content} ${tags}`.toLowerCase().includes(q);
      });
      const dailyNotes = filteredNotes.filter(note => note.isDaily);
      const allNotes = filteredNotes;
      const visibleNotes = memory.leftTab === 'daily' ? dailyNotes : allNotes;

      const dailyISO = new Date().toISOString().slice(0, 10);
      const graphNodes = filteredNotes.map((note, idx, arr) => {
        const cx = 300 + 220 * Math.cos((Math.PI * 2 * idx) / Math.max(1, arr.length));
        const cy = 210 + 160 * Math.sin((Math.PI * 2 * idx) / Math.max(1, arr.length));
        return { id: note.id, title: note.title, x: cx, y: cy, r: note.id === memory.activeNoteId ? 16 : 11 };
      });
      const nodeMap = new Map(graphNodes.map(n => [n.id, n]));

      el.innerHTML = `
        <section class="bg-gradient-to-br from-[#0e1118] via-[#0a0e14] to-[#080b10] border border-cyan-500/20 rounded-2xl shadow-neon overflow-hidden transition-all duration-300">
          <div class="grid xl:grid-cols-[250px_1fr] min-h-[72vh]">
            <aside class="border-r border-zinc-800/80 bg-[#0b0f16] p-4 space-y-4">
              <div>
                <p class="text-xs uppercase tracking-[0.22em] text-cyan-300/80 mb-2">Memory Vault</p>
                <h2 class="text-xl font-semibold text-barya-accent">Advanced Memory</h2>
                <p class="text-xs text-zinc-400 mt-1">Founder's second brain, local-first.</p>
              </div>

              <div class="space-y-2">
                <button data-memory-tab="daily" class="w-full text-left px-3 py-2 rounded-lg border transition ${memory.leftTab === 'daily' ? 'border-cyan-400/60 bg-cyan-400/10 text-cyan-200' : 'border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30'}">Daily Notes</button>
                <button data-memory-tab="all" class="w-full text-left px-3 py-2 rounded-lg border transition ${memory.leftTab === 'all' ? 'border-cyan-400/60 bg-cyan-400/10 text-cyan-200' : 'border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30'}">All Notes</button>
                <button id="memorySidebarGraph" class="w-full text-left px-3 py-2 rounded-lg border border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30">Graph</button>
              </div>

              <div class="space-y-2">
                <button id="newDailyNote" class="w-full px-3 py-2 rounded-lg bg-cyan-500/20 text-cyan-200 border border-cyan-500/40 hover:bg-cyan-500/30 transition">New Daily Note</button>
                <button id="newMemoryNote" class="w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/40 transition">New Note</button>
              </div>

              <div class="pt-2 border-t border-zinc-800 space-y-2">
                <button id="exportMemory" class="w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/30 text-sm">Export Full Memory (JSON)</button>
                <label class="block w-full px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-700 hover:border-cyan-500/30 text-sm text-center cursor-pointer">Import Memory<input id="importMemory" type="file" accept="application/json" class="hidden"></label>
                <button id="clearMemory" class="w-full px-3 py-2 rounded-lg bg-red-500/15 text-red-300 border border-red-500/30 hover:bg-red-500/25 text-sm">Clear All Memory</button>
              </div>
            </aside>

            <div class="p-4 sm:p-5 space-y-4">
              <div class="flex flex-wrap items-center gap-2 justify-between">
                <div class="flex items-center gap-2">
                  <input id="memorySearch" placeholder="Search title, content, tags..." value="${escapeAttr(memory.search)}" class="w-[min(420px,78vw)] bg-zinc-900/90 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:border-cyan-400 outline-none" />
                  <button id="memoryToggleView" class="px-3 py-2 rounded-lg border ${memory.viewMode === 'graph' ? 'bg-cyan-500/20 border-cyan-500/40 text-cyan-200' : 'bg-zinc-900 border-zinc-700'} text-sm">${memory.viewMode === 'graph' ? 'Switch to List' : 'Show Graph View'}</button>
                </div>
                <p class="text-xs text-zinc-400">${visibleNotes.length} visible · ${memory.insights.length} total notes</p>
              </div>

              <div class="grid xl:grid-cols-[300px_1fr] gap-4">
                <section class="bg-[#0f141e] border border-zinc-800 rounded-xl p-3 max-h-[62vh] overflow-auto scrollbar-thin">
                  <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">${memory.leftTab === 'daily' ? 'Daily Notes' : 'All Notes'}</p>
                  <div class="space-y-2">
                    ${visibleNotes.map(note => `
                      <button data-open-note="${note.id}" class="w-full text-left rounded-lg border p-2 transition ${note.id === memory.activeNoteId ? 'border-cyan-500/60 bg-cyan-500/10' : 'border-zinc-800 bg-zinc-900/70 hover:border-cyan-500/30'}">
                        <div class="flex items-center justify-between gap-2">
                          <p class="font-medium truncate">${escapeHTML(note.title)}</p>
                          ${note.isDaily ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-cyan-500/20 text-cyan-200">Daily</span>' : ''}
                        </div>
                        <p class="text-xs text-zinc-500 truncate mt-1">${escapeHTML((note.tags || []).join(', ') || 'General')}</p>
                      </button>
                    `).join('') || '<p class="text-sm text-zinc-500">No notes yet. Create one to get started.</p>'}
                  </div>
                </section>

                <section class="bg-[#0f141e] border border-zinc-800 rounded-xl p-4">
                  ${memory.viewMode === 'graph' ? `
                    <div class="space-y-3">
                      <h3 class="text-lg font-semibold text-cyan-200">Memory Graph</h3>
                      <p class="text-xs text-zinc-400">Click a node to open note. Links come from <span class="text-cyan-300">[[Note Title]]</span>.</p>
                      <canvas id="memoryGraphCanvas" width="620" height="420" class="w-full bg-[#0b111a] border border-zinc-800 rounded-lg"></canvas>
                    </div>
                  ` : activeNote ? `
                    <div class="space-y-3">
                      <div class="grid sm:grid-cols-2 gap-2">
                        <input id="noteTitle" value="${escapeAttr(activeNote.title)}" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 font-semibold" />
                        <input id="noteTags" value="${escapeAttr((activeNote.tags || []).join(', '))}" placeholder="Tags: strategy, growth" class="bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2" />
                      </div>
                      <textarea id="noteContent" rows="13" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-3 font-mono text-sm leading-6 focus:border-cyan-400 outline-none" placeholder="Use [[Note Title]] to link notes...">${escapeHTML(activeNote.content)}</textarea>
                      <div class="flex flex-wrap items-center gap-2 justify-between">
                        <p class="text-xs text-zinc-500">Auto-saved · Updated ${new Date(activeNote.ts).toLocaleString()}</p>
                        <button id="deleteActiveNote" class="px-3 py-2 rounded-lg bg-red-500/15 text-red-300 border border-red-500/30">Delete Note</button>
                      </div>

                      <div class="grid md:grid-cols-2 gap-3 pt-2 border-t border-zinc-800">
                        <div>
                          <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">Outgoing Links</p>
                          <div class="space-y-1 max-h-32 overflow-auto scrollbar-thin pr-1">
                            ${(activeNote.links || []).map(linkedId => {
                              const linked = memory.insights.find(n => n.id === linkedId);
                              return linked ? `<button data-open-note="${linked.id}" class="block text-left text-sm text-cyan-300 hover:text-cyan-200">→ ${escapeHTML(linked.title)}</button>` : '';
                            }).join('') || '<p class="text-sm text-zinc-500">No links yet.</p>'}
                          </div>
                        </div>
                        <div>
                          <p class="text-xs uppercase tracking-wide text-zinc-400 mb-2">Backlinks</p>
                          <div class="space-y-1 max-h-32 overflow-auto scrollbar-thin pr-1">
                            ${(backlinksMap[activeNote.id] || []).map(backId => {
                              const back = memory.insights.find(n => n.id === backId);
                              return back ? `<button data-open-note="${back.id}" class="block text-left text-sm text-emerald-300 hover:text-emerald-200">← ${escapeHTML(back.title)}</button>` : '';
                            }).join('') || '<p class="text-sm text-zinc-500">No backlinks yet.</p>'}
                          </div>
                        </div>
                      </div>
                    </div>
                  ` : '<p class="text-zinc-500">Create your first note to start building your memory graph.</p>'}
                </section>
              </div>

              <section class="bg-[#0f141e] border border-zinc-800 rounded-xl p-4">
                <h3 class="font-semibold mb-3">Recent Actions</h3>
                <form id="actionForm" class="grid md:grid-cols-[1fr_140px_170px_auto] gap-2 mb-3">
                  <input id="actionText" placeholder="Action (e.g. Follow up with investor)" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2" />
                  <select id="actionCategory" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2">
                    <option>Product</option><option>Customer</option><option>Finance</option><option>Ops</option>
                  </select>
                  <select id="actionLink" class="bg-zinc-900 border border-zinc-700 rounded px-3 py-2">
                    <option value="">Link to note/page</option>
                    ${memory.insights.slice(0, 30).map(note => `<option value="note:${note.id}">🧠 ${escapeHTML(note.title)}</option>`).join('')}
                    ${(state.workspace?.pages || []).slice(0, 20).map(page => `<option value="page:${page.id}">📄 ${escapeHTML(page.title)}</option>`).join('')}
                  </select>
                  <button class="px-3 py-2 rounded bg-cyan-500/20 border border-cyan-500/30 text-cyan-300">Add Action</button>
                </form>
                <ul class="space-y-2 max-h-[28vh] overflow-auto scrollbar-thin pr-1">
                  ${memory.actions.map(action => {
                    const linked = (action.linkRef || '').split(':');
                    const kind = linked[0];
                    const id = linked[1];
                    const linkedLabel = kind === 'note'
                      ? (memory.insights.find(n => n.id === id)?.title || 'Missing note')
                      : kind === 'page'
                        ? ((state.workspace?.pages || []).find(p => p.id === id)?.title || 'Missing page')
                        : '';
                    return `
                      <li class="bg-zinc-900 border border-zinc-800 rounded p-2 text-sm flex justify-between gap-3">
                        <div>
                          <p>${escapeHTML(action.text)} <span class="text-zinc-500">(${escapeHTML(action.category)})</span></p>
                          ${linkedLabel ? `<button data-jump="${escapeAttr(action.linkRef)}" class="text-xs text-cyan-300 hover:text-cyan-200">Linked: ${escapeHTML(linkedLabel)}</button>` : '<p class="text-xs text-zinc-500">Not linked</p>'}
                        </div>
                        <button data-del-action="${action.id}" class="text-red-400 text-xs">Delete</button>
                      </li>
                    `;
                  }).join('') || '<li class="text-zinc-500 text-sm">No actions yet.</li>'}
                </ul>
              </section>
            </div>
          </div>
        </section>
      `;

      const openNote = (noteId) => {
        memory.activeNoteId = noteId;
        memory.viewMode = 'list';
        saveState();
      };

      el.querySelectorAll('[data-memory-tab]').forEach(btn => {
        btn.onclick = () => {
          memory.leftTab = btn.dataset.memoryTab;
          saveState();
        };
      });

      document.getElementById('memorySidebarGraph').onclick = () => {
        memory.viewMode = 'graph';
        saveState();
      };

      document.getElementById('memoryToggleView').onclick = () => {
        memory.viewMode = memory.viewMode === 'graph' ? 'list' : 'graph';
        saveState();
      };

      document.getElementById('memorySearch').oninput = (e) => {
        memory.search = e.target.value;
        saveState();
      };

      document.getElementById('newMemoryNote').onclick = () => {
        const note = {
          id: crypto.randomUUID(),
          title: `Note ${memory.insights.length + 1}`,
          content: '',
          tags: ['General'],
          tag: 'General',
          ts: new Date().toISOString(),
          isDaily: false,
          links: []
        };
        memory.insights.unshift(note);
        memory.activeNoteId = note.id;
        memory.leftTab = 'all';
        memory.viewMode = 'list';
        saveState();
      };

      document.getElementById('newDailyNote').onclick = () => {
        const existing = memory.insights.find(n => n.isDaily && n.title === dailyISO);
        if (existing) {
          memory.activeNoteId = existing.id;
          memory.leftTab = 'daily';
          memory.viewMode = 'list';
          saveState();
          return;
        }
        const note = {
          id: crypto.randomUUID(),
          title: dailyISO,
          content: `# Daily Note ${dailyISO}\n\n## Priorities\n- \n\n## Wins\n- `,
          tags: ['Daily', 'Journal'],
          tag: 'Daily, Journal',
          ts: new Date().toISOString(),
          isDaily: true,
          links: []
        };
        memory.insights.unshift(note);
        memory.activeNoteId = note.id;
        memory.leftTab = 'daily';
        memory.viewMode = 'list';
        saveState();
      };

      el.querySelectorAll('[data-open-note]').forEach(btn => {
        btn.onclick = () => openNote(btn.dataset.openNote);
      });

      if (activeNote && memory.viewMode !== 'graph') {
        document.getElementById('noteTitle').oninput = (e) => {
          activeNote.title = e.target.value.trim() || 'Untitled Note';
          activeNote.isDaily = /^\d{4}-\d{2}-\d{2}/.test(activeNote.title);
          activeNote.ts = new Date().toISOString();
          saveState();
        };
        document.getElementById('noteTags').oninput = (e) => {
          activeNote.tags = normalizeTags(e.target.value);
          if (!activeNote.tags.length) activeNote.tags = ['General'];
          activeNote.tag = activeNote.tags.join(', ');
          activeNote.ts = new Date().toISOString();
          saveState();
        };
        document.getElementById('noteContent').oninput = (e) => {
          activeNote.content = e.target.value;
          activeNote.ts = new Date().toISOString();
          saveState();
        };
        document.getElementById('deleteActiveNote').onclick = () => {
          memory.insights = memory.insights.filter(note => note.id !== activeNote.id);
          if (memory.activeNoteId === activeNote.id) memory.activeNoteId = memory.insights[0]?.id || null;
          memory.actions = memory.actions.filter(action => action.linkRef !== `note:${activeNote.id}`);
          saveState();
        };
      }

      if (memory.viewMode === 'graph') {
        const canvas = document.getElementById('memoryGraphCanvas');
        const ctx = canvas?.getContext('2d');
        if (ctx) {
          const draw = (hoverId = null) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0b111a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 1.3;
            filteredNotes.forEach(note => {
              const from = nodeMap.get(note.id);
              (note.links || []).forEach(targetId => {
                const to = nodeMap.get(targetId);
                if (!from || !to) return;
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.35)';
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
              });
            });

            graphNodes.forEach(node => {
              const isActive = node.id === memory.activeNoteId;
              const isHover = node.id === hoverId;
              ctx.beginPath();
              ctx.arc(node.x, node.y, isHover ? node.r + 3 : node.r, 0, Math.PI * 2);
              ctx.fillStyle = isActive ? '#00d4ff' : '#1e293b';
              ctx.fill();
              ctx.lineWidth = isActive ? 2 : 1;
              ctx.strokeStyle = isActive ? 'rgba(0, 212, 255, 0.8)' : 'rgba(148, 163, 184, 0.35)';
              ctx.stroke();

              ctx.fillStyle = isActive ? '#001018' : '#dbeafe';
              ctx.font = '12px sans-serif';
              ctx.fillText(node.title.slice(0, 18), node.x + 14, node.y + 4);
            });
          };

          const getNodeAt = (evt) => {
            const rect = canvas.getBoundingClientRect();
            const x = (evt.clientX - rect.left) * (canvas.width / rect.width);
            const y = (evt.clientY - rect.top) * (canvas.height / rect.height);
            return graphNodes.find(node => Math.hypot(node.x - x, node.y - y) <= node.r + 4) || null;
          };

          draw();
          canvas.onmousemove = (evt) => {
            const hit = getNodeAt(evt);
            canvas.style.cursor = hit ? 'pointer' : 'default';
            draw(hit?.id || null);
          };
          canvas.onclick = (evt) => {
            const hit = getNodeAt(evt);
            if (!hit) return;
            memory.activeNoteId = hit.id;
            memory.viewMode = 'list';
            saveState();
          };
        }
      }

      document.getElementById('actionForm').onsubmit = (e) => {
        e.preventDefault();
        const text = document.getElementById('actionText').value.trim();
        if (!text) return;
        const category = document.getElementById('actionCategory').value;
        const linkRef = document.getElementById('actionLink').value;
        memory.actions.unshift({
          id: crypto.randomUUID(),
          text,
          category,
          linkRef,
          ts: new Date().toISOString()
        });
        saveState();
      };

      el.querySelectorAll('[data-jump]').forEach(btn => {
        btn.onclick = () => {
          const [kind, id] = (btn.dataset.jump || '').split(':');
          if (kind === 'note' && id) {
            openNote(id);
          } else if (kind === 'page' && id) {
            state.activeSection = 'workspace';
            if (state.workspace) state.workspace.activePageId = id;
            renderNav();
            saveState();
          }
        };
      });

      el.querySelectorAll('[data-del-action]').forEach(btn => {
        btn.onclick = () => {
          memory.actions = memory.actions.filter(action => action.id !== btn.dataset.delAction);
          saveState();
        };
      });

      document.getElementById('exportMemory').onclick = () => {
        downloadJSON('memory-full-export.json', memory);
      };
      document.getElementById('importMemory').onchange = (e) => {
        importJSONFile(e.target.files[0], (data) => {
          if (!data || typeof data !== 'object') return;
          state.memory = deepMerge(structuredClone(defaultState.memory), data);
          if (!Array.isArray(state.memory.insights)) state.memory.insights = [];
          if (!Array.isArray(state.memory.actions)) state.memory.actions = [];
          saveState();
        });
      };
      document.getElementById('clearMemory').onclick = () => {
        if (!confirm('Clear all memory notes, links, and actions? This cannot be undone.')) return;
        state.memory = structuredClone(defaultState.memory);
        saveState();
      };
    }


    function renderPlanning() {
      const el = document.getElementById('section-planning');
      const guideProgress = state.planning.guides.map(g => {
        const done = g.done.filter(Boolean).length;
        return Math.round((done / g.done.length) * 100);
      });
      el.innerHTML = `
        <div class="grid lg:grid-cols-2 gap-4">
          ${state.planning.guides.map((g, gi) => `
            <div class="bg-barya-card border border-zinc-800 rounded-xl p-4">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-semibold">${escapeHTML(g.title)}</h3>
                <span class="text-xs text-cyan-300">${guideProgress[gi]}%</span>
              </div>
              <div class="space-y-2">
                ${g.tasks.map((t, ti) => `
                  <label class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded p-2 text-sm">
                    <input type="checkbox" data-guide="${gi}" data-task="${ti}" ${g.done[ti] ? 'checked' : ''} class="accent-cyan-400" />
                    <span>${escapeHTML(t)}</span>
                  </label>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-4">
          <h3 class="font-semibold">Business Plan Templates</h3>
          ${Object.entries(state.planning.templates).map(([k,v]) => `
            <label class="block">
              <p class="text-xs uppercase text-zinc-400 mb-1">${k.replace(/([A-Z])/g, ' $1')}</p>
              <textarea data-template="${k}" class="w-full h-24 bg-zinc-900 border border-zinc-700 rounded p-2">${escapeHTML(v)}</textarea>
            </label>
          `).join('')}
        </div>
      `;

      el.querySelectorAll('[data-guide]').forEach(cb => cb.onchange = () => {
        const gi = Number(cb.dataset.guide);
        const ti = Number(cb.dataset.task);
        state.planning.guides[gi].done[ti] = cb.checked;
        saveState();
      });
      el.querySelectorAll('[data-template]').forEach(t => t.oninput = () => {
        state.planning.templates[t.dataset.template] = t.value;
        saveStateRaw();
      });
    }

    function renderSettings() {
      const s = state.settings;
      const el = document.getElementById('section-settings');
      el.innerHTML = `
        <div class="grid lg:grid-cols-3 gap-4">
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-2">
            <h3 class="font-semibold mb-2">Founder Profile</h3>
            ${inputField('Founder Name','founder.name',s.founder.name)}
            ${inputField('Role','founder.role',s.founder.role)}
            ${inputField('Email','founder.email',s.founder.email,'email')}
          </div>
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-2">
            <h3 class="font-semibold mb-2">Business Profile</h3>
            ${inputField('Business Name','business.name',s.business.name)}
            ${inputField('Stage','business.stage',s.business.stage)}
            ${inputField('Industry','business.industry',s.business.industry)}
          </div>
          <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 space-y-2">
            <h3 class="font-semibold mb-2">Preferences</h3>
            <label class="block text-sm">Currency<select data-setting="preferences.currency" class="w-full mt-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-2"><option ${s.preferences.currency==='USD'?'selected':''}>USD</option><option ${s.preferences.currency==='INR'?'selected':''}>INR</option><option ${s.preferences.currency==='EUR'?'selected':''}>EUR</option></select></label>
            <label class="block text-sm">Language<select data-setting="preferences.language" class="w-full mt-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-2"><option ${s.preferences.language==='English'?'selected':''}>English</option><option ${s.preferences.language==='Hindi'?'selected':''}>Hindi</option><option ${s.preferences.language==='Spanish'?'selected':''}>Spanish</option></select></label>
            <label class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded px-3 py-2 mt-2"><span>Dark Mode</span><input type="checkbox" data-setting="preferences.darkMode" ${s.preferences.darkMode ? 'checked' : ''} class="accent-cyan-400" /></label>
          </div>
        </div>

        <div class="bg-barya-card border border-zinc-800 rounded-xl p-4 flex flex-wrap gap-2">
          <button id="exportAll" class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700">Export All Data</button>
          <label class="px-3 py-2 rounded bg-zinc-900 border border-zinc-700 cursor-pointer">Import All Data<input id="importAll" type="file" accept="application/json" class="hidden"></label>
          <button id="clearAll" class="px-3 py-2 rounded bg-red-500/20 border border-red-500/30 text-red-300">Clear All Data</button>
        </div>
      `;

      el.querySelectorAll('[data-setting]').forEach(input => {
        input.oninput = () => {
          const path = input.dataset.setting.split('.');
          let ref = state.settings;
          for (let i = 0; i < path.length - 1; i++) ref = ref[path[i]];
          ref[path.at(-1)] = input.type === 'checkbox' ? input.checked : input.value;
          if (input.dataset.setting === 'business.name') {
            state.title = input.value;
            document.getElementById('workspaceTitle').value = input.value;
          }
          document.documentElement.style.colorScheme = state.settings.preferences.darkMode ? 'dark' : 'light';
          saveState();
        };
      });
      document.getElementById('exportAll').onclick = () => downloadJSON('barya-all-data.json', state);
      document.getElementById('importAll').onchange = (e) => importJSONFile(e.target.files[0], (data) => { state = deepMerge(structuredClone(defaultState), data); saveState(); renderNav(); document.getElementById('workspaceTitle').value = state.title; });
      document.getElementById('clearAll').onclick = () => {
        if (!confirm('Clear all local data and reset workspace?')) return;
        localStorage.removeItem(STORAGE_KEY);
        state = structuredClone(defaultState);
        saveState();
        renderNav();
        document.getElementById('workspaceTitle').value = state.title;
      };
    }

    function inputField(label, settingPath, value, type='text') {
      return `<label class="block text-sm">${label}<input type="${type}" data-setting="${settingPath}" value="${escapeAttr(value)}" class="w-full mt-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-2" /></label>`;
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function importJSONFile(file, cb) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          cb(data);
        } catch {
          alert('Invalid JSON file.');
        }
      };
      reader.readAsText(file);
    }

    function escapeHTML(str='') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(str='') { return escapeHTML(str).replaceAll('`',''); }

    init();
  </script>
</body>
</html>
