<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barya Business AI Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="container">

    <!-- HEADER -->
    <header class="hero">
      <h1>Barya Business AI Assistant</h1>
      <p>Your smart finance and business assistant</p>
    </header>

    <!-- NAVIGATION -->
    <nav class="tabs">
      <button class="tab-button active" data-tab="dashboardTab">Dashboard</button>
      <button class="tab-button" data-tab="assistantTab">AI Assistant</button>
    </nav>

    <!-- DASHBOARD -->
    <section id="dashboardTab" class="tab-panel active">

      <!-- METRICS -->
      <section class="card">
        <h2>Dashboard</h2>
        <div class="dashboard-grid">
          <div class="metric">
            <h3>Total Income</h3>
            <p id="totalIncome">₹0.00</p>
          </div>
          <div class="metric">
            <h3>Total Expenses</h3>
            <p id="totalExpenses">₹0.00</p>
          </div>
          <div class="metric">
            <h3>Net Savings</h3>
            <p id="netSavings">₹0.00</p>
          </div>
        </div>
      </section>

      <!-- FORMS -->
      <section class="forms-grid">

        <div class="card">
          <h2>Save Monthly Income</h2>
          <form id="incomeForm">
            <input type="number" id="incomeAmount" placeholder="Enter income" required />
            <button type="submit">Save Income</button>
          </form>
        </div>

        <div class="card">
          <h2>Add Expense</h2>
          <form id="expenseForm">
            <input type="number" id="expenseAmount" placeholder="Amount" required />
            <input type="text" id="expenseCategory" placeholder="Category" required />
            <input type="date" id="expenseDate" required />
            <button type="submit">Add Expense</button>
          </form>
        </div>

      </section>

      <!-- OVERVIEW -->
      <section class="card">
        <h2>Monthly Overview</h2>
        <p id="monthlyOverview">Add data to see summary</p>
      </section>

    </section>

    <!-- AI ASSISTANT -->
    <section id="assistantTab" class="tab-panel">

      <div class="card">
        <h2>AI Assistant</h2>

        <form id="assistantForm">
          <input type="text" id="assistantQuestion" placeholder="Ask something..." required />
          <button type="submit">Ask AI</button>
        </form>

        <p id="assistantResponse">Ask a question to get help</p>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
