<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barya Business AI</title>
  <meta name="description" content="Barya Business AI - advanced local AI web app for business strategy without external AI APIs." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <style>
    :root { color-scheme: dark; }
    .glass { backdrop-filter: blur(8px); background: rgba(15, 23, 42, .65); }
    .fade-in { animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-6 space-y-5">
    <header class="glass border border-indigo-800/60 rounded-2xl p-4 shadow-2xl">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
          <h1 data-i18n="title" class="text-2xl md:text-3xl font-bold tracking-tight">Barya Business AI</h1>
          <p data-i18n="subtitle" class="text-slate-300">Advanced local-first business intelligence without external AI APIs.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <select id="languageSelect" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm"></select>
          <button id="logoutBtn" class="hidden px-3 py-2 rounded-lg bg-rose-600 hover:bg-rose-500 text-sm" data-i18n="logout">Logout</button>
        </div>
      </div>
      <nav id="tabs" class="grid grid-cols-2 md:grid-cols-5 gap-2 mt-4">
        <button data-tab="dashboard" class="tabBtn bg-indigo-600 rounded-lg px-3 py-2">Dashboard</button>
        <button data-tab="chat" class="tabBtn bg-slate-800 rounded-lg px-3 py-2">AI Chat</button>
        <button data-tab="workspace" class="tabBtn bg-slate-800 rounded-lg px-3 py-2">Workspace</button>
        <button data-tab="memory" class="tabBtn bg-slate-800 rounded-lg px-3 py-2">Memory</button>
        <button data-tab="profile" class="tabBtn bg-slate-800 rounded-lg px-3 py-2">Profile</button>
      </nav>
    </header>

    <section id="authSection" class="grid md:grid-cols-2 gap-4">
      <article class="glass rounded-2xl border border-indigo-800/40 p-5">
        <h2 class="text-xl font-semibold" data-i18n="register">Register</h2>
        <form id="registerForm" class="space-y-3 mt-3">
          <input id="regName" required placeholder="Name" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
          <input id="regEmail" type="email" required placeholder="Email" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
          <input id="regPassword" type="password" required placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
          <button class="w-full bg-indigo-600 hover:bg-indigo-500 rounded-lg py-2" data-i18n="register">Register</button>
        </form>
      </article>
      <article class="glass rounded-2xl border border-indigo-800/40 p-5">
        <h2 class="text-xl font-semibold" data-i18n="login">Login</h2>
        <form id="loginForm" class="space-y-3 mt-3">
          <input id="loginEmail" type="email" required placeholder="Email" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
          <input id="loginPassword" type="password" required placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
          <button class="w-full bg-emerald-600 hover:bg-emerald-500 rounded-lg py-2" data-i18n="login">Login</button>
        </form>
      </article>
    </section>

    <main id="appSection" class="hidden space-y-4">
      <section id="panel-dashboard" class="panel grid lg:grid-cols-3 gap-4">
        <article class="glass rounded-2xl border border-indigo-800/40 p-5 lg:col-span-2">
          <h2 class="font-semibold text-xl" data-i18n="dashboard">Dashboard</h2>
          <p class="text-slate-300 mt-2"><span data-i18n="loggedIn">Logged in</span>: <strong id="loggedInAs"></strong></p>
          <div id="dashboardSummary" class="mt-3 text-slate-300"></div>
          <div class="mt-4">
            <h3 class="font-semibold" data-i18n="recommendations">Recommendations</h3>
            <ul id="autoRecommendations" class="list-disc list-inside text-slate-300 mt-2 space-y-1"></ul>
          </div>
        </article>
        <article class="glass rounded-2xl border border-indigo-800/40 p-5">
          <h3 class="font-semibold text-lg" data-i18n="finance">Finance Intelligence</h3>
          <div class="space-y-3 mt-3">
            <input id="incomeInput" type="number" min="0" placeholder="Income" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
            <input id="expenseInput" type="number" min="0" placeholder="Expense" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2" />
            <button id="saveFinanceBtn" class="w-full rounded-lg bg-indigo-600 hover:bg-indigo-500 py-2" data-i18n="saveFinance">Save Finance</button>
            <p class="text-xl font-bold">Profit: <span id="profitOutput">0</span></p>
            <p id="financeInsight" class="text-slate-300 text-sm"></p>
          </div>
        </article>
      </section>

      <section id="panel-chat" class="panel hidden">
        <article class="glass rounded-2xl border border-indigo-800/40 p-4">
          <div class="flex justify-between items-center gap-3 flex-wrap">
            <h2 class="font-semibold text-xl" data-i18n="chat">AI Chat</h2>
            <div class="flex gap-2">
              <button id="voiceInputBtn" class="px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-sm" data-i18n="voiceInput">Voice input</button>
              <button id="clearChatBtn" class="px-3 py-2 rounded-lg bg-rose-600 hover:bg-rose-500 text-sm" data-i18n="clearChat">Clear</button>
            </div>
          </div>
          <div id="chatBox" class="mt-3 h-[420px] overflow-y-auto bg-slate-950/80 border border-slate-800 rounded-xl p-3 space-y-2"></div>
          <form id="chatForm" class="mt-3 flex gap-2">
            <input id="chatInput" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-3" placeholder="Ask anything about your business..." />
            <button class="bg-emerald-600 hover:bg-emerald-500 rounded-lg px-4" data-i18n="send">Send</button>
          </form>
        </article>
      </section>

      <section id="panel-workspace" class="panel hidden grid lg:grid-cols-2 gap-4">
        <article class="glass rounded-2xl border border-indigo-800/40 p-5">
          <h2 class="font-semibold text-xl" data-i18n="fileIntelligence">File Intelligence</h2>
          <input id="fileInput" type="file" accept=".txt,.csv,.json,.pdf" class="mt-3 w-full" />
          <p id="fileStatus" class="text-slate-300 text-sm mt-2"></p>
          <textarea id="filePreview" class="w-full mt-3 min-h-56 bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm"></textarea>
          <p id="fileSummary" class="text-slate-300 text-sm mt-2"></p>
        </article>
        <article class="glass rounded-2xl border border-indigo-800/40 p-5">
          <h2 class="font-semibold text-xl" data-i18n="imageContext">Image Context</h2>
          <input id="imageInput" type="file" accept="image/*" class="mt-3 w-full" />
          <input id="imageNoteInput" placeholder="Add branding/product note" class="w-full mt-3 bg-slate-900 border border-slate-700 rounded-lg p-2" />
          <button id="saveImageNoteBtn" class="mt-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 px-3 py-2" data-i18n="saveImageNote">Save image context</button>
          <p id="imageStatus" class="text-slate-300 text-sm mt-2"></p>
          <img id="imagePreview" class="hidden mt-3 max-h-72 rounded-lg border border-slate-700" alt="preview" />
        </article>
      </section>

      <section id="panel-memory" class="panel hidden">
        <article class="glass rounded-2xl border border-indigo-800/40 p-5">
          <h2 class="font-semibold text-xl" data-i18n="memory">Memory</h2>
          <form id="memoryForm" class="mt-3 grid md:grid-cols-5 gap-2">
            <input id="memoryType" placeholder="Type (preference/business/audience)" class="md:col-span-2 bg-slate-900 border border-slate-700 rounded-lg p-2" />
            <input id="memoryInput" placeholder="Memory note" class="md:col-span-2 bg-slate-900 border border-slate-700 rounded-lg p-2" />
            <button class="bg-indigo-600 hover:bg-indigo-500 rounded-lg" data-i18n="save">Save</button>
          </form>
          <ul id="memoryList" class="mt-3 space-y-2"></ul>
          <div class="mt-4">
            <h3 class="font-semibold" data-i18n="adaptiveLearning">Adaptive Learning FAQ</h3>
            <ul id="faqList" class="list-disc list-inside text-slate-300 text-sm mt-2"></ul>
          </div>
        </article>
      </section>

      <section id="panel-profile" class="panel hidden">
        <article class="glass rounded-2xl border border-indigo-800/40 p-5">
          <h2 class="font-semibold text-xl" data-i18n="profile">Profile</h2>
          <form id="profileForm" class="mt-3 grid md:grid-cols-2 gap-3">
            <input id="businessTypeInput" placeholder="Business type" class="bg-slate-900 border border-slate-700 rounded-lg p-2" />
            <input id="audienceInput" placeholder="Target audience" class="bg-slate-900 border border-slate-700 rounded-lg p-2" />
            <input id="preferenceInput" placeholder="Communication preference" class="bg-slate-900 border border-slate-700 rounded-lg p-2 md:col-span-2" />
            <button class="bg-emerald-600 hover:bg-emerald-500 rounded-lg py-2" data-i18n="saveProfile">Save profile</button>
          </form>
        </article>
      </section>
    </main>
  </div>

  <script>
    // ===========================
    // App Data & Storage Helpers
    // ===========================
    const KEYS = {
      users: 'barya_users_v2',
      currentUser: 'barya_current_user_v2',
      profiles: 'barya_profiles_v2',
      chats: 'barya_chats_v2',
      memories: 'barya_memories_v2',
      workspace: 'barya_workspace_v2',
      finance: 'barya_finance_v2',
      faq: 'barya_faq_v2',
      language: 'barya_lang_v2'
    };

    const LANGS = ['en','hi','es','fr','ar','ko','ja'];
    const LANGUAGE_META = {
      en: { name: 'English', speech: 'en-US' }, hi: { name: 'हिन्दी', speech: 'hi-IN' },
      es: { name: 'Español', speech: 'es-ES' }, fr: { name: 'Français', speech: 'fr-FR' },
      ar: { name: 'العربية', speech: 'ar-SA' }, ko: { name: '한국어', speech: 'ko-KR' }, ja: { name: '日本語', speech: 'ja-JP' }
    };

    const I18N = {
      en: { title:'Barya Business AI', subtitle:'Advanced local-first business intelligence without external AI APIs.', dashboard:'Dashboard', chat:'AI Chat', memory:'Memory', profile:'Profile', login:'Login', register:'Register', logout:'Logout', send:'Send', recommendations:'Recommendations', loggedIn:'Logged in', voiceInput:'Voice input', clearChat:'Clear', save:'Save', finance:'Finance Intelligence', saveFinance:'Save Finance', fileIntelligence:'File Intelligence', imageContext:'Image Context', saveImageNote:'Save image context', saveProfile:'Save profile', adaptiveLearning:'Adaptive Learning FAQ' },
      hi: { title:'बार्या बिज़नेस एआई', subtitle:'बिना बाहरी AI API के लोकल बिज़नेस इंटेलिजेंस।', dashboard:'डैशबोर्ड', chat:'एआई चैट', memory:'मेमोरी', profile:'प्रोफ़ाइल', login:'लॉगिन', register:'रजिस्टर', logout:'लॉगआउट', send:'भेजें', recommendations:'सुझाव', loggedIn:'लॉगिन', voiceInput:'वॉइस', clearChat:'साफ़', save:'सेव', finance:'फाइनेंस', saveFinance:'फाइनेंस सेव', fileIntelligence:'फ़ाइल इंटेलिजेंस', imageContext:'इमेज संदर्भ', saveImageNote:'इमेज सेव', saveProfile:'प्रोफ़ाइल सेव', adaptiveLearning:'एडैप्टिव FAQ' },
      es: { title:'Barya Business AI', subtitle:'Inteligencia empresarial local sin APIs de IA externas.', dashboard:'Panel', chat:'Chat IA', memory:'Memoria', profile:'Perfil', login:'Entrar', register:'Registro', logout:'Salir', send:'Enviar', recommendations:'Recomendaciones', loggedIn:'Sesión', voiceInput:'Voz', clearChat:'Limpiar', save:'Guardar', finance:'Finanzas', saveFinance:'Guardar finanzas', fileIntelligence:'Inteligencia de archivo', imageContext:'Contexto de imagen', saveImageNote:'Guardar contexto', saveProfile:'Guardar perfil', adaptiveLearning:'FAQ Adaptativo' },
      fr: { title:'Barya Business AI', subtitle:'Intelligence métier locale sans API IA externe.', dashboard:'Tableau de bord', chat:'Chat IA', memory:'Mémoire', profile:'Profil', login:'Connexion', register:'Créer compte', logout:'Déconnexion', send:'Envoyer', recommendations:'Recommandations', loggedIn:'Connecté', voiceInput:'Voix', clearChat:'Effacer', save:'Enregistrer', finance:'Finance', saveFinance:'Enregistrer finance', fileIntelligence:'Fichiers intelligents', imageContext:'Contexte image', saveImageNote:'Enregistrer image', saveProfile:'Enregistrer profil', adaptiveLearning:'FAQ Adaptative' },
      ar: { title:'باريا بزنس AI', subtitle:'ذكاء أعمال محلي بدون واجهات AI خارجية.', dashboard:'لوحة التحكم', chat:'المحادثة', memory:'الذاكرة', profile:'الملف', login:'دخول', register:'تسجيل', logout:'خروج', send:'إرسال', recommendations:'التوصيات', loggedIn:'المستخدم', voiceInput:'صوت', clearChat:'مسح', save:'حفظ', finance:'المالية', saveFinance:'حفظ المالية', fileIntelligence:'ذكاء الملفات', imageContext:'سياق الصورة', saveImageNote:'حفظ السياق', saveProfile:'حفظ الملف', adaptiveLearning:'الأسئلة المتكررة' },
      ko: { title:'바르야 비즈니스 AI', subtitle:'외부 AI API 없이 로컬 비즈니스 인텔리전스.', dashboard:'대시보드', chat:'AI 채팅', memory:'메모리', profile:'프로필', login:'로그인', register:'가입', logout:'로그아웃', send:'보내기', recommendations:'추천', loggedIn:'사용자', voiceInput:'음성', clearChat:'지우기', save:'저장', finance:'재무', saveFinance:'재무 저장', fileIntelligence:'파일 인텔리전스', imageContext:'이미지 컨텍스트', saveImageNote:'이미지 저장', saveProfile:'프로필 저장', adaptiveLearning:'적응형 FAQ' },
      ja: { title:'Barya ビジネスAI', subtitle:'外部AI APIなしのローカルビジネス支援。', dashboard:'ダッシュボード', chat:'AIチャット', memory:'メモリ', profile:'プロフィール', login:'ログイン', register:'登録', logout:'ログアウト', send:'送信', recommendations:'提案', loggedIn:'ログイン中', voiceInput:'音声', clearChat:'クリア', save:'保存', finance:'財務', saveFinance:'財務保存', fileIntelligence:'ファイル分析', imageContext:'画像コンテキスト', saveImageNote:'画像保存', saveProfile:'プロフィール保存', adaptiveLearning:'学習FAQ' }
    };

    const state = {
      language: localStorage.getItem(KEYS.language) || 'en',
      currentUser: JSON.parse(localStorage.getItem(KEYS.currentUser) || 'null'),
      users: JSON.parse(localStorage.getItem(KEYS.users) || '[]'),
      profiles: JSON.parse(localStorage.getItem(KEYS.profiles) || '{}'),
      chats: JSON.parse(localStorage.getItem(KEYS.chats) || '{}'),
      memories: JSON.parse(localStorage.getItem(KEYS.memories) || '{}'),
      workspace: JSON.parse(localStorage.getItem(KEYS.workspace) || '{}'),
      finance: JSON.parse(localStorage.getItem(KEYS.finance) || '{}'),
      faq: JSON.parse(localStorage.getItem(KEYS.faq) || '{}')
    };

    const $ = (id) => document.getElementById(id);
    const uid = () => state.currentUser?.email || 'guest';
    const getBucket = (store, fallback) => { if (!store[uid()]) store[uid()] = fallback; return store[uid()]; };

    function persist() {
      localStorage.setItem(KEYS.language, state.language);
      localStorage.setItem(KEYS.currentUser, JSON.stringify(state.currentUser));
      localStorage.setItem(KEYS.users, JSON.stringify(state.users));
      localStorage.setItem(KEYS.profiles, JSON.stringify(state.profiles));
      localStorage.setItem(KEYS.chats, JSON.stringify(state.chats));
      localStorage.setItem(KEYS.memories, JSON.stringify(state.memories));
      localStorage.setItem(KEYS.workspace, JSON.stringify(state.workspace));
      localStorage.setItem(KEYS.finance, JSON.stringify(state.finance));
      localStorage.setItem(KEYS.faq, JSON.stringify(state.faq));
    }

    function t(key) { return I18N[state.language]?.[key] || I18N.en[key] || key; }

    // ========================
    // Knowledge Engine (JSON)
    // ========================
    const knowledgeBase = {
      startup: ['Validate problem-solution fit using 20 interviews.', 'Build MVP with one core value proposition.', 'Track weekly activation and retention metrics.'],
      pricing: ['Use value-based anchoring with 3 tiers.', 'Offer annual discount to improve cash flow.', 'Test willingness-to-pay using pilots.'],
      marketing: ['Use one primary channel before expanding.', 'Map content funnel: awareness > trust > conversion.', 'Create weekly experiment backlog with KPI per test.'],
      finance: ['Keep runway > 6 months.', 'Cap fixed costs early.', 'Review unit economics monthly.'],
      branding: ['Define brand promise in one sentence.', 'Align tone, visuals, and audience pain points.', 'Use consistent narrative across channels.'],
      customerSupport: ['Set response-time SLA.', 'Create issue taxonomy and knowledge articles.', 'Measure CSAT + first-contact resolution.'],
      growthStrategy: ['Run hypothesis-driven growth loops.', 'Improve retention before heavy acquisition.', 'Build referral trigger moments in product.']
    };

    // =====================================
    // Intent Detection Engine (multi-intent)
    // =====================================
    const intentLexicon = {
      startup: ['startup','mvp','launch','idea','founder','product market fit'],
      pricing: ['price','pricing','discount','plan','subscription','revenue model'],
      marketing: ['marketing','ads','seo','content','campaign','social media'],
      finance: ['finance','budget','income','expense','profit','cash flow','runway'],
      branding: ['brand','branding','positioning','name','logo','identity'],
      customerSupport: ['support','customer service','complaint','retention','ticket'],
      growthStrategy: ['growth','scale','expand','strategy','acquisition','retention']
    };

    function detectIntents(input) {
      const text = input.toLowerCase();
      const scores = Object.entries(intentLexicon).map(([intent, keywords]) => {
        let score = 0;
        for (const k of keywords) {
          if (text.includes(k)) score += k.includes(' ') ? 2 : 1;
          const regex = new RegExp(`\\b${k.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&')}\\b`, 'g');
          score += (text.match(regex) || []).length;
        }
        return { intent, score };
      });
      const top = scores.filter(s => s.score > 0).sort((a,b)=>b.score-a.score);
      return top.length ? top : [{ intent: 'growthStrategy', score: 1 }];
    }

    // ===========================
    // Memory Engine + Similarity
    // ===========================
    function tokenize(s='') { return s.toLowerCase().split(/[^a-z0-9\u00C0-\u017F\u0600-\u06FF\u0900-\u097F\u3040-\u30ff\u4e00-\u9fff\uac00-\ud7af]+/).filter(Boolean); }
    function jaccard(a,b) {
      const A = new Set(tokenize(a));
      const B = new Set(tokenize(b));
      const inter = [...A].filter(v=>B.has(v)).length;
      const uni = new Set([...A,...B]).size || 1;
      return inter/uni;
    }
    function getRelevantMemory(query) {
      const mems = getBucket(state.memories, []);
      return mems
        .map(m => ({ ...m, sim: jaccard(query, `${m.type} ${m.text}`) }))
        .sort((a,b)=>b.sim-a.sim)
        .slice(0,3);
    }

    // ============================================
    // Context Engine (input + memory + uploads ...)
    // ============================================
    function buildContext(userInput) {
      const profile = getBucket(state.profiles, { businessType:'', audience:'', preference:'' });
      const workspace = getBucket(state.workspace, { fileName:'', fileText:'', fileSummary:'', imageName:'', imageNote:'' });
      const finance = getBucket(state.finance, { income:0, expense:0 });
      const relevantMemory = getRelevantMemory(userInput);
      return {
        userInput,
        profile,
        relevantMemory,
        uploadedFile: { name: workspace.fileName, text: workspace.fileText, summary: workspace.fileSummary },
        uploadedImage: { name: workspace.imageName, note: workspace.imageNote },
        financialData: { ...finance, profit: Number(finance.income) - Number(finance.expense) }
      };
    }

    // ========================================
    // Recommendation + Adaptive Learning Engine
    // ========================================
    function updateFaq(input) {
      const faq = getBucket(state.faq, {});
      const key = input.toLowerCase().trim();
      faq[key] = (faq[key] || 0) + 1;
      persist();
    }
    function topFaq() {
      const faq = getBucket(state.faq, {});
      return Object.entries(faq).sort((a,b)=>b[1]-a[1]).slice(0,5);
    }
    function recommendationEngine(context, intents) {
      const recs = [];
      if (context.financialData.profit < 0) recs.push('Reduce non-essential expenses by 10% this month.');
      if (!context.profile.businessType) recs.push('Complete profile with business type for sharper recommendations.');
      if (!context.uploadedFile.name) recs.push('Upload a business document to unlock file-based strategy Q&A.');
      if (intents.some(i=>i.intent==='marketing')) recs.push('Set one channel KPI and run 2 experiments this week.');
      return recs.slice(0,4);
    }

    // =======================================
    // Response Generator (smart response logic)
    // =======================================
    function pickVar(arr, salt='') {
      const n = [...salt].reduce((a,c)=>a+c.charCodeAt(0), 0);
      return arr[n % arr.length];
    }
    function generateResponse(userInput) {
      const intents = detectIntents(userInput);
      const context = buildContext(userInput);
      const primary = intents[0].intent;
      const knowledge = knowledgeBase[primary] || knowledgeBase.growthStrategy;
      const recs = recommendationEngine(context, intents);

      const memoryLine = context.relevantMemory.length
        ? `Using your saved memory: ${context.relevantMemory.map(m=>m.text).join(' | ')}`
        : 'No strong saved memory match found yet.';

      const title = `Business Plan: ${primary.replace(/([A-Z])/g, ' $1')}`;
      const steps = knowledge.map((k,i)=>`${i+1}. ${k}`);
      const actionables = [
        `Set 1 measurable target for the next 7 days in ${primary}.`,
        `Use your audience (${context.profile.audience || 'not set'}) to adapt messaging.`,
        context.uploadedFile.name ? `Reference file "${context.uploadedFile.name}" for decisions.` : 'Upload a TXT/CSV/JSON/PDF file to enrich context.',
        context.uploadedImage.name ? `Align branding with image note: ${context.uploadedImage.note || context.uploadedImage.name}.` : 'Upload a product/branding image and add a note.'
      ];
      const optional = recs.length ? recs : ['Track daily learnings and save as memory notes for adaptive advice.'];

      const result = {
        title,
        intents: intents.map(i=>`${i.intent} (${i.score})`).join(', '),
        steps,
        actionable: actionables,
        optional,
        contextHint: memoryLine,
        variation: pickVar(['Focus on execution speed.', 'Prioritize high-impact activities.', 'Keep your feedback loop short.'], userInput)
      };
      return { result, context, intents };
    }

    // ==================
    // Chat UI + editing
    // ==================
    function getChat() { return getBucket(state.chats, []); }
    function saveChat(chat) { state.chats[uid()] = chat; persist(); }

    function renderChat() {
      const box = $('chatBox');
      const chat = getChat();
      box.innerHTML = '';
      chat.forEach((msg, index) => {
        const row = document.createElement('div');
        row.className = `fade-in p-3 rounded-xl border ${msg.role==='user' ? 'bg-indigo-950/60 border-indigo-800 ml-8' : 'bg-slate-900 border-slate-700 mr-8'}`;
        row.innerHTML = `<div class="text-xs uppercase tracking-wide text-slate-400">${msg.role}</div><div class="mt-1 whitespace-pre-wrap text-sm">${msg.text}</div>`;
        if (msg.role === 'user') {
          const edit = document.createElement('button');
          edit.textContent = 'Edit';
          edit.className = 'mt-2 text-xs px-2 py-1 rounded bg-slate-700 hover:bg-slate-600';
          edit.onclick = () => {
            const v = prompt('Edit message', msg.text);
            if (!v) return;
            chat[index].text = v;
            saveChat(chat);
            renderChat();
          };
          row.appendChild(edit);
        }
        box.appendChild(row);
      });
      box.scrollTop = box.scrollHeight;
    }

    function formatResponseText(r) {
      return [
        `# ${r.title}`,
        `Intents: ${r.intents}`,
        '',
        'Steps:',
        ...r.steps,
        '',
        'Actionable Advice:',
        ...r.actionable.map(v=>`- ${v}`),
        '',
        'Optional Suggestions:',
        ...r.optional.map(v=>`- ${v}`),
        '',
        `Context Signal: ${r.contextHint}`,
        `Adaptive Note: ${r.variation}`
      ].join('\n');
    }

    // ========================
    // Voice System (STT + TTS)
    // ========================
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const utter = new SpeechSynthesisUtterance(text.slice(0, 400));
      utter.lang = LANGUAGE_META[state.language].speech;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    function startVoiceInput() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Speech recognition not supported in this browser.'); return; }
      const recognition = new SR();
      recognition.lang = LANGUAGE_META[state.language].speech;
      recognition.interimResults = false;
      recognition.onresult = (e) => { $('chatInput').value = e.results[0][0].transcript; };
      recognition.start();
    }

    // ========================================
    // Multilingual engine (UI translation only)
    // ========================================
    function applyLanguage() {
      document.documentElement.lang = state.language;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = t(key);
      });
      document.querySelectorAll('.tabBtn').forEach(btn => {
        const map = { dashboard:'dashboard', chat:'chat', workspace:'fileIntelligence', memory:'memory', profile:'profile' };
        btn.textContent = t(map[btn.dataset.tab]);
      });
      localStorage.setItem(KEYS.language, state.language);
    }

    // ================================
    // File Intelligence (txt/csv/json/pdf)
    // ================================
    function summarizeText(text) {
      const lines = text.split(/\n+/).map(s=>s.trim()).filter(Boolean);
      const first = lines.slice(0,3).join(' ');
      const keywords = ['revenue','cost','customer','market','price','growth','profit'];
      const found = keywords.filter(k => text.toLowerCase().includes(k));
      return `Summary: ${first.slice(0,220)}${first.length>220?'...':''} | Detected themes: ${found.join(', ') || 'general business notes'}.`;
    }

    async function readUploadedFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'pdf') {
        const arrayBuffer = await file.arrayBuffer();
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        if (!pdfjsLib) throw new Error('PDF parser unavailable.');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = '';
        for (let p=1; p<=pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const content = await page.getTextContent();
          text += content.items.map(i=>i.str).join(' ') + '\n';
        }
        return text;
      }
      return await file.text();
    }

    // =============================
    // Finance Intelligence Engine
    // =============================
    function financeInsight(income, expense) {
      const profit = income - expense;
      if (profit < 0) return { profit, message: 'You are operating at a loss. Focus on reducing fixed costs and improving conversion.' };
      if (profit < income * 0.2) return { profit, message: 'Healthy but thin margin. Optimize pricing tiers and upsells.' };
      return { profit, message: 'Strong margin. Reinvest some profit into growth experiments.' };
    }

    // =======================
    // Authentication/Profile
    // =======================
    function register(name, email, password) {
      if (state.users.find(u=>u.email===email)) return alert('Email already exists.');
      state.users.push({ name, email, password });
      persist();
      alert('Registered. Please login.');
    }
    function login(email, password) {
      const user = state.users.find(u=>u.email===email && u.password===password);
      if (!user) return alert('Invalid credentials.');
      state.currentUser = user;
      persist();
      refreshAuthUI();
    }
    function logout() { state.currentUser = null; persist(); refreshAuthUI(); }

    // =======================
    // Rendering and Bindings
    // =======================
    function refreshAuthUI() {
      const loggedIn = !!state.currentUser;
      $('authSection').classList.toggle('hidden', loggedIn);
      $('appSection').classList.toggle('hidden', !loggedIn);
      $('logoutBtn').classList.toggle('hidden', !loggedIn);
      if (!loggedIn) return;

      $('loggedInAs').textContent = `${state.currentUser.name} (${state.currentUser.email})`;
      const profile = getBucket(state.profiles, { businessType:'', audience:'', preference:'' });
      const fin = getBucket(state.finance, { income:0, expense:0 });
      $('businessTypeInput').value = profile.businessType;
      $('audienceInput').value = profile.audience;
      $('preferenceInput').value = profile.preference;
      $('incomeInput').value = fin.income;
      $('expenseInput').value = fin.expense;

      renderMemory();
      renderFaq();
      renderChat();
      renderDashboard();
      loadWorkspaceToUI();
    }

    function renderMemory() {
      const list = $('memoryList');
      const mems = getBucket(state.memories, []);
      list.innerHTML = mems.map((m, i) => `<li class="bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm flex justify-between"><span><strong>${m.type}</strong>: ${m.text}</span><button onclick="deleteMemory(${i})" class="text-rose-400 text-xs">Delete</button></li>`).join('') || '<li class="text-slate-400 text-sm">No memory notes yet.</li>';
    }

    window.deleteMemory = (idx) => {
      const mems = getBucket(state.memories, []);
      mems.splice(idx, 1);
      persist();
      renderMemory();
    };

    function renderFaq() {
      const entries = topFaq();
      $('faqList').innerHTML = entries.map(([q,c]) => `<li>${q} <span class="text-slate-500">(${c})</span></li>`).join('') || '<li>No patterns learned yet.</li>';
    }

    function renderDashboard() {
      const fin = getBucket(state.finance, { income:0, expense:0 });
      const profile = getBucket(state.profiles, { businessType:'', audience:'', preference:'' });
      const insight = financeInsight(Number(fin.income), Number(fin.expense));
      $('profitOutput').textContent = insight.profit.toFixed(2);
      $('financeInsight').textContent = insight.message;
      $('dashboardSummary').textContent = `Business: ${profile.businessType || 'Not set'} | Audience: ${profile.audience || 'Not set'} | Preference: ${profile.preference || 'Not set'}`;
      const recs = recommendationEngine(buildContext('dashboard'), detectIntents('growth finance marketing'));
      $('autoRecommendations').innerHTML = recs.map(r=>`<li>${r}</li>`).join('');
    }

    function loadWorkspaceToUI() {
      const ws = getBucket(state.workspace, { fileName:'', fileText:'', fileSummary:'', imageName:'', imageNote:'' });
      $('fileStatus').textContent = ws.fileName ? `Loaded: ${ws.fileName}` : 'No file loaded.';
      $('filePreview').value = ws.fileText || '';
      $('fileSummary').textContent = ws.fileSummary || '';
      $('imageStatus').textContent = ws.imageName ? `Image: ${ws.imageName} | Note: ${ws.imageNote || '-'}` : 'No image loaded.';
      $('imageNoteInput').value = ws.imageNote || '';
    }

    function setupEvents() {
      $('registerForm').addEventListener('submit', e => { e.preventDefault(); register($('regName').value.trim(), $('regEmail').value.trim(), $('regPassword').value); e.target.reset(); });
      $('loginForm').addEventListener('submit', e => { e.preventDefault(); login($('loginEmail').value.trim(), $('loginPassword').value); });
      $('logoutBtn').addEventListener('click', logout);

      $('tabs').addEventListener('click', e => {
        const b = e.target.closest('button[data-tab]');
        if (!b) return;
        document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden'));
        $('panel-' + b.dataset.tab).classList.remove('hidden');
        document.querySelectorAll('.tabBtn').forEach(t=>t.className='tabBtn bg-slate-800 rounded-lg px-3 py-2');
        b.className='tabBtn bg-indigo-600 rounded-lg px-3 py-2';
      });

      $('languageSelect').addEventListener('change', e => { state.language = e.target.value; persist(); applyLanguage(); });

      $('profileForm').addEventListener('submit', e => {
        e.preventDefault();
        state.profiles[uid()] = {
          businessType: $('businessTypeInput').value.trim(),
          audience: $('audienceInput').value.trim(),
          preference: $('preferenceInput').value.trim()
        };
        persist();
        renderDashboard();
      });

      $('memoryForm').addEventListener('submit', e => {
        e.preventDefault();
        const type = $('memoryType').value.trim() || 'general';
        const text = $('memoryInput').value.trim();
        if (!text) return;
        const mems = getBucket(state.memories, []);
        mems.unshift({ type, text, createdAt: Date.now() });
        state.memories[uid()] = mems.slice(0, 40);
        persist();
        e.target.reset();
        renderMemory();
      });

      $('saveFinanceBtn').addEventListener('click', () => {
        state.finance[uid()] = {
          income: Number($('incomeInput').value || 0),
          expense: Number($('expenseInput').value || 0)
        };
        persist();
        renderDashboard();
      });

      $('chatForm').addEventListener('submit', e => {
        e.preventDefault();
        const input = $('chatInput').value.trim();
        if (!input) return;
        const chat = getChat();
        chat.push({ role: 'user', text: input, ts: Date.now() });

        const { result } = generateResponse(input);
        const out = formatResponseText(result);
        chat.push({ role: 'ai', text: out, ts: Date.now() });
        saveChat(chat);
        updateFaq(input);
        renderFaq();
        renderChat();
        renderDashboard();
        speak(`${result.title}. ${result.variation}`);
        $('chatInput').value = '';
      });

      $('clearChatBtn').addEventListener('click', () => { state.chats[uid()] = []; persist(); renderChat(); });
      $('voiceInputBtn').addEventListener('click', startVoiceInput);

      $('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        $('fileStatus').textContent = `Processing ${file.name}...`;
        try {
          const text = await readUploadedFile(file);
          const summary = summarizeText(text);
          state.workspace[uid()] = { ...getBucket(state.workspace, {}), fileName: file.name, fileText: text.slice(0, 15000), fileSummary: summary };
          persist();
          loadWorkspaceToUI();
        } catch (err) {
          $('fileStatus').textContent = `Error: ${err.message}`;
        }
      });

      $('imageInput').addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const ws = getBucket(state.workspace, { fileName:'', fileText:'', fileSummary:'', imageName:'', imageNote:'' });
        ws.imageName = file.name;
        state.workspace[uid()] = ws;
        persist();
        const reader = new FileReader();
        reader.onload = () => {
          $('imagePreview').src = reader.result;
          $('imagePreview').classList.remove('hidden');
          loadWorkspaceToUI();
        };
        reader.readAsDataURL(file);
      });

      $('saveImageNoteBtn').addEventListener('click', () => {
        const ws = getBucket(state.workspace, { fileName:'', fileText:'', fileSummary:'', imageName:'', imageNote:'' });
        ws.imageNote = $('imageNoteInput').value.trim();
        state.workspace[uid()] = ws;
        persist();
        loadWorkspaceToUI();
      });
    }

    function init() {
      $('languageSelect').innerHTML = LANGS.map(l=>`<option value="${l}">${LANGUAGE_META[l].name}</option>`).join('');
      $('languageSelect').value = state.language;
      applyLanguage();
      setupEvents();
      refreshAuthUI();
    }

    init();
  </script>
</body>
</html>
